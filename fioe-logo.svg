<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 70" width="182" height="70">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1B35CC"/>
      <stop offset="100%" stop-color="#38D0F0"/>
    </linearGradient>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(56,208,240,0.30)"/>
    </radialGradient>
    <clipPath id="cc">
      <circle cx="98" cy="35" r="30"/>
    </clipPath>
  </defs>

  <!-- F: x=2, width=46, stem=10, top-bar=46x10, mid-bar=30x9 -->
  <rect x="2"  y="5"  width="10" height="60" fill="#f2f2f5"/>
  <rect x="2"  y="5"  width="46" height="10" fill="#f2f2f5"/>
  <rect x="2"  y="28" width="30" height="9"  fill="#f2f2f5"/>

  <!-- I: x=54, width=8 -->
  <rect x="54" y="5"  width="8"  height="60" fill="#f2f2f5"/>

  <!-- Puzzle circle: cx=98, cy=35, r=30 -->
  <circle cx="98" cy="35" r="33" fill="url(#rg)"/>
  <circle cx="98" cy="35" r="31" fill="none" stroke="rgba(56,208,240,0.35)" stroke-width="1.5"/>
  <circle cx="98" cy="35" r="30" fill="url(#cg)"/>

  <!--
    Puzzle dividers — proper semicircular arc tabs (r=9):
      Vertical:   upper half tab bumps RIGHT  (A 9,9 0 0,1)
                  lower half tab bumps LEFT   (A 9,9 0 0,0)
      Horizontal: left  half tab bumps DOWN   (A 9,9 0 0,0)
                  right half tab bumps UP     (A 9,9 0 0,1)
  -->
  <g clip-path="url(#cc)" fill="none" stroke="#0d1f5e" stroke-width="2.2" stroke-linecap="round">
    <path d="M 98,5 L 98,11 A 9,9 0 0,1 98,29 L 98,41 A 9,9 0 0,0 98,59 L 98,65"/>
    <path d="M 68,35 L 74,35 A 9,9 0 0,0 92,35 L 104,35 A 9,9 0 0,1 122,35 L 128,35"/>
  </g>

  <!-- Circuit dots at N/S/W/E on circle boundary -->
  <circle cx="98" cy="5"   r="2.5" fill="rgba(56,208,240,0.90)"/>
  <circle cx="98" cy="65"  r="2.5" fill="rgba(56,208,240,0.90)"/>
  <circle cx="68" cy="35"  r="2.5" fill="rgba(56,208,240,0.90)"/>
  <circle cx="128" cy="35" r="2.5" fill="rgba(56,208,240,0.90)"/>

  <!-- E: x=134, width=46, stem=10, same bars as F, plus bottom bar -->
  <rect x="134" y="5"  width="10" height="60" fill="#f2f2f5"/>
  <rect x="134" y="5"  width="46" height="10" fill="#f2f2f5"/>
  <rect x="134" y="28" width="30" height="9"  fill="#f2f2f5"/>
  <rect x="134" y="55" width="46" height="10" fill="#f2f2f5"/>
</svg>
