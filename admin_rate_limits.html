  // ── Collect edits from inputs back into masterData ────────────────────────
  function collectEdits(panel, sectionKey) {
    // Company edits — username-keyed format (has data-user): sector[sector][company] = count
    panel.querySelectorAll('[data-master-section][data-user][data-sector][data-company]').forEach(inp => {
      const user    = inp.dataset.user;
      const sector  = inp.dataset.sector;
      const company = inp.dataset.company;
      const val = parseInt(inp.value, 10);
      if (!isNaN(val) && masterData[sectionKey] && masterData[sectionKey][user] &&
          masterData[sectionKey][user].sector &&
          masterData[sectionKey][user].sector[sector]) {
        masterData[sectionKey][user].sector[sector][company] = val;
      }
    });
    // Company edits — consolidated format (no data-user, sector under 'company' key)
    panel.querySelectorAll('[data-master-section][data-sector][data-company]:not([data-user])').forEach(inp => {
      const sector  = inp.dataset.sector;
      const company = inp.dataset.company;
      const val = parseInt(inp.value, 10);
      if (isNaN(val) || !masterData[sectionKey]) return;
      if (masterData[sectionKey].company && masterData[sectionKey].company.sector &&
          masterData[sectionKey].company.sector[sector]) {
        masterData[sectionKey].company.sector[sector][company] = val;
      } else if (masterData[sectionKey][sector]) {
        masterData[sectionKey][sector][company] = val;
      }
    });
    // Job title sub-map edits (Seniority / Job Family / Sourcing Status / Top Skills)
    panel.querySelectorAll('[data-master-section][data-user][data-mapkey][data-subkey]').forEach(inp => {
      const user   = inp.dataset.user;
      const mapKey = inp.dataset.mapkey;
      const subKey = inp.dataset.subkey;
      const val = parseFloat(inp.value);
      if (!isNaN(val) && masterData[sectionKey] && masterData[sectionKey][user] && masterData[sectionKey][user][mapKey]) {
        masterData[sectionKey][user][mapKey][subKey] = val;
      }
    });
    // Compensation range edits
    panel.querySelectorAll('[data-master-section][data-user][data-rangefield]').forEach(inp => {
      const user      = inp.dataset.user;
      const rangeField = inp.dataset.rangefield;
      const val = inp.value.trim();
      if (masterData[sectionKey] && masterData[sectionKey][user]) {
        if (!masterData[sectionKey][user].range) masterData[sectionKey][user].range = {};
        masterData[sectionKey][user].range[rangeField] = val;
      }
    });
    // Compensation new-format edits (compensation_by_job_title[jobTitle][field])
    panel.querySelectorAll('[data-master-section][data-user][data-compjob][data-compfield]').forEach(inp => {
      const user      = inp.dataset.user;
      const jobTitle  = inp.dataset.compjob;
      const field     = inp.dataset.compfield;
      if (field === '_jobkey') return; // job key renames handled separately
      const val = field === 'count' ? Number(inp.value) : inp.value.trim();
      if (!masterData[sectionKey]) return;
      // Flat consolidated format (user is ""): masterData[sectionKey].compensation_by_job_title[jobTitle]
      if (!user && masterData[sectionKey].compensation_by_job_title && masterData[sectionKey].compensation_by_job_title[jobTitle]) {
        masterData[sectionKey].compensation_by_job_title[jobTitle][field] = val;
      } else if (user && masterData[sectionKey][user] && masterData[sectionKey][user].compensation_by_job_title &&
          masterData[sectionKey][user].compensation_by_job_title[jobTitle]) {
        masterData[sectionKey][user].compensation_by_job_title[jobTitle][field] = val;
      }
    });
    // Compensation text field edits (by_job_title, by_job_family, by_country) — backward compat old format
    panel.querySelectorAll('[data-master-section][data-user][data-textfield]').forEach(inp => {
      const user  = inp.dataset.user;
      const field = inp.dataset.textfield;
      const val   = inp.value.trim();
      if (masterData[sectionKey] && masterData[sectionKey][user]) {
        masterData[sectionKey][user][field] = val;
      }
    });
  }

  // ── Load master file data and render first tab ────────────────────────────
  async function loadMasterTables() {
    // Show loading in master sections (not holding — it loads separately)
    for (const sec of MASTER_SECTIONS.filter(s => s.key !== 'holding')) {
      tabPanels[sec.key].innerHTML = '<p style="font-size:12px;color:var(--muted);padding:10px 0;">Loading…</p>';
    }
    try {
      const r = await fetch('/admin/ml-master-files', { headers: csrfHeaders(), credentials: 'same-origin' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      masterData = await r.json();
      // Render currently-active panel (first tab)
      const firstKey = MASTER_SECTIONS[0].key;
      activateMasterTab(firstKey);
    } catch (e) {
      for (const sec of MASTER_SECTIONS.filter(s => s.key !== 'holding')) {
        tabPanels[sec.key].innerHTML = `<p style="font-size:12px;color:var(--danger);">Failed to load: ${escHtml(e.message)}</p>`;
      }
    }
  }

  // Activate first tab and kick off load
  activateMasterTab(MASTER_SECTIONS[0].key);
  loadMasterTables();

  return wrap;
}

async function loadSalesRepData(card) {
  const wrap = card.querySelector('#salesRepTableWrap');
  const btn = card.querySelector('#salesRepRefreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  wrap.innerHTML = '<p style="color:var(--muted);font-size:13px;">Loading…</p>';

  try {
    const r = await fetch(`${API}/admin/sales-rep`, { credentials: 'same-origin' });
    if (r.status === 401) { location.reload(); return; }
    if (!r.ok) {
      wrap.innerHTML = `<p style="color:var(--danger,#d9534f);font-size:13px;">Failed to load data (HTTP ${r.status}).</p>`;
      return;
    }
    const data = await r.json();
    const rows = data.sales_rep || [];

    if (!rows.length) {
      wrap.innerHTML = '<p style="color:var(--muted);font-size:13px;">No sales rep data found. Assign BD values to users in the Users tab first.</p>';
      return;
    }

    // Summary counters row
    const totalClients  = rows.reduce((s, r) => s + (r.total_clients  || 0), 0);
    const totalCredits  = rows.reduce((s, r) => s + (r.tokens_credited || 0), 0);
    const totalConsumed = rows.reduce((s, r) => s + (r.total_tokens_consumed || 0), 0);
    const totalRevenue  = rows.reduce((s, r) => s + (r.total_revenue  || 0), 0);
    const totalCommission = rows.reduce((s, r) => {
      const rate = parseFloat(r.commission) || 0;
      return s + (r.total_revenue || 0) * rate / 100;
    }, 0);

    const summaryDiv = document.createElement('div');
    summaryDiv.className = 'log-counter-row';
    summaryDiv.style.cssText = 'margin-bottom:16px;';
    summaryDiv.innerHTML = `
      <div class="log-counter">
        <div class="cval">${rows.length}</div>
        <div class="clbl">Sales Reps</div>
      </div>
      <div class="log-counter">
        <div class="cval">${totalClients}</div>
        <div class="clbl">Total Clients</div>
      </div>
      <div class="log-counter">
        <div class="cval" style="color:#27ae60">+${Number(totalCredits).toLocaleString()}</div>
        <div class="clbl">Total Credits Purchased</div>
      </div>
      <div class="log-counter">
        <div class="cval" style="color:#4c82b8">${Number(totalConsumed).toLocaleString()}</div>
        <div class="clbl">Total Tokens Consumed</div>
      </div>
      <div class="log-counter">
        <div class="cval" style="color:#073679">SGD ${totalRevenue.toFixed(2)}</div>
        <div class="clbl">Total Credit Spent</div>
      </div>
      <div class="log-counter">
        <div class="cval" style="color:#073679;cursor:pointer;" title="Click any rep's commission value to calculate by date range">SGD ${totalCommission.toFixed(2)}</div>
        <div class="clbl">Total Commission Payable</div>
      </div>`;
    wrap.innerHTML = '';
    wrap.appendChild(summaryDiv);

    const tbl = document.createElement('table');
    tbl.innerHTML = `
      <thead>
        <tr>
          <th>Sales Rep Name</th>
          <th>Username</th>
          <th style="text-align:right">Total Credits Purchased</th>
          <th style="text-align:right">Total Tokens Consumed</th>
          <th style="text-align:right">Total Clients</th>
          <th style="text-align:right">Total Credit Spent (SGD)</th>
          <th style="text-align:center;min-width:120px">Commission Rate (%)</th>
          <th style="text-align:center;min-width:120px">Ownership Period (mo)</th>
          <th style="text-align:right">Total Commission Payable (SGD)</th>
          <th style="text-align:center">Save</th>
        </tr>
      </thead>`;
    const tbody = document.createElement('tbody');
    rows.forEach(row => {
      const tr = document.createElement('tr');
      const credits = row.tokens_credited > 0
        ? `<span style="color:#27ae60;font-weight:600">+${Number(row.tokens_credited).toLocaleString()}</span>`
        : '<span style="color:var(--muted)">0</span>';
      const consumed = row.total_tokens_consumed > 0
        ? `<span style="color:#4c82b8;font-weight:600">${Number(row.total_tokens_consumed).toLocaleString()}</span>`
        : '<span style="color:var(--muted)">0</span>';
      const revenue = row.total_revenue > 0
        ? `<span style="color:#073679;font-weight:600">SGD ${Number(row.total_revenue).toFixed(2)}</span>`
        : '<span style="color:var(--muted)">SGD 0.00</span>';
      const commRate = parseFloat(row.commission) || 0;
      const commPayable = row.total_revenue * commRate / 100;
      const commPayableSpan = commPayable > 0
        ? `<span class="comm-payable-link" data-username="${escHtml(row.username||'')}" data-commission="${commRate}" style="color:#073679;font-weight:600;cursor:pointer;text-decoration:underline dotted;" title="Click to calculate by date range">SGD ${commPayable.toFixed(2)}</span>`
        : `<span class="comm-payable-link" data-username="${escHtml(row.username||'')}" data-commission="${commRate}" style="color:var(--muted);cursor:pointer;text-decoration:underline dotted;" title="Click to calculate by date range">SGD 0.00</span>`;
      tr.innerHTML = `
        <td style="font-weight:600"><span class="sr-name-link" data-username="${escHtml(row.username || '')}">${escHtml(row.full_name || row.username || '—')}</span></td>
        <td style="color:var(--muted);font-size:12px">@${escHtml(row.username || '—')}</td>
        <td style="text-align:right">${credits}</td>
        <td style="text-align:right">${consumed}</td>
        <td style="text-align:right;font-weight:600">${Number(row.total_clients || 0)}</td>
        <td style="text-align:right">${revenue}</td>
        <td style="text-align:center">
          <input type="number" min="0" max="100" step="0.1"
            data-field="commission" data-username="${escHtml(row.username || '')}"
            value="${commRate}"
            style="width:75px;padding:3px 6px;border:1px solid var(--border,#ccc);border-radius:4px;text-align:right;font-size:12px;">
          <span style="font-size:11px;color:var(--muted)">%</span>
        </td>
        <td style="text-align:center">
          <input type="number" min="0" step="1"
            data-field="ownership" data-username="${escHtml(row.username || '')}"
            value="${parseInt(row.ownership, 10) || 0}"
            style="width:75px;padding:3px 6px;border:1px solid var(--border,#ccc);border-radius:4px;text-align:right;font-size:12px;">
          <span style="font-size:11px;color:var(--muted)">mo</span>
        </td>
        <td style="text-align:right" class="comm-payable-cell">${commPayableSpan}</td>
        <td style="text-align:center">
          <button class="btn btn-sm save-srep-btn"
            data-username="${escHtml(row.username || '')}"
            style="font-size:11px;padding:3px 10px;">Save</button>
        </td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);

    // Wire up Sales Rep Name links to open detail modal.
    tbl.querySelectorAll('.sr-name-link').forEach(link => {
      link.addEventListener('click', () => {
        const uname = link.dataset.username;
        const rowData = rows.find(r => r.username === uname);
        openSrDetailModal(uname, rowData ? (rowData.full_name || uname) : uname);
      });
    });

    // Wire up commission payable links to open date-range commission calculator.
    tbl.querySelectorAll('.comm-payable-link').forEach(link => {
      link.addEventListener('click', () => {
        openCommCalcModal(link.dataset.username, parseFloat(link.dataset.commission)||0);
      });
    });

    // Wire up commission-rate inputs to auto-recalculate payable in that row.
    tbl.querySelectorAll('input[data-field="commission"]').forEach(inp => {
      inp.addEventListener('input', () => {
        const tr2 = inp.closest('tr');
        const bdRow = rows.find(r => r.username === inp.dataset.username);
        if (!bdRow) return;
        const rate = parseFloat(inp.value) || 0;
        const payable = (bdRow.total_revenue || 0) * rate / 100;
        const cell = tr2.querySelector('.comm-payable-cell');
        if (cell) {
          const username = escHtml(bdRow.username||'');
          cell.innerHTML = payable > 0
            ? `<span class="comm-payable-link" data-username="${username}" data-commission="${rate}" style="color:#073679;font-weight:600;cursor:pointer;text-decoration:underline dotted;" title="Click to calculate by date range">SGD ${payable.toFixed(2)}</span>`
            : `<span class="comm-payable-link" data-username="${username}" data-commission="${rate}" style="color:var(--muted);cursor:pointer;text-decoration:underline dotted;" title="Click to calculate by date range">SGD 0.00</span>`;
          // Re-wire the click on the newly created span
          cell.querySelector('.comm-payable-link').addEventListener('click', e => {
            openCommCalcModal(e.target.dataset.username, parseFloat(e.target.dataset.commission)||0);
          });
        }
      });
    });

    // Wire up Save buttons.
    tbl.querySelectorAll('.save-srep-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const username = btn.dataset.username;
        const tr2 = btn.closest('tr');
        const commInp = tr2.querySelector('input[data-field="commission"]');
        const ownInp  = tr2.querySelector('input[data-field="ownership"]');
        const commission = parseFloat(commInp?.value) || 0;
        const ownership  = parseInt(ownInp?.value, 10) || 0;
        btn.disabled = true; btn.textContent = '…';
        try {
          const r2 = await fetch(`${API}/admin/sales-rep/${encodeURIComponent(username)}`, {
            method: 'PATCH',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ commission, ownership }),
          });
          if (r2.ok) {
            btn.textContent = '✓';
            btn.style.background = '#27ae60';
            setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; btn.disabled = false; }, 1500);
          } else {
            btn.textContent = '✗';
            btn.style.background = '#d9534f';
            setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; btn.disabled = false; }, 1500);
          }
        } catch (_) {
          btn.textContent = '✗'; btn.style.background = '#d9534f';
          setTimeout(() => { btn.textContent = 'Save'; btn.style.background = ''; btn.disabled = false; }, 1500);
        }
      });
    });
  } catch (_) {
    wrap.innerHTML = '<p style="color:var(--danger,#d9534f);font-size:13px;">Network error — could not load sales rep data.</p>';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
  }
}

// ── Sales Rep Detail Modal ───────────────────────────────────────────────────
let _srModalUsername   = '';
let _srModalSubTab     = 'transactions';
let _srModalTxns       = null;   // null = not loaded yet for current filters
let _srModalDateFrom   = '';
let _srModalDateTo     = '';

function openSrDetailModal(username, fullName) {
  _srModalUsername = username;
  _srModalSubTab   = 'transactions';
  _srModalTxns     = null;
  _srModalDateFrom = '';
  _srModalDateTo   = '';

  const modal = document.getElementById('srDetailModal');
  document.getElementById('srDetailModalTitle').textContent =
    `Transactions — ${fullName} (@${username})`;
  document.getElementById('srModalDateFrom').value = '';
  document.getElementById('srModalDateTo').value   = '';
  // Reset corp filter
  const corpSel = document.getElementById('srModalCorpFilter');
  if (corpSel) { corpSel.innerHTML = '<option value="">All Corporations</option>'; }
  document.getElementById('srDetailModalSubTabs')
    .querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === 'transactions');
    });
  document.getElementById('srDetailModalBody').innerHTML =
    '<p style="color:var(--muted);font-size:13px;">Loading…</p>';

  modal.classList.add('open');
  _srModalFetchAndRender();
}

function closeSrDetailModal() {
  document.getElementById('srDetailModal').classList.remove('open');
}

async function _srModalFetchAndRender() {
  const body = document.getElementById('srDetailModalBody');
  body.innerHTML = '<p style="color:var(--muted);font-size:13px;">Loading…</p>';
  try {
    let url = `${API}/admin/sales-rep/${encodeURIComponent(_srModalUsername)}/transactions`;
    const params = new URLSearchParams();
    if (_srModalDateFrom) params.set('from', _srModalDateFrom);
    if (_srModalDateTo)   params.set('to',   _srModalDateTo);
    if ([...params].length) url += '?' + params.toString();

    const r = await fetch(url, { credentials: 'same-origin' });
    if (r.status === 401) { location.reload(); return; }
    if (!r.ok) {
      body.innerHTML = `<p style="color:var(--danger);font-size:13px;">Failed to load data (HTTP ${r.status}).</p>`;
      return;
    }
    const data = await r.json();
    _srModalTxns = data.transactions || [];
    // Populate corporation dropdown
    const corpSel = document.getElementById('srModalCorpFilter');
    if (corpSel) {
      const corps = [...new Set((_srModalTxns).map(t => t.corporation||'').filter(Boolean))].sort();
      const prev = corpSel.value;
      corpSel.innerHTML = '<option value="">All Corporations</option>';
      corps.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        corpSel.appendChild(opt);
      });
      if (corps.includes(prev)) corpSel.value = prev;
    }
  } catch (_) {
    document.getElementById('srDetailModalBody').innerHTML =
      '<p style="color:var(--danger);font-size:13px;">Network error.</p>';
    return;
  }
  _srModalRender();
}

function _srModalRender() {
  const body = document.getElementById('srDetailModalBody');
  body.innerHTML = '';
  // Apply corporation filter from dropdown
  const corpSel = document.getElementById('srModalCorpFilter');
  const corpFilter = corpSel ? corpSel.value : '';
  const filteredTxns = corpFilter
    ? (_srModalTxns||[]).filter(t => (t.corporation||'') === corpFilter)
    : (_srModalTxns||[]);
  if (_srModalSubTab === 'transactions') {
    _srModalRenderTransactions(body, filteredTxns);
  } else {
    _srModalRenderLedger(body, filteredTxns);
  }
}

function _srModalRenderTransactions(container, txns) {
  txns = txns || [];
  // Counters
  const totalDeducted = txns
    .filter(t => (t.transaction_type||'').toLowerCase()==='spend')
    .reduce((s,t) => s + (t.transaction_amount!=null ? Math.abs(parseInt(t.transaction_amount,10)||0) : (parseInt(t.token_usage,10)||0)), 0);
  const totalCredited = txns
    .filter(t => (t.transaction_type||'').toLowerCase()==='credit')
    .reduce((s,t) => s + (t.transaction_amount!=null ? parseInt(t.transaction_amount,10)||0 : (parseInt(t.token_usage,10)||0)), 0);
  const totalRevenue  = txns
    .filter(t => (t.transaction_type||'').toLowerCase()==='spend')
    .reduce((s,t) => {
      if (t.revenue_sgd!=null) return s + (parseFloat(t.revenue_sgd)||0);
      if (t.token_cost_sgd!=null) {
        const a = t.transaction_amount!=null ? Math.abs(parseInt(t.transaction_amount,10)||0) : (parseInt(t.token_usage,10)||0);
        return s + a*(parseFloat(t.token_cost_sgd)||0.10);
      }
      return s;
    }, 0);

  const counters = document.createElement('div');
  counters.className = 'log-counter-row';
  counters.innerHTML = `
    <div class="log-counter"><div class="cval" style="color:#d9534f">${totalDeducted.toLocaleString()}</div><div class="clbl">Tokens Deducted</div></div>
    <div class="log-counter"><div class="cval" style="color:#27ae60">+${totalCredited.toLocaleString()}</div><div class="clbl">Tokens Credited</div></div>
    <div class="log-counter"><div class="cval" style="color:#073679">SGD ${totalRevenue.toFixed(2)}</div><div class="clbl">Credit Spent Revenue</div></div>
    <div class="log-counter"><div class="cval" style="color:#4c82b8">${txns.length}</div><div class="clbl">Total Transactions</div></div>`;
  container.appendChild(counters);

  if (!txns.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:32px;text-align:center;color:var(--muted);font-size:13px;';
    empty.textContent = 'No transactions found for this sales rep.';
    container.appendChild(empty); return;
  }

  const wrap = document.createElement('div');
  wrap.style.cssText = 'overflow-x:auto;';
  const tbl = document.createElement('table');
  tbl.innerHTML = `<thead><tr>
    <th>Timestamp</th><th>Corporation</th><th>User</th><th>Type</th>
    <th style="text-align:right">Tokens</th>
    <th style="text-align:right">Token Cost (SGD)</th>
    <th style="text-align:right">Revenue (SGD)</th>
    <th style="text-align:right">Before → After</th>
    <th>Feature</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  txns.forEach(t => {
    const type  = (t.transaction_type||'').toLowerCase();
    const amt   = t.transaction_amount!=null ? parseInt(t.transaction_amount,10)||0 : (t.token_usage!=null ? parseInt(t.token_usage,10)||0 : 0);
    const typeColor = type==='spend' ? '#d9534f' : type==='credit' ? '#27ae60' : 'var(--arg)';
    const typeLabel = type==='spend' ? '▼ spend' : type==='credit' ? '▲ credit' : (type||'—');
    const amtDisplay = amt
      ? `<span style="color:${typeColor};font-weight:600">${type==='spend'?'−':type==='credit'?'+':''}${Math.abs(amt).toLocaleString()}</span>`
      : '<span style="color:var(--muted)">—</span>';
    const before = t.token_before!=null ? Number(t.token_before).toLocaleString() : '—';
    const after  = t.token_after !=null ? Number(t.token_after).toLocaleString()  : '—';
    const costSGD = t.token_cost_sgd!=null ? parseFloat(t.token_cost_sgd) : null;
    const revSGD  = t.revenue_sgd   !=null ? parseFloat(t.revenue_sgd)    : null;
    const costDisplay = (type==='spend' && costSGD!=null)
      ? `<span style="color:var(--muted);font-size:11px">SGD ${costSGD.toFixed(2)}</span>`
      : '<span style="color:var(--muted)">—</span>';
    const revDisplay = (type==='spend' && revSGD!=null && revSGD>0)
      ? `<span style="color:var(--re);font-weight:600">SGD ${revSGD.toFixed(2)}</span>`
      : '<span style="color:var(--muted)">—</span>';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap;color:var(--muted)">${escHtml(t.timestamp||'—')}</td>
      <td><span style="background:rgba(109,234,249,.15);border:1px solid #c5e7f8;border-radius:4px;padding:2px 7px;font-size:11px;color:var(--ad)">${escHtml(t.corporation||'—')}</span></td>
      <td>${escHtml(t.username||'—')}</td>
      <td><span style="color:${typeColor};font-size:11px">${escHtml(typeLabel)}</span></td>
      <td style="text-align:right">${amtDisplay}</td>
      <td style="text-align:right">${costDisplay}</td>
      <td style="text-align:right">${revDisplay}</td>
      <td style="text-align:right;font-size:11px;color:var(--muted)">${escHtml(before+' → '+after)}</td>
      <td style="color:var(--muted)">${escHtml(t.feature||'—')}</td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  container.appendChild(wrap);
}

function _srModalToLedger(txns) {
  return (txns||[])
    .filter(t => { const tp=(t.transaction_type||'').toLowerCase(); return tp==='spend'||tp==='credit'; })
    .map(t => {
      const ts     = t.timestamp||'';
      const tp     = (t.transaction_type||'').toLowerCase();
      const amt    = t.transaction_amount!=null ? parseFloat(t.transaction_amount)||0 : parseFloat(t.token_usage)||0;
      const rev    = parseFloat(t.revenue_sgd)||0;
      const costPt = parseFloat(t.token_cost_sgd)||0.10;
      const isSpend = tp==='spend';
      const value  = rev>0 ? rev : Math.round(Math.abs(amt)*costPt*10000)/10000;
      return {
        date:       ts.slice(0,10),
        category:   isSpend ? 'Revenue' : 'Refund',
        reference:  'TXN-'+ts.replace(/[^0-9]/g,'').slice(0,14),
        description:(t.corporation ? `[${t.corporation}] ` : '')+(t.feature||'transaction')+': '+amt+' tkn'+(t.username?' by '+t.username:''),
        debit:      isSpend ? value : 0,
        credit:     isSpend ? 0 : value,
        created_by: t.username||'',
        created_at: ts,
        _corp:      t.corporation||'',
      };
    })
    .sort((a,b) => (a.date||'')>(b.date||'') ? 1 : -1);
}

function _srModalRenderLedger(container, txns) {
  const ledgerRows = _srModalToLedger(txns||[]);
  let running = 0;
  const withBalance = ledgerRows.map(e => {
    running += (e.debit||0) - (e.credit||0);
    return { ...e, _balance: running };
  }).reverse();

  const totalDebit  = ledgerRows.reduce((s,e) => s+(e.debit ||0), 0);
  const totalCredit = ledgerRows.reduce((s,e) => s+(e.credit||0), 0);
  const closingBal  = totalDebit - totalCredit;

  const summaryDiv = document.createElement('div');
  summaryDiv.className = 'log-counter-row';
  summaryDiv.innerHTML = `
    <div class="log-counter"><div class="cval">${ledgerRows.length}</div><div class="clbl">Ledger Entries</div></div>
    <div class="log-counter"><div class="cval" style="color:var(--re)">SGD ${totalDebit.toFixed(2)}</div><div class="clbl">Total Debit (+)</div></div>
    <div class="log-counter"><div class="cval" style="color:#d9534f">SGD ${totalCredit.toFixed(2)}</div><div class="clbl">Total Credit (−)</div></div>
    <div class="log-counter"><div class="cval" style="color:${closingBal>=0?'#27ae60':'#d9534f'}">SGD ${closingBal.toFixed(2)}</div><div class="clbl">Closing Balance</div></div>`;
  container.appendChild(summaryDiv);

  if (!withBalance.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:32px;text-align:center;color:var(--muted);font-size:13px;';
    empty.textContent = 'No ledger entries to display.';
    container.appendChild(empty); return;
  }

  const wrap = document.createElement('div');
  wrap.style.cssText = 'overflow-x:auto;';
  const tbl = document.createElement('table');
  tbl.innerHTML = `<thead><tr>
    <th>Date</th><th>Category</th><th>Corporation</th><th>Reference</th>
    <th>Description</th>
    <th style="text-align:right">Debit (+)</th>
    <th style="text-align:right">Credit (−)</th>
    <th style="text-align:right">Balance</th>
    <th>Created By</th>
  </tr></thead>`;
  const tbody = document.createElement('tbody');
  withBalance.forEach(e => {
    const debit  = e.debit ||0;
    const credit = e.credit||0;
    const bal    = e._balance;
    const balColor = bal>=0 ? '#27ae60' : '#d9534f';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${escHtml(e.date||'—')}</td>
      <td><span style="background:rgba(76,130,184,0.12);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--cb)">${escHtml(e.category||'—')}</span></td>
      <td><span style="background:rgba(109,234,249,.15);border:1px solid #c5e7f8;border-radius:4px;padding:2px 7px;font-size:11px;color:var(--ad)">${escHtml(e._corp||'—')}</span></td>
      <td style="font-family:monospace;font-size:11px;color:var(--cb)">${escHtml(e.reference||'—')}</td>
      <td style="color:var(--muted);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(e.description||'')}">${escHtml(e.description||'—')}</td>
      <td style="text-align:right;font-weight:600;color:var(--re)">${debit>0?'SGD '+debit.toFixed(2):'<span style="color:var(--muted)">—</span>'}</td>
      <td style="text-align:right;font-weight:600;color:#d9534f">${credit>0?'SGD '+credit.toFixed(2):'<span style="color:var(--muted)">—</span>'}</td>
      <td style="text-align:right;font-weight:700;color:${balColor}">SGD ${bal.toFixed(2)}</td>
      <td style="color:var(--muted);font-size:11px;white-space:nowrap">${escHtml(e.created_by||'—')}<br><span style="font-size:10px">${escHtml((e.created_at||'').slice(0,19).replace('T',' '))}</span></td>`;
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  container.appendChild(wrap);
}

// Wire up modal controls (run once after DOM is ready).
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('srDetailModalClose').addEventListener('click', closeSrDetailModal);
  document.getElementById('srDetailModal').addEventListener('click', e => {
    if (e.target === document.getElementById('srDetailModal')) closeSrDetailModal();
  });

  // Sub-tabs
  document.getElementById('srDetailModalSubTabs').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      _srModalSubTab = btn.dataset.tab;
      document.getElementById('srDetailModalSubTabs').querySelectorAll('button')
        .forEach(b => b.classList.toggle('active', b.dataset.tab === _srModalSubTab));
      if (_srModalTxns !== null) {
        _srModalRender();
      } else {
        _srModalFetchAndRender();
      }
    });
  });

  // Quick-range buttons
  document.getElementById('srModalQuickRange').querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const now = new Date();
      let fromDate;
      if (btn.dataset.range === '24h') {
        fromDate = new Date(now.getTime() - 24*60*60*1000);
      } else if (btn.dataset.range === '7d') {
        fromDate = new Date(now.getTime() - 7*24*60*60*1000);
      } else {
        fromDate = new Date(now.getTime() - 30*24*60*60*1000);
      }
      _srModalDateFrom = fromDate.toISOString().slice(0,10);
      _srModalDateTo   = now.toISOString().slice(0,10);
      document.getElementById('srModalDateFrom').value = _srModalDateFrom;
      document.getElementById('srModalDateTo').value   = _srModalDateTo;
      _srModalTxns = null;
      _srModalFetchAndRender();
    });
  });

  // Apply button
  document.getElementById('srModalApply').addEventListener('click', () => {
    _srModalDateFrom = document.getElementById('srModalDateFrom').value || '';
    _srModalDateTo   = document.getElementById('srModalDateTo').value   || '';
    _srModalTxns = null;
    _srModalFetchAndRender();
  });

  // Corporation filter dropdown
  const corpSel = document.getElementById('srModalCorpFilter');
  if (corpSel) {
    corpSel.addEventListener('change', () => {
      if (_srModalTxns !== null) _srModalRender();
    });
  }

  // Commission Calculator modal
  document.getElementById('commCalcClose').addEventListener('click', closeCommCalcModal);
  document.getElementById('commCalcModal').addEventListener('click', e => {
    if (e.target === document.getElementById('commCalcModal')) closeCommCalcModal();
  });
  document.getElementById('commCalcModal').querySelectorAll('[data-commcalc-range]').forEach(btn => {
    btn.addEventListener('click', () => commCalcSetRange(parseInt(btn.dataset.commcalcRange, 10)));
  });
  document.getElementById('commCalcApply').addEventListener('click', () => {
    _runCommCalc();
  });
});

// ── Commission Calculator Modal ───────────────────────────────────────────────
const DEFAULT_TOKEN_COST_SGD = 0.10;
let _commCalcUsername   = '';
let _commCalcCommission = 0;

function openCommCalcModal(username, commissionRate) {
  _commCalcUsername   = username;
  _commCalcCommission = commissionRate;
  document.getElementById('commCalcTitle').textContent =
    `Commission Calculator — @${username} (${commissionRate}% rate)`;
  document.getElementById('commCalcFrom').value = '';
  document.getElementById('commCalcTo').value   = '';
  document.getElementById('commCalcResult').style.display = 'none';
  document.getElementById('commCalcModal').style.display = 'flex';
}

function closeCommCalcModal() {
  document.getElementById('commCalcModal').style.display = 'none';
}

function commCalcSetRange(days) {
  if (days === 0) {
    document.getElementById('commCalcFrom').value = '';
    document.getElementById('commCalcTo').value   = '';
  } else {
    const now  = new Date();
    const from = new Date(now.getTime() - days*24*60*60*1000);
    document.getElementById('commCalcFrom').value = from.toISOString().slice(0,10);
    document.getElementById('commCalcTo').value   = now.toISOString().slice(0,10);
  }
}

async function _runCommCalc() {
  const fromVal = document.getElementById('commCalcFrom').value || '';
  const toVal   = document.getElementById('commCalcTo').value   || '';
  const applyBtn = document.getElementById('commCalcApply');
  applyBtn.disabled = true; applyBtn.textContent = 'Loading…';
  try {
    let url = `${API}/admin/sales-rep/${encodeURIComponent(_commCalcUsername)}/transactions`;
    const params = new URLSearchParams();
    if (fromVal) params.set('from', fromVal);
    if (toVal)   params.set('to',   toVal);
    if ([...params].length) url += '?' + params.toString();
    const r = await fetch(url, { credentials: 'same-origin' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const txns = data.transactions || [];
    const spendTxns = txns.filter(t => (t.transaction_type||'').toLowerCase() === 'spend');
    const totalSpent = spendTxns.reduce((s, t) => {
      if (t.revenue_sgd != null) return s + (parseFloat(t.revenue_sgd)||0);
      if (t.token_cost_sgd != null) {
        const tokenAmount = t.transaction_amount != null
          ? Math.abs(parseInt(t.transaction_amount, 10) || 0)
          : (parseInt(t.token_usage, 10) || 0);
        return s + tokenAmount * (parseFloat(t.token_cost_sgd) || DEFAULT_TOKEN_COST_SGD);
      }
      return s;
    }, 0);
    const commPayable = totalSpent * _commCalcCommission / 100;
    document.getElementById('commCalcSpent').textContent   = 'SGD ' + totalSpent.toFixed(2);
    document.getElementById('commCalcPayable').textContent = 'SGD ' + commPayable.toFixed(2);
    document.getElementById('commCalcRate').textContent    = _commCalcCommission + '%';
    document.getElementById('commCalcCount').textContent   = txns.length;
    document.getElementById('commCalcResult').style.display = 'block';
  } catch (_) {
    document.getElementById('commCalcResult').style.display = 'none';
    alert('Could not calculate commission. Please try again.');
  } finally {
    applyBtn.disabled = false; applyBtn.textContent = 'Calculate';
  }
}

// ── Auto-redirect if already logged in ───────────────────────────────────────
(async () => {
  // Don't auto-login if the user explicitly logged out this session
  if (sessionStorage.getItem('admin_logged_out')) return;
  try {
    const r = await fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' });
    if (r.status === 200) {
      const rlData = await r.json();
      _config = rlData.config || { defaults: {}, users: {}, system: {}, tokens: {}, access_levels: {}, ml: {} };
      if (!_config.system) _config.system = {};
      if (!_config.tokens) _config.tokens = {};
      if (!_config.access_levels) _config.access_levels = {};
      if (!_config.ml) _config.ml = {};
      // "admin" access level must always be present and is protected from deletion
      if (!_config.access_levels['admin']) _config.access_levels['admin'] = {};
      _users  = rlData.users  || [];
      try {
        const ar = await fetch(`${API}/admin/appeals`, { credentials: 'same-origin' });
        if (ar.ok) { const ad = await ar.json(); _appeals = ad.appeals || []; }
      } catch (_) {}
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = '';
      renderPage(document.getElementById('mainContent'));
    }
  } catch (_) { /* network error — keep login form */ }
})();
</script>
