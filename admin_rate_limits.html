    <button class="tm-view-tab active" data-view="all">All Tests</button>
    <button class="tm-view-tab" data-view="failed">❌ Failed Tests <span class="tm-count-badge" id="tmFailTabBadge"></span></button>`;
  card.appendChild(viewTabs);

  // ── Scrollable body: filter bar + suite list (All Tests view) ─────────────
  const scrollBody = document.createElement('div');
  scrollBody.className = 'tm-scroll-body';
  scrollBody.id = 'tmAllView';
  card.appendChild(scrollBody);

  // ── Failed Tests view (hidden by default) ─────────────────────────────────
  const failView = document.createElement('div');
  failView.className = 'tm-scroll-body tm-fail-view';
  failView.id = 'tmFailedView';
  failView.style.display = 'none';
  card.appendChild(failView);

  // Tab switching
  viewTabs.addEventListener('click', e => {
    const tab = e.target.closest('.tm-view-tab');
    if (!tab) return;
    const view = tab.dataset.view;
    viewTabs.querySelectorAll('.tm-view-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    scrollBody.style.display = view === 'all'    ? '' : 'none';
    failView.style.display   = view === 'failed' ? '' : 'none';
    if (view === 'failed') _tmRefreshFailedView();
  });

  // ── Filter bar ────────────────────────────────────────────────────────────
  const filterBar = document.createElement('div');
  filterBar.className = 'tm-filter-bar';
  filterBar.innerHTML = `
    <label>Filter:</label>
    <button class="tm-filter-chip active" data-pf="all">All</button>
    <button class="tm-filter-chip" data-pf="critical">🔴 Critical</button>
    <button class="tm-filter-chip" data-pf="high">🟠 High</button>
    <button class="tm-filter-chip" data-pf="medium">🔵 Medium</button>
    <button class="tm-filter-chip" data-pf="low">⚪ Low</button>`;
  scrollBody.appendChild(filterBar);

  // ── Test suites list ───────────────────────────────────────────────────────
  const suitesWrap = document.createElement('div');
  suitesWrap.id = 'tmSuitesWrap';
  scrollBody.appendChild(suitesWrap);

  // Render all suites
  function renderSuites(filterPriority) {
    suitesWrap.innerHTML = '';
    const filtered = filterPriority === 'all' ? TM_SUITES : TM_SUITES.filter(s => s.priority === filterPriority);

    // Group by priority sections when showing all
    const sections = filterPriority === 'all'
      ? [
          { key: 'critical', label: '🔴 Critical — Must pass before production' },
          { key: 'high',     label: '🟠 High — Core flows and user impact' },
          { key: 'medium',   label: '🔵 Medium — UX edge cases and observability' },
          { key: 'low',      label: '⚪ Low — Accessibility and visual details' },
        ]
      : [{ key: filterPriority, label: '' }];

    sections.forEach(sec => {
      const group = filtered.filter(s => s.priority === sec.key);
      if (!group.length) return;

      if (filterPriority === 'all') {
        const secTitle = document.createElement('div');
        secTitle.className = 'tm-section-title';
        secTitle.textContent = sec.label;
        suitesWrap.appendChild(secTitle);
      }

      group.forEach(suite => {
        const suiteEl = document.createElement('div');
        suiteEl.className = 'tm-suite';
        suiteEl.id = 'tmSuite-' + suite.id;

        const passCnt = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'pass').length;
        const failCnt = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'fail').length;
        const totalCnt = suite.tests.length;

        const header = document.createElement('div');
        header.className = 'tm-suite-header';
        header.innerHTML = `
          <span class="tm-priority-badge ${suite.priority}">${suite.priority}</span>
          <span class="tm-suite-title">${escHtml(suite.name)}</span>
          <span class="tm-suite-file">${escHtml(suite.file)}</span>
          <span class="tm-suite-pass-count" style="font-size:11px;color:var(--muted);margin-left:6px">${passCnt}/${totalCnt} pass</span>
          ${failCnt > 0 ? `<span class="badge badge-fail tm-suite-fail-badge" style="margin-left:4px">${failCnt} fail</span>` : ''}
          <button class="tm-suite-run-btn" data-run-suite="${escHtml(suite.id)}" title="Run this suite">▶ Run</button>
          <span class="tm-suite-chevron">▶</span>`;
        suiteEl.appendChild(header);

        const body = document.createElement('div');
        body.className = 'tm-suite-body';

        suite.tests.forEach(test => {
          const row = document.createElement('div');
          row.className = 'tm-test-row';
          const status = _tmGetStatus(suite.id, test.id);
          const savedSkipReason = _tmGetSkipReason(suite.id, test.id);
          const showSkip = (status === 'skip' && savedSkipReason) ? 'block' : 'none';
          row.innerHTML = `
            <div class="tm-test-row-main">
              <span class="tm-test-name">
                ${escHtml(test.name)}
                <code>${escHtml(suite.id + '::' + test.id)}</code>
              </span>
              <button class="tm-status-btn ${status}" data-suite="${escHtml(suite.id)}" data-test="${escHtml(test.id)}" title="Click to cycle status">${_tmStatusLabel(status)}</button>
            </div>
            <div class="tm-skip-reason" data-test="${escHtml(test.id)}" style="display:${showSkip}"></div>`;
          // Set skip reason text safely via textContent (no XSS)
          const srEl = row.querySelector('.tm-skip-reason');
          if (srEl && savedSkipReason && status === 'skip') srEl.textContent = '⚠ ' + savedSkipReason;
          body.appendChild(row);
        });

        suiteEl.appendChild(body);

        header.addEventListener('click', () => {
          const open = body.classList.toggle('open');
          header.classList.toggle('open', open);
        });

        suitesWrap.appendChild(suiteEl);
      });
    });

    // Status-cycle click delegation
    suitesWrap.addEventListener('click', e => {
      // ── Per-suite run button ──────────────────────────────────────────────
      const runSuiteBtn = e.target.closest('.tm-suite-run-btn');
      if (runSuiteBtn) {
        e.stopPropagation();
        const sid = runSuiteBtn.dataset.runSuite;
        const suiteData = TM_SUITES.find(s => s.id === sid);
        if (suiteData) _tmRunSuite(suiteData, runSuiteBtn);
        return;
      }
      // ── Status-cycle click delegation ─────────────────────────────────────
      const btn = e.target.closest('.tm-status-btn');
      if (!btn) return;
      const sid = btn.dataset.suite;
      const tid = btn.dataset.test;
      const cur = _tmGetStatus(sid, tid);
      const next = { pending: 'pass', pass: 'fail', fail: 'skip', skip: 'pending' }[cur] || 'pending';
      _tmSetStatus(sid, tid, next);
      btn.className = 'tm-status-btn ' + next;
      btn.textContent = _tmStatusLabel(next);

      // When cycling away from skip, clear the stored reason
      if (cur === 'skip') {
        _tmSetSkipReason(sid, tid, '');
        const skipEl = btn.closest('.tm-test-row') && btn.closest('.tm-test-row').querySelector('.tm-skip-reason');
        if (skipEl) { skipEl.style.display = 'none'; skipEl.textContent = ''; }
      }

      // Refresh suite header counters
      _tmRefreshSuiteHeader(sid);
    });
  }

  renderSuites('all');
  // Populate the live coverage summary from any previously-saved localStorage state
  _tmRefreshLiveSummary();

  // Filter chip clicks
  filterBar.addEventListener('click', e => {
    const chip = e.target.closest('.tm-filter-chip');
    if (!chip) return;
    filterBar.querySelectorAll('.tm-filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderSuites(chip.dataset.pf);
  });

  // ── Health check runner ──────────────────────────────────────────────────
  async function runHealthChecks() {
    const runBtn = document.getElementById('tmRunHealthBtn');
    if (runBtn) { runBtn.disabled = true; runBtn.textContent = '⏳ Checking…'; }
    _tmLog('⚡ Running live API health checks…', 'run');

    const failures = [];
    await Promise.all(TM_HEALTH_CHECKS.map(async c => {
      const dot  = document.getElementById('tmDot-' + c.id);
      const code = document.getElementById('tmCode-' + c.id);
      if (dot)  dot.className  = 'tm-health-dot checking';
      if (code) code.textContent = '…';
      try {
        const r = await fetch(`${API}${c.url}`, { credentials: 'same-origin' });
        if (dot)  dot.className  = r.ok ? 'tm-health-dot ok' : 'tm-health-dot fail';
        if (code) code.textContent = String(r.status);
        _tmLog('  ' + (r.ok ? '✅' : '❌') + '  ' + c.label + ' → HTTP ' + r.status, r.ok ? 'ok' : 'fail');
        if (!r.ok && c.priority === 'critical') {
          failures.push(`${c.label} (HTTP ${r.status})`);
        }
      } catch (err) {
        if (dot)  dot.className  = 'tm-health-dot fail';
        if (code) code.textContent = 'ERR';
        _tmLog('  ❌  ' + c.label + ' → network error', 'fail');
        if (c.priority === 'critical') {
          failures.push(`${c.label} (network error)`);
        }
      }
    }));

    // Update alert banner
    const banner = document.getElementById('tmAlertBanner');
    const list   = document.getElementById('tmAlertList');
    if (banner && list) {
      if (failures.length > 0) {
        list.innerHTML = failures.map(f => `<li>${escHtml(f)}</li>`).join('');
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }
    }

    if (failures.length === 0) {
      _tmLog('✅ All health checks passed.', 'ok');
    } else {
      _tmLog('❌ ' + failures.length + ' critical endpoint(s) failing.', 'fail');
    }
    if (runBtn) { runBtn.disabled = false; runBtn.textContent = '↺ Run Checks'; }
  }

  setTimeout(() => {
    const runBtn = document.getElementById('tmRunHealthBtn');
    if (runBtn) runBtn.addEventListener('click', runHealthChecks);
    const clearBtn = document.getElementById('tmClearLogBtn');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      const body = document.getElementById('tmLogBody');
      if (body) body.innerHTML = '<div class="tm-log-entry run">[cleared] Log cleared.</div>';
    });
    // Auto-run health checks when tab is first rendered
    runHealthChecks();
  }, 0);

  return card;
}

function _tmStatusKey(suiteId, testId) { return 'tm_' + suiteId + '_' + testId; }
function _tmGetStatus(suiteId, testId) {
  try { return localStorage.getItem(_tmStatusKey(suiteId, testId)) || 'pending'; } catch (_) { return 'pending'; }
}
function _tmSetStatus(suiteId, testId, status) {
  try { localStorage.setItem(_tmStatusKey(suiteId, testId), status); } catch (_) {}
  // Clear stored fail reason when manually cycling away from 'fail'
  if (status !== 'fail') _tmSetFailReason(suiteId, testId, '');
  _tmRefreshLiveSummary();
  _tmRefreshFailedView();
}
function _tmStatusLabel(s) {
  return { pending: '⏳ Pending', pass: '✅ Pass', fail: '❌ Fail', skip: '⏭ Skip' }[s] || '⏳ Pending';
}

// ── Skip-reason storage ───────────────────────────────────────────────────────
function _tmSkipReasonKey(suiteId, testId) { return 'tmSkip_' + suiteId + '_' + testId; }
function _tmGetSkipReason(suiteId, testId) {
  try { return localStorage.getItem(_tmSkipReasonKey(suiteId, testId)) || ''; } catch (_) { return ''; }
}
function _tmSetSkipReason(suiteId, testId, reason) {
  try { if (reason) localStorage.setItem(_tmSkipReasonKey(suiteId, testId), reason);
        else localStorage.removeItem(_tmSkipReasonKey(suiteId, testId)); } catch (_) {}
}

// ── Fail-reason storage ───────────────────────────────────────────────────────
function _tmFailReasonKey(suiteId, testId) { return 'tmFail_' + suiteId + '_' + testId; }
function _tmGetFailReason(suiteId, testId) {
  try { return localStorage.getItem(_tmFailReasonKey(suiteId, testId)) || ''; } catch (_) { return ''; }
}
function _tmSetFailReason(suiteId, testId, reason) {
  try { if (reason) localStorage.setItem(_tmFailReasonKey(suiteId, testId), reason);
        else localStorage.removeItem(_tmFailReasonKey(suiteId, testId)); } catch (_) {}
}

// ── Suite header refresh helper ───────────────────────────────────────────────
function _tmRefreshSuiteHeader(suiteId) {
  const suite = window.TM_SUITES_REF && window.TM_SUITES_REF.find(s => s.id === suiteId);
  if (!suite) return;
  const suiteEl = document.getElementById('tmSuite-' + suiteId);
  if (!suiteEl) return;
  const hdr = suiteEl.querySelector('.tm-suite-header');
  if (!hdr) return;
  const passCount = suite.tests.filter(t => _tmGetStatus(suiteId, t.id) === 'pass').length;
  const failCount = suite.tests.filter(t => _tmGetStatus(suiteId, t.id) === 'fail').length;
  const passSpan  = hdr.querySelector('.tm-suite-pass-count');
  if (passSpan) passSpan.textContent = passCount + '/' + suite.tests.length + ' pass';
  const failBadge = hdr.querySelector('.tm-suite-fail-badge');
  if (failCount > 0 && failBadge) {
    failBadge.textContent = failCount + ' fail';
  } else if (failCount > 0 && !failBadge) {
    const chevron = hdr.querySelector('.tm-suite-chevron');
    const nb = document.createElement('span');
    nb.className = 'badge badge-fail tm-suite-fail-badge'; nb.style.marginLeft = '4px';
    nb.textContent = failCount + ' fail';
    hdr.insertBefore(nb, chevron);
  } else if (failCount === 0 && failBadge) {
    failBadge.remove();
  }
}

/**
 * Recompute and render the Live Coverage Summary panel from current localStorage state.
 * Called after every status change.
 */
function _tmRefreshLiveSummary() {
  let pass = 0, fail = 0, skip = 0, pending = 0;
  const allSuites = window.TM_SUITES_REF;
  if (!allSuites) {
    // Suites not yet initialised — reset coverage panel to zero state
    const bar = document.getElementById('tmCovBar');
    const pctEl = document.getElementById('tmCovPct');
    if (bar) { bar.style.width = '0%'; bar.className = 'tm-progress-bar danger'; }
    if (pctEl) pctEl.textContent = '0%';
    return;
  }

  const fullPassed = [];   // suites where every test is pass
  const hasFail   = [];    // suites with at least one fail

  allSuites.forEach(suite => {
    let sp = 0, sf = 0, ss = 0, sn = 0;
    suite.tests.forEach(t => {
      const st = _tmGetStatus(suite.id, t.id);
      if (st === 'pass')    { sp++; pass++; }
      else if (st === 'fail')  { sf++; fail++; }
      else if (st === 'skip')  { ss++; skip++; }
      else                     { sn++; pending++; }
    });
    if (sp === suite.tests.length && suite.tests.length > 0) fullPassed.push(suite);
    if (sf > 0) hasFail.push({ suite, failCount: sf });
  });

  const total = pass + fail + skip + pending;
  const pct   = total > 0 ? Math.round((pass / total) * 100) : 0;

  // Progress bar
  const bar = document.getElementById('tmCovBar');
  const pctEl = document.getElementById('tmCovPct');
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'tm-progress-bar' + (pct >= 80 ? '' : pct >= 50 ? ' warn' : ' danger');
  }
  if (pctEl) pctEl.textContent = pct + '%';

  // Counters
  if (document.getElementById('tmCovPass'))  document.getElementById('tmCovPass').textContent  = pass;
  if (document.getElementById('tmCovFail'))  document.getElementById('tmCovFail').textContent  = fail;
  if (document.getElementById('tmCovSkip'))  document.getElementById('tmCovSkip').textContent  = skip;
  if (document.getElementById('tmCovPend'))  document.getElementById('tmCovPend').textContent  = pending;

  // Fully-addressed list
  const passedList = document.getElementById('tmCovPassed');
  if (passedList) {
    if (fullPassed.length === 0) {
      passedList.innerHTML = '<li class="tm-cov-empty">No suites fully passed yet.</li>';
    } else {
      passedList.innerHTML = fullPassed.map(s =>
        `<li><span class="cov-badge badge-full">PASS</span>${escHtml(s.name)}</li>`
      ).join('');
    }
  }

  // Needs-attention list
  const failedList = document.getElementById('tmCovFailed');
  if (failedList) {
    if (hasFail.length === 0) {
      failedList.innerHTML = '<li class="tm-cov-empty">No failures detected.</li>';
    } else {
      failedList.innerHTML = hasFail.map(({ suite, failCount }) =>
        `<li><span class="cov-badge badge-fail">${failCount} FAIL</span>${escHtml(suite.name)}</li>`
      ).join('');
    }
  }
}

/**
 * Rebuild and render the "❌ Failed Tests" tab content.
 * Creates a card per failed test with reason, impacted files, and a Gemini AI diagnostic button.
 */
function _tmRefreshFailedView() {
  const wrap = document.getElementById('tmFailedView');
  if (!wrap) return;
  const allSuites = window.TM_SUITES_REF;
  if (!allSuites) return;

  const failedItems = [];
  allSuites.forEach(suite => {
    suite.tests.forEach(test => {
      if (_tmGetStatus(suite.id, test.id) === 'fail') {
        failedItems.push({ suite, test, reason: _tmGetFailReason(suite.id, test.id) });
      }
    });
  });

  // Update badge count on the tab
  const badge = document.getElementById('tmFailTabBadge');
  if (badge) badge.textContent = failedItems.length || '';

  if (failedItems.length === 0) {
    wrap.innerHTML = '<div class="tm-fail-empty">✅ No failing tests — all checked tests are passing or skipped.</div>';
    return;
  }

  wrap.innerHTML = '';
  failedItems.forEach(({ suite, test, reason }) => {
    const card = document.createElement('div');
    card.className = 'tm-fail-card';

    const filesHTML = (suite.impactedFiles || []).map(f => `<code>${escHtml(f)}</code>`).join(', ');
    const diagId = 'tmDiag_' + suite.id + '_' + test.id;

    card.innerHTML = `
      <div class="tm-fail-card-header">
        <span class="tm-priority-badge ${escHtml(suite.priority)}">${escHtml(suite.priority)}</span>
        <div style="flex:1">
          <div class="tm-fail-card-title">❌ ${escHtml(test.name)}</div>
          <div class="tm-fail-card-meta">${escHtml(suite.name)} · ${escHtml(suite.id + '::' + test.id)}</div>
        </div>
      </div>
      <div class="tm-fail-card-body">
        ${reason ? `<div class="tm-fail-reason">${escHtml(reason)}</div>` : ''}
        ${filesHTML ? `<div class="tm-fail-impact"><strong>Impacted files:</strong> ${filesHTML}</div>` : ''}
        <button class="tm-gemini-diag-btn" data-diagid="${escHtml(diagId)}" data-suite="${escHtml(suite.id)}" data-test="${escHtml(test.id)}" data-suitename="${escHtml(suite.name)}">
          ✨ Diagnose with Gemini AI
        </button>
        <div class="tm-diag-panel" id="${escHtml(diagId)}">
          <div class="tm-diag-panel-header">🤖 Gemini AI Diagnostic</div>
          <div class="tm-diag-panel-body">
            <div class="tm-diag-section">
              <h5>Explanation</h5>
              <div class="tm-diag-output" id="${escHtml(diagId)}_exp"></div>
            </div>
            <div class="tm-diag-section">
              <h5>Suggested Fix</h5>
              <div class="tm-diag-output" id="${escHtml(diagId)}_fix"></div>
            </div>
            <div class="tm-diag-section">
              <h5>Test Case / Verification Steps</h5>
              <div class="tm-diag-output" id="${escHtml(diagId)}_tc"></div>
            </div>
          </div>
        </div>
      </div>`;

    // Wire Gemini button
    const diagBtn = card.querySelector('.tm-gemini-diag-btn');
    if (diagBtn) {
      diagBtn.addEventListener('click', async () => {
        const panel = document.getElementById(diagId);
        const expEl = document.getElementById(diagId + '_exp');
        const fixEl = document.getElementById(diagId + '_fix');
        const tcEl  = document.getElementById(diagId + '_tc');
        if (!panel || !expEl || !fixEl) return;

        // Toggle open
        panel.classList.add('open');
        diagBtn.disabled = true;
        diagBtn.textContent = '⏳ Analysing…';
        expEl.className = 'tm-diag-output loading'; expEl.textContent = 'Calling Gemini…';
        fixEl.textContent = '';
        if (tcEl) tcEl.textContent = '';

        const errorMessage = reason || ('Test failed: ' + suite.name + ' :: ' + test.name + ' (' + test.id + ')');
        const source = suite.name + ' :: ' + test.id +
          (suite.impactedFiles && suite.impactedFiles.length ? ' [files: ' + suite.impactedFiles.join(', ') + ']' : '');

        try {
          const r = await fetch(`${API}/admin/logs/analyse-error`, {
            method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
            body: JSON.stringify({ error_message: errorMessage, source }),
          });
          if (r.ok) {
            const data = await r.json();
            expEl.className = 'tm-diag-output'; expEl.textContent = data.explanation || '—';
            fixEl.textContent = data.suggested_fix || '—';
            if (tcEl) tcEl.textContent = data.test_case || '—';
            diagBtn.disabled = false; diagBtn.innerHTML = '✨ Re-analyse';
          } else if (r.status === 403) {
            expEl.className = 'tm-diag-output error-state';
            expEl.textContent = '⛔ Access denied (HTTP 403). Ensure you are logged in as an admin. If this persists, check that your account has admin access (useraccess=admin) in the database.';
            diagBtn.disabled = false; diagBtn.innerHTML = '✨ Diagnose with Gemini AI';
          } else if (r.status === 401) {
            expEl.className = 'tm-diag-output error-state';
            expEl.textContent = '🔐 Not authenticated (HTTP 401). Please log in as an admin and try again.';
            diagBtn.disabled = false; diagBtn.innerHTML = '✨ Diagnose with Gemini AI';
          } else if (r.status === 404) {
            expEl.className = 'tm-diag-output error-state';
            expEl.textContent = 'Gemini analysis endpoint unavailable. The server may not have GEMINI_API_KEY configured, or the /admin/logs/analyse-error route is not active.';
            diagBtn.disabled = false; diagBtn.innerHTML = '✨ Diagnose with Gemini AI';
          } else {
            const data = await r.json().catch(() => ({}));
            expEl.className = 'tm-diag-output error-state';
            expEl.textContent = data.error || 'Analysis failed.';
            diagBtn.disabled = false; diagBtn.innerHTML = '✨ Re-analyse';
          }
        } catch (err) {
          expEl.className = 'tm-diag-output error-state';
          expEl.textContent = 'Network error: ' + err.message;
          diagBtn.disabled = false; diagBtn.innerHTML = '✨ Re-analyse';
        }
      });
    }

    wrap.appendChild(card);
  });
}

/** Append a timestamped entry to the activity log panel. */
function _tmLog(msg, type) {
  const body = document.getElementById('tmLogBody');
  if (!body) return;
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const entry = document.createElement('div');
  entry.className = 'tm-log-entry ' + (type || '');
  entry.textContent = '[' + ts + '] ' + msg;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

/**
 * Automated per-test execution engine.
 *
 * Rules (per user spec):
 *  • Pass    – Feature tested via real API call; expected HTTP status + headers confirmed.
 *  • Fail    – API returned unexpected status or header check failed.
 *  • Pending – Test is in-flight (fetch running). Transitions to Skip on timeout.
 *  • Skip    – Missing condition (Python env, Playwright, k6, Docker). Informs admin of
 *              exactly what to run and what conditions are required.
 *
 * API_TIMEOUT_MS: after this many ms with no response the test is considered Skip.
 */
const TM_API_TIMEOUT_MS = 10000; // 10 s

async function _tmRunTest(suite, test, domBtn, skipReasonEl) {
  const { autoCheck } = test;

  // Transition to pending (in-flight)
  _tmSetStatus(suite.id, test.id, 'pending');
  if (domBtn) { domBtn.className = 'tm-status-btn pending'; domBtn.textContent = _tmStatusLabel('pending'); }
  if (skipReasonEl) { skipReasonEl.style.display = 'none'; skipReasonEl.textContent = ''; }

  if (!autoCheck) {
    // No check defined — stay pending
    return 'pending';
  }

  let result = { status: 'pending', reason: '' };

  if (autoCheck.type === 'api') {
    // ── Live API check ────────────────────────────────────────────────────────
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TM_API_TIMEOUT_MS);
    try {
      const opts = { signal: controller.signal, credentials: 'same-origin', method: autoCheck.method || 'GET' };
      if (autoCheck.body) {
        opts.body = JSON.stringify(autoCheck.body);
        opts.headers = { 'Content-Type': 'application/json' };
      }
      const resp = await fetch(`${API}${autoCheck.url}`, opts);
      clearTimeout(timeoutId);

      const expectedOk = autoCheck.expectedStatus
        ? resp.status === autoCheck.expectedStatus
        : resp.ok;

      if (!expectedOk) {
        result = { status: 'fail', reason: `Expected HTTP ${autoCheck.expectedStatus || '2xx'}, got HTTP ${resp.status}.` };
      } else if (autoCheck.headerChecks && autoCheck.headerChecks.length > 0) {
        // Header assertions
        const issues = [];
        autoCheck.headerChecks.forEach(hc => {
          const val = resp.headers.get(hc.header);
          if (hc.mustExist && !val) {
            issues.push(`Missing header: ${hc.header}`);
          }
          if (hc.mustNotContain && val && val.includes(hc.mustNotContain)) {
            issues.push(`Header ${hc.header} contains forbidden value "${hc.mustNotContain}"`);
          }
        });
        if (issues.length > 0) {
          result = { status: 'fail', reason: `HTTP ${resp.status} but header checks failed:\n• ${issues.join('\n• ')}` };
        } else {
          result = { status: 'pass', reason: `HTTP ${resp.status} — all ${autoCheck.headerChecks.length} header check(s) passed.` };
        }
      } else {
        result = { status: 'pass', reason: `HTTP ${resp.status} — endpoint responded as expected.` };
      }
    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') {
        result = { status: 'skip', reason: `Timed out after ${TM_API_TIMEOUT_MS / 1000} s — endpoint did not respond.\nCheck server availability or network connectivity.` };
      } else {
        result = { status: 'skip', reason: `Network error — endpoint unreachable or blocked.\nError: ${err.message}` };
      }
    }
  } else if (autoCheck.type === 'run-tests') {
    // ── Backend pytest — call /admin/run-tests, get real pass/fail/skip ───────
    try {
      const resp = await fetch(`${API}/admin/run-tests`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-Requested-With': 'XMLHttpRequest',
          'X-CSRF-Token': (document.querySelector('meta[name="csrf-token"]') || {}).content || ''
        },
        body: JSON.stringify({ file: autoCheck.file, testKey: autoCheck.testKey })
      });
      if (!resp.ok) {
        const txt = await resp.text().catch(() => resp.status);
        result = { status: 'skip', reason: `Server returned HTTP ${resp.status}: ${txt}\nRun manually: ${autoCheck.cmd}` };
      } else {
        const data = await resp.json();
        const out = (data.output || '').trim();
        if (data.status === 'pass') {
          result = { status: 'pass', reason: out || 'All tests passed.' };
        } else if (data.status === 'fail') {
          result = { status: 'fail', reason: out || `pytest exited ${data.returncode}` };
        } else {
          result = { status: 'skip', reason: out || `No tests collected (exit ${data.returncode}).\nRun manually: ${autoCheck.cmd}` };
        }
      }
    } catch (err) {
      result = { status: 'skip', reason: `Could not reach /admin/run-tests: ${err.message}\nRun manually: ${autoCheck.cmd}` };
    }
  } else if (autoCheck.type === 'run-e2e') {
    // ── Playwright E2E — call /admin/run-tests with the spec file ─────────────
    try {
      const resp = await fetch(`${API}/admin/run-tests`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-Requested-With': 'XMLHttpRequest',
          'X-CSRF-Token': (document.querySelector('meta[name="csrf-token"]') || {}).content || ''
        },
        body: JSON.stringify({ file: autoCheck.file, grepPat: autoCheck.grepPat })
      });
      if (!resp.ok) {
        const txt = await resp.text().catch(() => resp.status);
        result = { status: 'skip', reason: `Server returned HTTP ${resp.status}: ${txt}\nRun manually: ${autoCheck.cmd}` };
      } else {
        const data = await resp.json();
        const out = (data.output || '').trim();
        if (data.status === 'pass') {
          result = { status: 'pass', reason: out || 'All Playwright tests passed.' };
        } else if (data.status === 'fail') {
          result = { status: 'fail', reason: out || `Playwright exited ${data.returncode}` };
        } else {
          result = { status: 'skip', reason: out || `No tests collected (exit ${data.returncode}).\nRun manually: ${autoCheck.cmd}` };
        }
      }
    } catch (err) {
      result = { status: 'skip', reason: `Could not reach /admin/run-tests: ${err.message}\nRun manually: ${autoCheck.cmd}` };
    }
  } else {
    // ── Load test (k6) — cannot run from browser ──────────────────────────────
    // Brief pause so the admin can see the pending state before the skip result appears
    await new Promise(r => setTimeout(r, 120));
    result = { status: 'skip', reason: autoCheck.skipReason || 'Cannot verify from browser.' };
  }

  // Apply result
  // Append impacted file list to fail reason so the admin knows which files to inspect
  if (result.status === 'fail' && suite.impactedFiles && suite.impactedFiles.length > 0) {
    result.reason = (result.reason ? result.reason + '\n\n' : '') +
      'Impacted files: ' + suite.impactedFiles.join(', ');
  }
  _tmSetStatus(suite.id, test.id, result.status);
  // Store fail reason so the Failed Tests tab can display it
  _tmSetFailReason(suite.id, test.id, result.status === 'fail' ? result.reason : '');
  if (domBtn) { domBtn.className = 'tm-status-btn ' + result.status; domBtn.textContent = _tmStatusLabel(result.status); }

  // Persist and display reason (skip reason box also shows pytest output for pass/fail)
  _tmSetSkipReason(suite.id, test.id, result.status === 'skip' ? result.reason : '');
  if (skipReasonEl) {
    if (result.reason && (result.status === 'skip' || result.status === 'fail')) {
      skipReasonEl.textContent = (result.status === 'skip' ? '\u26a0 ' : '\u274c ') + result.reason;
      skipReasonEl.style.display = 'block';
    } else if (result.status === 'pass' && result.reason) {
      skipReasonEl.textContent = '\u2705 ' + result.reason;
      skipReasonEl.style.display = 'block';
    } else {
      skipReasonEl.style.display = 'none';
      skipReasonEl.textContent = '';
    }
  }
  // Refresh the Failed Tests tab whenever a test result changes
  _tmRefreshFailedView();

  return result.status;
}

async function _tmRunSuite(suite, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="tm-spinning">↻</span> Running';
  _tmLog('▶ Running suite: ' + suite.name + '  (' + suite.file + ')', 'run');

  // Pre-build DOM-element maps for buttons and skip reason divs
  const suiteEl = document.getElementById('tmSuite-' + suite.id);
  const btnMap     = new Map();
  const skipMap    = new Map();
  if (suiteEl) {
    suiteEl.querySelectorAll('.tm-status-btn').forEach(b => btnMap.set(b.dataset.test, b));
    suiteEl.querySelectorAll('.tm-skip-reason').forEach(d => skipMap.set(d.dataset.test, d));
  }

  for (const test of suite.tests) {
    const domBtn     = btnMap.get(test.id) || null;
    const skipEl     = skipMap.get(test.id) || null;
    const status     = await _tmRunTest(suite, test, domBtn, skipEl);
    const icon       = { pass: '✅', fail: '❌', skip: '⏭', pending: '⏳' }[status] || '⏳';
    const skipReason = status === 'skip' ? _tmGetSkipReason(suite.id, test.id) : '';
    const shortReason = skipReason ? ' (' + skipReason.split('\n')[0] + ')' : '';
    _tmLog('  ' + icon + '  ' + test.name + (status === 'skip' ? shortReason : ''),
           status === 'fail' ? 'fail' : status === 'pass' ? 'ok' : '');
    // Update suite header pass/fail counters after each test for real-time feedback
    _tmRefreshSuiteHeader(suite.id);
  }

  await new Promise(r => setTimeout(r, 150));
  const passCount    = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'pass').length;
  const failCount    = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'fail').length;
  const skipCount    = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'skip').length;
  const pendingCount = suite.tests.filter(t => _tmGetStatus(suite.id, t.id) === 'pending').length;

  if (failCount > 0) {
    _tmLog('❌ Suite done — ' + passCount + ' pass / ' + failCount + ' fail' +
           (skipCount   > 0 ? ' / ' + skipCount   + ' skip'          : '') +
           (pendingCount > 0 ? ' / ' + pendingCount + ' pending'      : ''), 'fail');
  } else if (passCount === suite.tests.length) {
    _tmLog('✅ Suite done — all ' + passCount + '/' + suite.tests.length + ' tests passing.', 'ok');
  } else if (skipCount > 0 && passCount > 0) {
    _tmLog('⏭ Suite done — ' + passCount + ' pass / ' + skipCount +
           ' skip (see skip reasons in the suite accordion)', 'warn');
  } else {
    _tmLog('⏭ Suite done — ' + skipCount + ' skip / ' + pendingCount +
           ' pending — run the external test suite and confirm results', 'warn');
  }

  _tmRefreshLiveSummary();

  btn.disabled = false;
  btn.innerHTML = '▶ Run';
}

// ── Export helpers ────────────────────────────────────────────────────────────
function exportLogsCsv() {
  const cat  = _logsActiveCategory;
  const rows = _logs[cat] || [];
  if (!rows.length) { toast('No data in the current category to export', 'error'); return; }

  // Use fixed column order for the category; supplement with any extra keys found in data
  const fixedCols = LOG_CSV_COLS[cat] || [];
  const extraCols = Array.from(new Set(rows.flatMap(r => Object.keys(r))))
    .filter(k => !fixedCols.includes(k)).sort();
  const keys = [...fixedCols, ...extraCols];

  const csvLines = [keys.join(',')];
  rows.forEach(r => {
    csvLines.push(keys.map(k => {
      const v = String(r[k] ?? '').replace(/"/g, '""');
      return `"${v}"`;
    }).join(','));
  });

  const blob = new Blob([csvLines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href     = url;
  a.download = `system_logs_${cat}_${dateStr}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${rows.length} rows as CSV ✓`, 'success');
}

// ── ML Tab ────────────────────────────────────────────────────────────────────
// Renders the ML (Machine Learning) configuration panel.
// Manages Confidence Level and Number of User Consenses thresholds per access level.
// These control when a user's ML_username.json can be transferred into the ML Master files.
function renderMLCard() {
  const wrap = document.createElement('div');

  // ── Section 1: Transfer Thresholds per Access Level ──────────────────────
  const threshCard = document.createElement('div');
  threshCard.className = 'card';

  const threshTitle = document.createElement('h2');
  threshTitle.style.cssText = 'margin:0 0 6px;font-size:14px;';
  threshTitle.textContent = 'ML Transfer Thresholds — by Access Level';
  threshCard.appendChild(threshTitle);

  const threshDesc = document.createElement('p');
  threshDesc.style.cssText = 'color:var(--muted);font-size:12px;margin:0 0 16px;';
  threshDesc.innerHTML = 'These thresholds must be satisfied before a user can transfer their personal ML JSON file into the Master ML JSON files. ' +
    '<strong>Confidence Level</strong> — the minimum top-score in the Seniority distribution required for transfer. ' +
    '<strong>User Consenses</strong> — the minimum number of candidates in the pool required for transfer.';
  threshCard.appendChild(threshDesc);

  // Access levels are sourced dynamically from _config.access_levels so that
  // only levels created in Per-User Overrides appear here, and any new level
  // is automatically reflected the next time this tab is activated.
  const accessLevelKeys = Object.keys(_config.access_levels || {});

  const mlCfg = _config.ml || {};
  const confidenceLevels = mlCfg.confidence_level || {};
  const userConsenses    = mlCfg.user_consenses    || {};

  // Helper: look up an existing ML value using exact key match first,
  // then case-insensitive fallback (for backward compat with old lowercase keys).
  function mlLookup(map, key, def) {
    if (map[key] !== undefined) return map[key];
    const lk = key.toLowerCase();
    if (map[lk] !== undefined) return map[lk];
    return def;
  }

  const table = document.createElement('table');
  table.className = 'users-table';
  table.style.cssText = 'width:auto;min-width:500px;';
  table.innerHTML = `
    <thead>
      <tr>
        <th style="text-align:left;padding:8px 16px 8px 0;font-size:12px;color:var(--muted);">Access Level</th>
        <th style="text-align:center;padding:8px 16px;font-size:12px;color:var(--muted);">Confidence Level<br><span style="font-weight:400;">(0.0 – 1.0)</span></th>
        <th style="text-align:center;padding:8px 0 8px 16px;font-size:12px;color:var(--muted);">User Consenses<br><span style="font-weight:400;">(candidate count)</span></th>
      </tr>
    </thead>
    <tbody id="mlThreshTableBody"></tbody>`;
  threshCard.appendChild(table);

  const tbody = table.querySelector('#mlThreshTableBody');
  if (accessLevelKeys.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="3" style="padding:12px 0;color:var(--muted);font-size:13px;">No access levels defined. Create one in the <em>Rate Limits → Per-User Overrides</em> tab first.</td>`;
    tbody.appendChild(tr);
  } else {
    for (const lvl of accessLevelKeys) {
      const isAdmin = lvl.toLowerCase() === 'admin';
      const confVal = isAdmin ? 0.5 : mlLookup(confidenceLevels, lvl, 0.7);
      const consVal = isAdmin ? 1   : mlLookup(userConsenses, lvl, 3);
      const tr = document.createElement('tr');
      if (isAdmin) {
        // Admin thresholds are hard-coded and cannot be changed via the UI
        tr.innerHTML = `
          <td style="padding:8px 16px 8px 0;font-size:13px;font-weight:600;color:var(--ad);">
            ${escHtml(lvl)} <span style="font-size:10px;color:var(--muted);font-weight:400;">🔒 fixed</span>
          </td>
          <td style="text-align:center;padding:8px 16px;">
            <input type="number" step="0.05" min="0" max="1" value="0.5"
                   style="width:80px;text-align:center;background:#f5f5f5;color:#888;cursor:not-allowed;"
                   disabled title="Admin confidence threshold is fixed at 0.5">
          </td>
          <td style="text-align:center;padding:8px 0 8px 16px;">
            <input type="number" step="1" min="1" value="1"
                   style="width:80px;text-align:center;background:#f5f5f5;color:#888;cursor:not-allowed;"
                   disabled title="Admin consensus count is fixed at 1">
          </td>`;
      } else {
        tr.innerHTML = `
          <td style="padding:8px 16px 8px 0;font-size:13px;font-weight:600;color:var(--ad);">${escHtml(lvl)}</td>
          <td style="text-align:center;padding:8px 16px;">
            <input type="number" step="0.05" min="0" max="1"
                   data-scope="ml" data-mlkey="confidence_level" data-mllevel="${escHtml(lvl)}"
                   value="${confVal}" style="width:80px;text-align:center;">
          </td>
          <td style="text-align:center;padding:8px 0 8px 16px;">
            <input type="number" step="1" min="1"
                   data-scope="ml" data-mlkey="user_consenses" data-mllevel="${escHtml(lvl)}"
                   value="${consVal}" style="width:80px;text-align:center;">
          </td>`;
      }
      tbody.appendChild(tr);
    }
  }

  // Save button
  const saveRow = document.createElement('div');
  saveRow.style.cssText = 'display:flex;gap:10px;margin-top:16px;align-items:center;';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-success';
  saveBtn.textContent = '💾 Save ML Settings';
  saveBtn.addEventListener('click', async () => {
    // Collect ML threshold inputs into _config.ml
    if (!_config.ml) _config.ml = {};
    if (!_config.ml.confidence_level) _config.ml.confidence_level = {};
    if (!_config.ml.user_consenses)   _config.ml.user_consenses   = {};
    table.querySelectorAll('[data-scope="ml"]').forEach(inp => {
      const mlkey  = inp.dataset.mlkey;
      const mllevel = inp.dataset.mllevel;
      const parsed = parseFloat(inp.value);
      if (mlkey && mllevel && !isNaN(parsed)) {
        if (!_config.ml[mlkey]) _config.ml[mlkey] = {};

  // ── Company table ─────────────────────────────────────────────────────────
  // Helper: build a company-sector row with editable inputs and a delete button
  function _buildSectorCompanyRow(sk, getSectorKey, getCompanyKey, val, isFirstInGroup, onDeleteRow) {

      secInput.title = 'Edit sector name';
      secInput.addEventListener('change', function () {
        const orig = this.dataset.origKey;
        const newName = this.value.trim();
        if (!newName || newName === orig) return;
        const sec = _getCompanySectorDist(sk);
        if (sec && sec[orig] !== undefined) {
          sec[newName] = sec[orig];
          delete sec[orig];
          this.dataset.origKey = newName;
          tr.closest('tbody').querySelectorAll(`[data-sector="${CSS.escape(orig)}"]`).forEach(el => { el.dataset.sector = newName; });

      });
      secTd.appendChild(secInput);
    }
    tr.appendChild(secTd);
    // Company name input (secondary key)
    const compTd = document.createElement('td');
    compTd.style.cssText = 'padding:5px 8px;vertical-align:middle;';

    compInput.type = 'text';
    compInput.value = getCompanyKey();
    compInput.dataset.origKey = getCompanyKey();
    compInput.style.cssText = 'width:140px;font-size:12px;';
    compInput.title = 'Edit company name';
    compInput.addEventListener('change', function () {
      const sec = getSectorKey();
      const orig = this.dataset.origKey;
      const newName = this.value.trim();
      if (!newName || newName === orig) return;
      const sd = _getCompanySectorDist(sk);
      if (sd && sd[sec]) {
        sd[sec][newName] = sd[sec][orig];
        delete sd[sec][orig];
        this.dataset.origKey = newName;
        const countInp = tr.querySelector('[data-company]');
        if (countInp) countInp.dataset.company = newName;
      }
    });
    compTd.appendChild(compInput);
    tr.appendChild(compTd);
    // Count input
    const countTd = document.createElement('td');

    countInput.min = '0';

    countInput.style.cssText = 'width:70px;text-align:center;font-size:12px;';

  // Get the sector object for the company section (handles both consolidated and legacy)
  function _getCompanySectorDist(sk) {
    if (!masterData || !masterData[sk]) return null;
    if (masterData[sk].company && masterData[sk].company.sector) return masterData[sk].company.sector;
    return null;
  }

  function renderCompanyTable(panel, sectionData, sk) {
    const nonMetaEntries = Object.entries(sectionData).filter(
      ([k, v]) => k !== '_meta' && typeof v === 'object' && v !== null
    );
    const isConsolidated = nonMetaEntries.length === 1 && nonMetaEntries[0][0] === 'company' &&
      nonMetaEntries[0][1].sector && nonMetaEntries[0][1]._userCount !== undefined;
    const userKeyedCount = nonMetaEntries.filter(([, v]) => v.sector && v._userCount === undefined).length;
    const isUserKeyed = !isConsolidated && nonMetaEntries.length > 0 && userKeyedCount > nonMetaEntries.length / 2;

    if (isConsolidated) {
      const companyRecord = nonMetaEntries[0][1];
      const sectorData = companyRecord.sector || {};
      const users = (companyRecord._users || []).join(', ');
      const lastUpdated = companyRecord.last_updated || '';

      if (Object.keys(sectorData).length === 0) {
        const msg = document.createElement('p');
        msg.style.cssText = 'font-size:12px;color:var(--muted);padding:10px 0;';
        msg.textContent = 'No sector data found.';
        panel.appendChild(msg);
      } else {
        const meta = document.createElement('div');
        meta.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:10px;';
        meta.textContent = `Contributors: ${users || '—'} · Last updated: ${lastUpdated || '—'}`;
        panel.appendChild(meta);

        // ── Sector filter ────────────────────────────────────────────────────
        const filterRow = document.createElement('div');
        filterRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;';
        const filterLbl = document.createElement('label');
        filterLbl.style.cssText = 'font-size:12px;color:var(--muted);';
        filterLbl.textContent = 'Filter by Sector:';
        const sectorSel = document.createElement('select');
        sectorSel.style.cssText = 'font-size:12px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:#fff;';
        const allOpt = document.createElement('option'); allOpt.value = ''; allOpt.textContent = 'All Sectors';
        sectorSel.appendChild(allOpt);
        for (const sn of Object.keys(sectorData)) {
          const opt = document.createElement('option'); opt.value = sn; opt.textContent = sn;
          sectorSel.appendChild(opt);
        }
        filterRow.appendChild(filterLbl); filterRow.appendChild(sectorSel);
        panel.appendChild(filterRow);

        // ── Confidence Gap control ────────────────────────────────────────────
        const gapRow = document.createElement('div');
        gapRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 10px;background:#f8f9fa;border:1px solid var(--border);border-radius:6px;';
        const gapLbl = document.createElement('label');
        gapLbl.style.cssText = 'font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;';
        gapLbl.textContent = 'Confidence Gap Threshold:';
        const gapInput = document.createElement('input');
        gapInput.type = 'number'; gapInput.step = '0.01'; gapInput.min = '0'; gapInput.max = '1';
        gapInput.placeholder = 'e.g. 0.1';
        gapInput.style.cssText = 'width:90px;font-size:12px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;text-align:center;';
        gapInput.title = 'Attributes with Confidence Gap greater than this threshold will be purged and their confidence redistributed.';
        const gapHelp = document.createElement('span');
        gapHelp.style.cssText = 'font-size:11px;color:var(--muted);';
        gapHelp.textContent = 'Gap = max confidence (per company) − attribute confidence. Entries exceeding threshold are purged and confidence redistributed evenly.';
        const gapBtn = document.createElement('button');
        gapBtn.textContent = 'Sync'; gapBtn.className = 'btn btn-primary';
        gapBtn.style.cssText = 'font-size:12px;padding:4px 14px;';
        gapBtn.title = 'Apply confidence gap purge and redistribute';
        gapBtn.addEventListener('click', () => {
          const threshold = parseFloat(gapInput.value);
          if (isNaN(threshold) || threshold < 0 || threshold > 1) { alert('Please enter a valid threshold between 0 and 1.'); return; }
          const sd = _getCompanySectorDist(sk);
          if (!sd) return;
          // Build company map: companyName -> [{ sector, confidence }]
          const companyMap = {};
          for (const [sec, comps] of Object.entries(sd)) {
            if (typeof comps !== 'object' || comps === null) continue;
            for (const [comp, conf] of Object.entries(comps)) {
              if (!companyMap[comp]) companyMap[comp] = [];
              companyMap[comp].push({ sector: sec, confidence: parseFloat(conf) || 0 });
            }
          }
          let changed = false;
          for (const [companyName, entries] of Object.entries(companyMap)) {
            const maxConf = Math.max(...entries.map(e => e.confidence));
            const keep = entries.filter(e => (maxConf - e.confidence) <= threshold);
            const purged = entries.filter(e => (maxConf - e.confidence) > threshold);
            if (purged.length === 0 || keep.length === 0) continue;
            const totalPurgedConf = purged.reduce((sum, e) => sum + e.confidence, 0);
            const redistPerRemaining = totalPurgedConf / keep.length;
            for (const e of purged) { if (sd[e.sector]) delete sd[e.sector][companyName]; }
            for (const e of keep) { if (sd[e.sector]) sd[e.sector][companyName] = Math.round(Math.min(1, e.confidence + redistPerRemaining) * 1000) / 1000; }
            changed = true;
          }
          if (changed) renderMasterPanel(sk);
          else alert('No attributes exceeded the confidence gap threshold.');
        });
        gapRow.appendChild(gapLbl); gapRow.appendChild(gapInput); gapRow.appendChild(gapBtn); gapRow.appendChild(gapHelp);
        panel.appendChild(gapRow);

        // Build per-company max-confidence map for Gap column
        const _companyMaxConf = {};

          const maxInput = document.createElement('input'); maxInput.type = 'number'; maxInput.step = '1000'; maxInput.min = '0';
          maxInput.dataset.masterSection = sk; maxInput.dataset.user = userKey; maxInput.dataset.rangefield = 'max';
          maxInput.value = String(rangeMax); maxInput.style.cssText = 'width:90px;text-align:center;font-size:12px;';

          delBtn.addEventListener('click', () => deleteUserFromMaster(sk, userKey, () => renderMasterPanel(sk)));
          delTd.appendChild(delBtn); tr.appendChild(delTd);
