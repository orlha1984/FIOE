<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Rate Limit Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Admin Panel  –  nav-sidebar palette
       Black Beauty #222529 · Azure Dragon #073679 · Cool Blue #4c82b8
       Robin's Egg  #6deaf9 · Argent #87888a · Desired Dawn #d8d8d8
    ============================================================ */
    :root {
      --bb:   #222529;  /* Black Beauty  */
      --ad:   #073679;  /* Azure Dragon  */
      --cb:   #4c82b8;  /* Cool Blue     */
      --re:   #6deaf9;  /* Robin's Egg   */
      --arg:  #87888a;  /* Argent        */
      --dd:   #d8d8d8;  /* Desired Dawn  */

      --bg:     #f0f4f8;
      --panel:  #ffffff;
      --primary: var(--ad);
      --danger:  #b00020;
      --success: #1f8a45;
      --border:  #d1dde9;
      --muted:   var(--arg);
      --warn:    #b25f00;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: #182230;
      font-family: "Roboto Condensed", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: var(--bb);
      color: var(--dd);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 300;
    }
    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      font-family: "Orbitron", "Roboto Condensed", sans-serif;
      color: var(--dd);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1::after {
      content: "›";
      color: var(--re);
      font-size: 18px;
      line-height: 1;
      margin-left: 2px;
    }
    #logoutBtn {
      background: rgba(109,234,249,0.10);
      border: 1px solid rgba(109,234,249,0.25);
      color: var(--dd);
      padding: 5px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      font-family: "Roboto Condensed", sans-serif;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    #logoutBtn:hover {
      background: rgba(109,234,249,0.22);
      border-color: var(--re);
      color: var(--re);
    }

    main { max-width: 100%; margin: 0; padding: 0 24px 28px; }
    .page-msg { text-align: center; padding: 32px; font-size: 15px; color: var(--muted); }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 0;
      border-bottom: 1px solid rgba(7,54,121,0.18);
      background: var(--bb);
      border-radius: 8px 8px 0 0;
      padding: 0 6px;
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      border-radius: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      color: var(--arg);
      font-size: 12px;
      letter-spacing: 0.3px;
      font-family: "Roboto Condensed", sans-serif;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab:hover {
      color: var(--dd);
      background: rgba(255,255,255,0.04);
    }
    .tab.active {
      color: var(--re);
      border-bottom-color: var(--re);
      background: rgba(109,234,249,0.06);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── API Keys sub-tabs ───────────────────────────────────────────────── */
    .apikey-sub-tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; }
    .apikey-sub-tab {
      padding:9px 18px; border:none; background:transparent; cursor:pointer;
      font-size:13px; font-weight:500; color:var(--muted);
      border-bottom:2px solid transparent; margin-bottom:-2px;
      transition:color .15s, border-color .15s;
    }
    .apikey-sub-tab:hover { color:var(--text); }
    .apikey-sub-tab.active { color:var(--primary,#1976d2); border-bottom-color:var(--primary,#1976d2); font-weight:600; }
    .apikey-sub-panel { display:none; }
    .apikey-sub-panel.active { display:block; }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0 0 10px 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px -4px rgba(7,54,121,0.08);
    }
    .card:first-child { border-radius: 10px; }
    .card h2 {
      margin: 0 0 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ad);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: "Roboto Condensed", sans-serif;
      border-bottom: 1px solid rgba(7,54,121,0.10);
      padding-bottom: 10px;
    }

    /* ── Tables ──────────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th {
      background: #f5f7fa;
      text-align: left;
      padding: 8px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--arg);
      border-bottom: 2px solid var(--border);
      white-space: nowrap;
      font-family: "Roboto Condensed", sans-serif;
    }
    td {
      padding: 7px 10px;
      border-bottom: 1px solid #eaedf1;
      vertical-align: middle;
      font-size: 13px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5f8ff; }

    /* ── Inputs ──────────────────────────────────────────────── */
    input[type=number] {
      width: 80px;
      padding: 4px 7px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      text-align: right;
    }
    input[type=number]:focus {
      outline: none;
      border-color: var(--cb);
      box-shadow: 0 0 0 2px rgba(76,130,184,.15);
    }
    select {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    select:focus { outline: none; border-color: var(--cb); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: "Roboto Condensed", sans-serif;
      transition: background .18s, box-shadow .18s;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--ad), var(--cb));
      color: #fff;
      border: 1px solid rgba(76,130,184,0.25);
      box-shadow: 0 4px 12px rgba(7,54,121,0.15);
    }
    .btn-primary:hover { background: linear-gradient(180deg, #084d94, var(--ad)); box-shadow: 0 6px 16px rgba(7,54,121,0.22); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #8a0018; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #156932; }
    .btn-sm { padding: 4px 11px; font-size: 12px; }

    /* ── User-overrides section ──────────────────────────────── */
    .user-row-header { display: flex; align-items: center; gap: 10px; margin: 14px 0 8px; }
    .user-row-header select { min-width: 180px; }
    .user-override-table { margin-bottom: 10px; }
    .no-override { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Inline token/limit editor ────────────────────────────── */
    .inline-num {
      width: 72px; padding: 3px 6px;
      border: 1px solid var(--border); border-radius: 5px;
      font-size: 13px; text-align: right;
    }
    .inline-num:focus { outline: none; border-color: var(--cb); }
    .save-inline {
      padding: 3px 9px; font-size: 12px; font-weight: 600;
      border: none; border-radius: 5px; cursor: pointer;
      background: var(--ad); color: #fff; margin-left: 4px;
    }
    .save-inline:hover { background: #084d94; }

    /* ── Appeal badge ────────────────────────────────────────── */
    .appeal-text { max-width: 260px; white-space: normal; word-break: break-word; font-size: 12px; color: #333; }

    /* ── Users tab: date + column filter bar ─────────────────── */
    .users-filter-bar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 12px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .users-filter-bar label { font-size: 12px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .users-filter-bar input[type=date] {
      padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff;
    }
    .users-filter-bar input[type=date]:focus { outline: none; border-color: var(--cb); }
    .users-filter-bar .uf-quick { display: flex; gap: 4px; }
    .users-filter-bar .uf-quick button {
      padding: 4px 11px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .users-filter-bar .uf-quick button:hover,
    .users-filter-bar .uf-quick button.active { background: var(--ad); color: #fff; border-color: var(--ad); }
    .uf-divider { width: 1px; height: 22px; background: var(--border); }
    /* Column visibility toggle */
    .uf-colvis-wrap { position: relative; }
    .uf-colvis-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .uf-colvis-btn:hover { background: var(--ad); color: #fff; border-color: var(--ad); }
    .uf-colvis-panel {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      box-shadow: 0 8px 24px rgba(7,54,121,.12); padding: 10px 14px; min-width: 220px;
    }
    .uf-colvis-panel.open { display: block; }
    .uf-colvis-panel label {
      display: flex; align-items: center; gap: 7px; padding: 4px 0;
      font-size: 12px; font-weight: 400; color: #182230; cursor: pointer;
    }
    .uf-colvis-panel label:hover { color: var(--ad); }
    .uf-colvis-panel input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--ad); }
    .uf-daily-label {
      margin-left: auto; font-size: 11px; font-weight: 700;
      color: var(--re); background: rgba(109,234,249,0.12);
      border: 1px solid rgba(109,234,249,0.30); border-radius: 5px;
      padding: 2px 8px; letter-spacing: 0.3px;
    }

    /* ── Users table: freeze / sticky columns ─────────────────── */
    .users-tbl-wrap { overflow-x: auto; max-width: 100%; }
    .users-tbl-wrap table { min-width: 900px; }
    .users-tbl-wrap th.col-frozen,
    .users-tbl-wrap td.col-frozen {
      position: sticky; left: 0; z-index: 5;
      background: inherit;
      border-right: 2px solid rgba(76,130,184,0.30);
    }
    .users-tbl-wrap th.col-frozen { background: #f5f7fa; z-index: 6; }
    /* hidden column */
    .col-hidden { display: none !important; }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bb); color: var(--dd);
      padding: 10px 20px; border-radius: 8px; font-size: 13px;
      border: 1px solid rgba(109,234,249,0.25);
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 1000;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: var(--danger); border-color: transparent; color: #fff; }
    #toast.success { background: var(--success); border-color: transparent; color: #fff; }

    /* ── Login screen ────────────────────────────────────────── */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bb); }
    .login-panel {
      background: #fff;
      max-width: 340px; width: 100%;
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.30);
      border: 1px solid rgba(109,234,249,0.15);
      padding: 30px 32px;
    }
    .login-panel h2 {
      margin: 0 0 20px; text-align: center;
      font-size: 18px; color: var(--ad);
      font-family: "Orbitron", sans-serif;
      letter-spacing: 0.5px;
    }
    .login-panel label {
      display: block; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px;
      color: var(--arg);
    }
    .login-panel input {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1px solid var(--border); border-radius: 7px; margin-bottom: 12px;
    }
    .login-panel input:focus { outline: none; border-color: var(--cb); box-shadow: 0 0 0 2px rgba(76,130,184,.15); }
    .login-panel .btn-primary { width: 100%; padding: 11px; font-size: 15px; margin-top: 6px; }
    #loginMsg { text-align: center; font-size: 13px; min-height: 20px; margin-top: 6px; color: var(--danger); }

    /* Appeals empty state */
    .empty-msg { text-align: center; padding: 24px; color: var(--muted); font-style: italic; }
    .appeal-url { max-width: 140px; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom; }

    /* ── Porting tab ─────────────────────────────────────────── */
    .porting-section { margin-bottom: 24px; }
    .porting-section h3 { margin: 0 0 10px; font-size: 13px; font-weight: 700; color: var(--ad); text-transform: uppercase; letter-spacing: 0.5px; }
    .porting-section textarea {
      width: 100%; min-height: 100px; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: monospace; resize: vertical; line-height: 1.5;
    }
    .porting-section textarea:focus { outline: none; border-color: var(--cb); box-shadow: 0 0 0 2px rgba(76,130,184,.12); }
    .porting-hint { font-size: 12px; color: var(--muted); margin: 4px 0 10px; }
    .mapping-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .mapping-table th { background: #f5f7fa; padding: 7px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--arg); border-bottom: 2px solid var(--border); text-align: left; }
    .mapping-table td { padding: 7px 10px; border-bottom: 1px solid #eaedf1; vertical-align: middle; font-size: 13px; }
    .mapping-table tr:last-child td { border-bottom: none; }
    .mapping-table select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; }
    .mapping-table select:focus { outline: none; border-color: var(--cb); }
    .porting-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 14px; }
    #portingVerifySection { display: none; }

    /* ── System Logs tab ─────────────────────────────────────── */
    .log-filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 14px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 18px;
    }
    .log-filter-bar input[type=date],
    .log-filter-bar input[type=text] {
      padding: 5px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff;
    }
    .log-filter-bar input[type=date]:focus,
    .log-filter-bar input[type=text]:focus { outline: none; border-color: var(--cb); }
    .log-filter-bar label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .quick-range { display: flex; gap: 4px; }
    .quick-range button {
      padding: 4px 11px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .quick-range button:hover,
    .quick-range button.active { background: var(--ad); color: #fff; border-color: var(--ad); }
    .log-search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 280px; }
    .log-search-wrap input { width: 100%; padding-left: 28px; }
    .log-search-wrap::before { content: '🔍'; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }
    .log-export-btn { margin-left: auto; display: flex; gap: 6px; }

    .log-sub-tabs {
      display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px;
      background: var(--bb); border-radius: 8px; padding: 4px;
    }
    .log-sub-tab {
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--arg);
      font-family: "Roboto Condensed", sans-serif;
      transition: background .15s, color .15s;
    }
    .log-sub-tab:hover { background: rgba(255,255,255,0.06); color: var(--dd); }
    .log-sub-tab.active { background: rgba(109,234,249,0.12); color: var(--re); }

    .log-section { display: none; }
    .log-section.active { display: block; }
    .log-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .log-section-header h3 { margin: 0; font-size: 13px; font-weight: 700; color: var(--ad); text-transform: uppercase; letter-spacing: 0.5px; font-family: "Roboto Condensed", sans-serif; }
    .log-count-badge {
      background: var(--ad); color: #fff; border-radius: 12px;
      padding: 1px 8px; font-size: 11px; font-weight: 700;
    }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-success { background: #d4f0e0; color: var(--success); }
    .badge-fail    { background: #fde8ea; color: var(--danger);  }
    .badge-warn    { background: #fef3e2; color: var(--warn);    }
    .badge-info    { background: #e8f0fe; color: var(--cb);      }
    .badge-critical{ background: var(--danger); color: #fff;     }

    /* Severity row highlight */
    tr.sev-warning td  { background: #fffbe6; }
    tr.sev-critical td { background: #fff0f0; }
    tr.sev-critical td:first-child { border-left: 3px solid var(--danger); }
    tr.sev-warning  td:first-child { border-left: 3px solid var(--warn); }

    /* Log auto-refresh */
    .log-refresh-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .log-refresh-bar select { padding: 3px 7px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    #logLastRefreshed { font-size: 11px; color: var(--muted); font-style: italic; }

    /* Usage counter boxes */
    .log-counter-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .log-counter {
      background: #f5f7fa; border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 20px; text-align: center; min-width: 130px;
    }
    .log-counter .cval { font-size: 26px; font-weight: 800; color: var(--ad); }
    .log-counter .clbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Activity log */
    .activity-log { list-style: none; margin: 0; padding: 0; }
    .activity-log li { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #eaedf1; font-size: 13px; }
    .activity-log li:last-child { border-bottom: none; }
    .activity-log .act-time { color: var(--muted); font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .activity-log .act-icon { font-size: 16px; flex-shrink: 0; }
    .activity-log .act-msg  { flex: 1; }

    /* Alert icon */
    .alert-icon { font-size: 16px; vertical-align: middle; margin-right: 4px; }

    /* Quick filter chips */
    .chip-filter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .chip {
      padding: 3px 10px; border: 1px solid var(--border); border-radius: 16px;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .chip:hover { background: #eef2f6; color: #333; }
    .chip.active { background: var(--ad); color: #fff; border-color: var(--ad); }

    .log-empty { text-align: center; padding: 24px; color: var(--muted); font-style: italic; font-size: 13px; }
    .log-tbl-wrap { overflow-x: auto; }

    /* ── Error → Gemini analysis panel ──────────────────────── */
    .error-detail-panel {
      background: #f9fbfd; border: 1px solid var(--border); border-radius: 10px;
      padding: 18px 20px;
    }
    .error-detail-panel h4 { margin: 0 0 10px; font-size: 14px; color: var(--ad); font-weight: 700; }
    .rl-inner-panel { display: block; }
    .error-raw-box {
      background: #fff; border: 1px solid var(--border); border-radius: 7px;
      padding: 10px 14px; font-size: 12px; font-family: monospace;
      white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto;
      color: #333; margin-bottom: 12px;
    }
    .gemini-output-box {
      background: #fff; border: 1px solid var(--border); border-radius: 7px;
      padding: 10px 14px; font-size: 13px; line-height: 1.6;
      min-height: 60px; margin-bottom: 12px; color: #222; white-space: pre-wrap;
    }
    .gemini-output-box.loading { color: var(--muted); font-style: italic; }
    .gemini-output-box.error-state { color: var(--danger); }
    .copilot-prompt-wrap { position: relative; }
    .copilot-prompt-box {
      width: 100%; min-height: 90px; padding: 10px 42px 10px 12px;
      border: 1px solid var(--border); border-radius: 7px;

      cursor: pointer; transition: background .15s;

    .copilot-copy-btn:hover { background: #084d94; }
    .gemini-analyze-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg,#4285f4,#34a853);
      color: #fff; border: none; border-radius: 7px;
      padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .gemini-analyze-btn:hover { opacity: .88; }
    .gemini-analyze-btn:disabled { opacity: .5; cursor: default; }
    .vertex-activate-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg,#073679,#4c82b8);
      color: #fff; border: none; border-radius: 7px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: opacity .15s; margin-left: auto;
    }
    .vertex-activate-btn:hover { opacity: .88; }
    .vertex-send-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg,#073679,#4c82b8);
      color: #fff; border: none; border-radius: 7px;
      padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s; margin-top: 10px;
    }
    .vertex-send-btn:hover { opacity: .88; }
    .vertex-approval-note {
      font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4;
    }
    .error-row-link { cursor: pointer; text-decoration: underline; color: var(--cb); }
    .error-row-link:hover { color: var(--ad); }

    /* ── API Keys tab ────────────────────────────────────────── */
    .apikey-service {
      margin-bottom: 24px; padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .apikey-service:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .apikey-service h3 {
      margin: 0 0 14px;
      font-size: 12px; font-weight: 700; color: var(--ad);
      text-transform: uppercase; letter-spacing: 0.6px;
      font-family: "Roboto Condensed", sans-serif;
      display: flex; align-items: center; gap: 7px;
    }
    .apikey-service h3::before {
      content: '';
      display: inline-block; width: 3px; height: 14px;
      background: linear-gradient(180deg, var(--re), var(--cb));
      border-radius: 2px;
      flex-shrink: 0;
    }
    .apikey-row { display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
    .apikey-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 200px; max-width: 400px; }
    .apikey-field label { font-size: 11px; font-weight: 600; color: var(--arg); text-transform: uppercase; letter-spacing: .5px; font-family: "Roboto Condensed", sans-serif; }
    .apikey-input {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 13px; font-family: monospace; background: #fff;
    }
    .apikey-input:focus { outline: none; border-color: var(--cb); box-shadow: 0 0 0 2px rgba(76,130,184,.12); }
    .apikey-set-badge { font-size: 11px; color: var(--success); font-weight: 600; margin-top: 2px; }
    .apikey-status-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .apikey-save-btn { padding: 7px 18px; font-size: 13px; }

    /* ── Test Monitor tab ────────────────────────────────────── */
    .tm-alert-banner {
      display: flex; align-items: flex-start; gap: 12px;
      background: #fff5f5; border: 1.5px solid var(--danger);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
    }
    .tm-alert-banner.hidden { display: none; }
    .tm-alert-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .tm-alert-body { flex: 1; }
    .tm-alert-body strong { font-size: 14px; color: var(--danger); display: block; margin-bottom: 4px; }
    .tm-alert-body p { margin: 0; font-size: 13px; color: #555; line-height: 1.5; }
    .tm-alert-list { margin: 6px 0 0; padding-left: 18px; font-size: 13px; color: #555; }
    .tm-alert-list li { margin-bottom: 2px; }
    .tm-summary-row {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    }
    .tm-stat {
      flex: 1; min-width: 110px;
      background: #f5f7fa; border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px; text-align: center;
    }
    .tm-stat .ts-val { font-size: 28px; font-weight: 800; }
    .tm-stat .ts-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
    .tm-stat.critical .ts-val { color: var(--danger); }
    .tm-stat.high     .ts-val { color: var(--warn); }
    .tm-stat.medium   .ts-val { color: var(--cb); }
    .tm-stat.low      .ts-val { color: var(--arg); }
    .tm-health-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 20px;
    }
    .tm-health-item {
      background: #f5f7fa; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    }
    .tm-health-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--arg);
    }
    .tm-health-dot.ok      { background: var(--success); }
    .tm-health-dot.fail    { background: var(--danger); }
    .tm-health-dot.checking{ background: var(--warn); }
    .tm-health-label { font-size: 12px; flex: 1; }
    .tm-health-code  { font-size: 11px; color: var(--muted); font-family: monospace; }
    .tm-priority-badge {
      display: inline-block; padding: 1px 8px; border-radius: 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      flex-shrink: 0;
    }
    .tm-priority-badge.critical { background: var(--danger); color: #fff; }
    .tm-priority-badge.high     { background: var(--warn); color: #fff; }
    .tm-priority-badge.medium   { background: var(--cb); color: #fff; }
    .tm-priority-badge.low      { background: var(--arg); color: #fff; }
    .tm-suite {
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 12px; overflow: hidden;
    }
    .tm-suite-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; background: #f5f7fa;
      cursor: pointer; user-select: none;
      border-bottom: 1px solid transparent;
      transition: background .15s;
    }
    .tm-suite-header:hover { background: #eef2f8; }
    .tm-suite-header.open { background: #eef2f8; border-bottom-color: var(--border); }
    .tm-suite-title { flex: 1; font-size: 13px; font-weight: 700; color: #1a2033; }
    .tm-suite-file  { font-size: 11px; color: var(--muted); font-family: monospace; }
    .tm-suite-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
    .tm-suite-header.open .tm-suite-chevron { transform: rotate(90deg); }
    .tm-suite-body  { display: none; padding: 4px 0; }
    .tm-suite-body.open { display: block; }
    .tm-test-row {
      display: flex; flex-direction: column; align-items: stretch;
      padding: 8px 16px; border-bottom: 1px solid #f0f2f5;
      font-size: 13px;
    }
    .tm-test-row:last-child { border-bottom: none; }
    .tm-test-row-main { display: flex; align-items: flex-start; gap: 10px; }
    .tm-test-name { flex: 1; color: #333; line-height: 1.4; }
    .tm-test-name code { font-size: 11px; color: var(--muted); font-family: monospace; display: block; margin-top: 2px; }
    .tm-skip-reason {
      font-size: 11px; color: #92400e; background: #fffbeb;
      border: 1px solid #fde68a; border-radius: 6px;
      padding: 5px 10px; margin: 4px 0 2px;
      white-space: pre-wrap; font-family: monospace; line-height: 1.6;
      display: none;
    }
    .tm-status-btn {
      flex-shrink: 0; padding: 2px 10px; border-radius: 12px;
      border: none; cursor: pointer; font-size: 11px; font-weight: 700;
      transition: opacity .15s;
    }
    .tm-status-btn:hover { opacity: .8; }
    .tm-status-btn.pending { background: #fef3e2; color: var(--warn); }
    .tm-status-btn.pass    { background: #d4f0e0; color: var(--success); }
    .tm-status-btn.fail    { background: #fde8ea; color: var(--danger); }
    .tm-status-btn.skip    { background: #f0f0f0; color: var(--arg); }
    .tm-section-title {
      font-size: 12px; font-weight: 700; color: var(--ad); text-transform: uppercase;
      letter-spacing: .7px; margin: 20px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(7,54,121,.10);
      font-family: "Roboto Condensed", sans-serif;
      display: flex; align-items: center; gap: 8px;
    }
    .tm-run-btn {
      padding: 6px 16px; background: var(--ad); color: #fff;
      border: none; border-radius: 7px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: background .15s; margin-left: auto; flex-shrink: 0;
    }
    .tm-run-btn:hover { background: #084d94; }
    .tm-run-btn:disabled { opacity: .5; cursor: default; }
    .tm-filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px;
    }
    .tm-filter-bar label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .tm-filter-chip {
      padding: 3px 10px; border: 1px solid var(--border); border-radius: 14px;
      background: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
      color: var(--muted); transition: background .15s, color .15s;
    }
    .tm-filter-chip:hover { background: #eef2f6; color: #333; }
    .tm-filter-chip.active { background: var(--ad); color: #fff; border-color: var(--ad); }
    .tm-count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 18px; padding: 0 5px;
      background: rgba(7,54,121,.12); color: var(--ad);
      border-radius: 9px; font-size: 11px; font-weight: 700; margin-left: 4px;
    }
    /* ── Spinner animation ──────────────────────────────────────── */
    @keyframes tm-spin { to { transform: rotate(360deg); } }
    .tm-spinning { display: inline-block; animation: tm-spin .7s linear infinite; }
    /* ── Per-suite run button ───────────────────────────────────── */
    .tm-suite-run-btn {
      padding: 2px 9px; background: var(--ad); color: #fff;
      border: none; border-radius: 6px; font-size: 10px; font-weight: 700;
      cursor: pointer; transition: background .15s; flex-shrink: 0; margin-left: 4px;
    }
    .tm-suite-run-btn:hover { background: #084d94; }
    .tm-suite-run-btn:disabled { opacity: .5; cursor: default; }
    /* ── Activity log panel ─────────────────────────────────────── */
    .tm-log-panel {
      margin-top: 20px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .tm-log-header {
      background: #f5f7fa; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .tm-log-header span { font-size: 13px; font-weight: 700; color: #1a2033; }
    .tm-log-clear-btn {
      padding: 4px 12px; font-size: 11px; background: #555; color: #fff;
      border: none; border-radius: 7px; cursor: pointer; font-weight: 700; transition: background .15s;
    }
    .tm-log-clear-btn:hover { background: #333; }
    .tm-log-body {
      background: #1a1f2e; padding: 12px 16px;
      min-height: 100px; max-height: 240px;
      overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.75;
    }
    .tm-log-entry       { color: #a8b2c8; white-space: pre-wrap; }
    .tm-log-entry.ok    { color: #4ade80; }
    .tm-log-entry.fail  { color: #f87171; }
    .tm-log-entry.warn  { color: #fbbf24; }
    .tm-log-entry.run   { color: #60a5fa; }
    /* ── Scrollable suites body (below the frozen header area) ── */
    .tm-scroll-body {
      overflow-y: auto;
      max-height: 60vh;
      padding-top: 4px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    /* ── Live Coverage Summary panel ──────────────────────────── */
    .tm-coverage-panel {
      margin-top: 16px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .tm-coverage-header {
      background: #f5f7fa; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .tm-coverage-header span { font-size: 13px; font-weight: 700; color: #1a2033; }
    .tm-coverage-body { padding: 14px 16px; }
    .tm-progress-bar-wrap {
      background: #e5e7eb; border-radius: 6px; height: 12px; overflow: hidden; margin-bottom: 8px;
    }
    .tm-progress-bar { height: 100%; border-radius: 6px; background: #22c55e; transition: width .4s ease; }
    .tm-progress-bar.warn { background: #f59e0b; }
    .tm-progress-bar.danger { background: #ef4444; }
    .tm-coverage-meta {
      display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: #555; margin-bottom: 12px;
    }
    .tm-coverage-meta span strong { font-size: 14px; }
    .tm-coverage-meta .cov-pass  strong { color: #16a34a; }
    .tm-coverage-meta .cov-fail  strong { color: #dc2626; }
    .tm-coverage-meta .cov-skip  strong { color: #ca8a04; }
    .tm-coverage-meta .cov-pend  strong { color: #6b7280; }
    .tm-coverage-tables { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 680px) { .tm-coverage-tables { grid-template-columns: 1fr; } }
    .tm-cov-section { font-size: 12px; }
    .tm-cov-section h4 {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      color: #6b7280; margin: 0 0 6px;
    }
    .tm-cov-list { list-style: none; padding: 0; margin: 0; max-height: 130px; overflow-y: auto; }
    .tm-cov-list li {
      display: flex; align-items: center; gap: 6px; padding: 3px 0;
      border-bottom: 1px solid #f1f3f5; font-size: 12px; color: #374151;
    }
    .tm-cov-list li:last-child { border-bottom: none; }
    .tm-cov-list li .cov-badge {
      padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; flex-shrink: 0;
    }
    .tm-cov-list .badge-full { background: #dcfce7; color: #15803d; }
    .tm-cov-list .badge-fail { background: #fee2e2; color: #b91c1c; }
    .tm-cov-list .badge-part { background: #fef3c7; color: #92400e; }
    .tm-cov-empty { font-size: 12px; color: #9ca3af; font-style: italic; padding: 6px 0; }
    /* ── Failed Tests tab ─────────────────────────────────────── */
    .tm-view-tabs {
      display: flex; gap: 4px; margin: 12px 0 0;
      border-bottom: 2px solid var(--border);
    }
    .tm-view-tab {
      padding: 6px 16px; border: none; background: transparent;
      font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .15s;
    }
    .tm-view-tab:hover { color: var(--ad); }
    .tm-view-tab.active { color: var(--ad); border-bottom-color: var(--ad); }
    .tm-view-tab .tm-count-badge { font-size: 10px; }
    .tm-fail-view { padding-top: 12px; }
    .tm-fail-card {
      border: 1.5px solid #fca5a5; border-radius: 10px;
      margin-bottom: 14px; overflow: hidden; background: #fff;
    }
    .tm-fail-card-header {
      background: #fff5f5; padding: 10px 16px;
      display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
    }
    .tm-fail-card-title { font-size: 13px; font-weight: 700; color: #991b1b; flex: 1; min-width: 160px; }
    .tm-fail-card-meta  { font-size: 11px; color: #555; font-family: monospace; width: 100%; margin-top: 2px; }
    .tm-fail-card-body  { padding: 10px 16px; }
    .tm-fail-reason {
      font-size: 11.5px; color: #7f1d1d; background: #fef2f2;
      border: 1px solid #fca5a5; border-radius: 6px;
      padding: 8px 12px; white-space: pre-wrap;
      font-family: monospace; line-height: 1.65; margin-bottom: 10px;
    }
    .tm-fail-impact {
      font-size: 11px; color: #555; margin-bottom: 8px;
    }
    .tm-fail-impact strong { color: #1a2033; }
    .tm-fail-impact code { background: #f0f2f5; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 11px; }
    .tm-gemini-diag-btn {
      padding: 5px 14px; border: none; border-radius: 7px; cursor: pointer;
      font-size: 12px; font-weight: 700; transition: opacity .15s;
      background: linear-gradient(135deg, #073679, #4c82b8); color: #fff;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .tm-gemini-diag-btn:hover { opacity: .88; }
    .tm-gemini-diag-btn:disabled { opacity: .5; cursor: default; }
    .tm-diag-panel {
      margin-top: 10px; border: 1px solid #bfdbfe; border-radius: 8px; overflow: hidden; display: none;
    }
    .tm-diag-panel.open { display: block; }
    .tm-diag-panel-header {
      background: #eff6ff; padding: 8px 14px;
      font-size: 12px; font-weight: 700; color: #1e40af;
      border-bottom: 1px solid #bfdbfe;
    }
    .tm-diag-panel-body { padding: 10px 14px; }
    .tm-diag-section { margin-bottom: 10px; }
    .tm-diag-section h5 {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
      color: #6b7280; margin: 0 0 4px;
    }

      font-size: 12px; color: #374151; white-space: pre-wrap; line-height: 1.6;

    .tm-diag-output.error-state { color: #dc2626; }
    .tm-fail-empty {
      text-align: center; padding: 32px; color: #9ca3af; font-size: 13px;
    }

    /* ── Sales Rep Detail Modal ─────────────────────────────── */

      position: fixed; inset: 0; z-index: 1200;
      background: rgba(0,0,0,0.55);
      align-items: center; justify-content: center;
    }

      background: var(--panel);
      border-radius: 10px;

      flex-shrink: 0;

      padding: 10px 20px;

      font-size: 11px; padding: 3px 9px;
    }

      padding: 10px 16px; font-size: 13px; font-weight: 600;

      color: var(--ad); text-decoration: underline dotted;

    }
    .sr-name-link:hover { color: var(--cb); }

// ── System config parameters (with tab assignment) ────────────────────────────

const SYSTEM_PARAMS = [
  { key: 'limiter_global_per_hour',      label: 'Flask Limiter Global (per hour)',      tab: 'autosourcing', priority: 'high', unit: 'req/hr',  min: 1, hint: 'Server-wide Flask-Limiter per-IP cap (all endpoints) when no specific limit is set (LIMITER_GLOBAL_PER_HOUR) — requires server restart' },

  { key: 'make_flask_limit_fallback_req', label: 'JSON Fallback Request Limit',         tab: 'autosourcing', priority: 'high', unit: 'req',     min: 1, hint: 'Server-wide fallback requests used by all dynamic rate limits when rate_limits.json entry is absent or malformed (MAKE_FLASK_LIMIT_FALLBACK_REQ) — requires server restart' },

  { key: 'backoff_base_delay_ms',     label: 'Retry Base Delay',               tab: 'autosourcing', priority: 'mid',  unit: 'ms',      min: 1, hint: 'Base delay for exponential back-off in ms (BACKOFF_BASE_DELAY_MS)' },
  { key: 'jd_upload_max_count',       label: 'JD Upload Max Count',            tab: 'autosourcing', priority: 'high', unit: 'files',   min: 1, hint: 'Maximum number of JD files a user may upload per session in AutoSourcing (JD_UPLOAD_MAX_COUNT)' },
  { key: 'jd_upload_max_bytes',       label: 'JD Upload Max File Size',        tab: 'autosourcing', priority: 'high', unit: 'bytes',   min: 1, hint: 'Maximum JD file size in bytes for AutoSourcing JD uploads (JD_UPLOAD_MAX_BYTES). Default 6291456 = 6 MB' },
  { key: 'pic_max_bytes',             label: 'Image Max Size',                 tab: 'cms',          priority: 'high', unit: 'bytes',   min: 1, hint: 'Maximum image upload size in bytes — oversized images are rejected (PIC_MAX_BYTES)' },
  { key: 'safe_parse_max_len',        label: 'Safe-Parse Max Length',          tab: 'cms',          priority: 'high', unit: 'bytes',   min: 1, hint: 'Payload size above which expensive parsing heuristics are skipped (SAFE_PARSE_MAX_LEN)' },
  { key: 'porting_upload_max_bytes',  label: 'Porting Upload Max Size',        tab: 'cms',          priority: 'high', unit: 'bytes',   min: 1, hint: 'Maximum credential/key file upload size for the Porting tab (PORTING_UPLOAD_MAX_BYTES)' },
  { key: 'sse_heartbeat_ms',          label: 'SSE Heartbeat Interval',         tab: 'cms',          priority: 'mid',  unit: 'ms',      min: 1, hint: 'How often (ms) a keep-alive comment is written to SSE clients (SSE_HEARTBEAT_MS) — requires server restart' },
  { key: 'sse_coalesce_delay_ms',     label: 'SSE Coalesce Delay',             tab: 'cms',          priority: 'low',  unit: 'ms',      min: 0, hint: 'Quiet-period (ms) before sending a coalesced candidates_changed broadcast (SSE_COALESCE_DELAY_MS) — requires server restart' },
  { key: 'rate_limits_cache_ms',      label: 'Rate-Limits Cache TTL',          tab: 'cms',          priority: 'low',  unit: 'ms',      min: 0, hint: 'How long rate_limits.json is cached in memory before re-reading (RATE_LIMITS_CACHE_MS) — requires server restart' },
  { key: 'no_limit_sentinel',         label: 'No-Limit Sentinel Value',        tab: 'dashboard',    priority: 'low',  unit: '',        min: 1, hint: 'Integer treated as "effectively unlimited" for per-user rate limits (NO_LIMIT_SENTINEL) — requires server restart' },
  { key: 'external_api_timeout_ms',   label: 'External API Timeout',           tab: 'dashboard',    priority: 'high', unit: 'ms',      min: 1, hint: 'Timeout for external email verification API calls in ms (EXTERNAL_API_TIMEOUT_MS) — requires server restart' },
  { key: 'smtp_max_connections',      label: 'SMTP Pool Max Connections',      tab: 'dashboard',    priority: 'low',  unit: 'conns',   min: 1, hint: 'Maximum pooled SMTP connections per transporter (SMTP_MAX_CONNECTIONS) — requires server restart' },
  { key: 'session_cookie_max_age_ms', label: 'Session Cookie Lifetime',        tab: 'dashboard',    priority: 'low',  unit: 'ms',      min: 1, hint: 'Cookie maxAge in ms — 2592000000 = 30 days (SESSION_COOKIE_MAX_AGE_MS) — requires server restart' },
  { key: 'scheduler_default_duration',  label: 'Scheduler Default Duration',   tab: 'dashboard',    priority: 'mid',  unit: 'minutes', min: 1, hint: 'Default slot duration in minutes for calendar scheduling (SCHEDULER_DEFAULT_DURATION) — requires server restart' },
  { key: 'scheduler_default_max_slots', label: 'Scheduler Default Max Slots',  tab: 'dashboard',    priority: 'mid',  unit: 'slots',   min: 1, hint: 'Maximum free slots returned per publish-slots call (SCHEDULER_DEFAULT_MAX_SLOTS) — requires server restart' },
  { key: 'dashboard_default_requests',       label: 'Dashboard Fallback Requests',      tab: 'dashboard', priority: 'high', unit: 'req', min: 1, hint: 'Fallback max requests for dashboardRateLimit when rate_limits.json entry is absent (DEFAULT_DASHBOARD_REQUESTS) — requires server restart' },
  { key: 'dashboard_default_window_seconds', label: 'Dashboard Fallback Window',        tab: 'dashboard', priority: 'high', unit: 'sec', min: 1, hint: 'Fallback window seconds for dashboardRateLimit when rate_limits.json entry is absent (DEFAULT_DASHBOARD_WINDOW_SECONDS) — requires server restart' },
  { key: 'log_retention_months',             label: 'Log Retention Period',             tab: 'autosourcing', priority: 'mid', unit: 'months', min: 1, hint: 'How long system log files are retained (months). Warn at >6 months (yellow), alert at >12 months (red). Enforce via OS-level log rotation or a scheduled cleanup script.' },
];

// ── Token credit/deduction parameters ────────────────────────────────────────
// These map to rate_limits.json "tokens" section and control credit amounts.
const TOKEN_PARAMS = [
  { key: 'appeal_approve_credit',     label: 'Appeal Approval Credit',         priority: 'high', unit: 'tokens', min: 0, step: 1,    hint: 'Tokens credited to a user when an appeal is approved (APPEAL_APPROVE_CREDIT)' },
  { key: 'verified_selection_deduct', label: 'Verified Selection Deduction',   priority: 'high', unit: 'tokens', min: 0, step: 1,    hint: 'Tokens deducted per Verified Selection action in SourcingVerify (VERIFIED_SELECTION_DEDUCT)' },
  { key: 'rebate_credit_per_profile', label: 'Rebate Credit per Profile',      priority: 'high', unit: 'tokens', min: 0, step: 1,    hint: 'Tokens credited back per rebated profile in SourcingVerify' },
  { key: 'analytic_token_cost',       label: 'Analytic DB Token Cost',          priority: 'high', unit: 'tokens/record', min: 0, step: 1,    hint: 'Tokens consumed per record analysed in the Analytic DB Dock In wizard (App.js)' },
  { key: 'initial_token_display',     label: 'Initial Token Display',          priority: 'mid',  unit: 'tokens', min: 0, step: 1,    hint: 'Fallback toolbar token value shown before the server balance loads in SourcingVerify' },
  { key: 'sourcing_rate_base',        label: 'Sourcing Rate — Standard',       priority: 'mid',  unit: 'tokens/profile', min: 0, step: 0.5, hint: 'Token cost per profile in standard sourcing mode' },
  { key: 'sourcing_rate_best_mode',   label: 'Sourcing Rate — Best Mode',      priority: 'mid',  unit: 'tokens/profile', min: 0, step: 0.5, hint: 'Token cost per profile when Best Mode is active' },
  { key: 'sourcing_rate_over50',      label: 'Sourcing Rate — Target > 50',   priority: 'mid',  unit: 'tokens/profile', min: 0, step: 0.5, hint: 'Token cost per profile when Target Limit exceeds 50' },
  { key: 'sourcing_rate_best_over50', label: 'Sourcing Rate — Best + > 50',   priority: 'mid',  unit: 'tokens/profile', min: 0, step: 0.5, hint: 'Token cost per profile when Best Mode is active AND Target Limit exceeds 50' },
  { key: 'jd_analysis_token_cost',    label: 'Token Credit per JD Analysis',  priority: 'high', unit: 'tokens/JD',      min: 0, step: 1,    hint: 'Tokens deducted per JD analysis after the daily JD upload limit is exceeded in AutoSourcing (JD_ANALYSIS_TOKEN_COST)' },
  { key: 'token_cost_sgd',            label: 'Token Cost (SGD per token)',    priority: 'high', unit: 'SGD',            min: 0, step: 0.01, hint: 'Per-token value in Singapore Dollars. Used to convert token deductions to revenue in the Financial/Credits log.' },
];

// ── State ────────────────────────────────────────────────────────────────────
let _config  = { defaults: {}, users: {}, system: {}, tokens: {}, access_levels: {}, ml: {} };
let _users   = [];
let _appeals = [];
let _session = null;
let _emailVerifConfig = { neverbounce: { api_key_set: false, enabled: 'disabled' }, zerobounce: { api_key_set: false, enabled: 'disabled' }, bouncer: { api_key_set: false, enabled: 'disabled' } };
let _serperConfig = { serper: { api_key_set: false, enabled: 'disabled' }, dataforseo: { login_set: false, password_set: false, enabled: 'disabled' } };
let _llmConfig = { config: { active_provider: 'gemini', default_model: 'gemini-2.5-flash-lite', gemini: { api_key_set: false, model: 'gemini-2.5-flash-lite', enabled: 'enabled' }, openai: { api_key_set: false, model: 'gpt-4o-mini', enabled: 'disabled' }, anthropic: { api_key_set: false, model: 'claude-3-5-haiku-20241022', enabled: 'disabled' } } };

// ── Helpers ──────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._tid);
  el._tid = setTimeout(() => el.classList.remove('show'), 3500);
}

function csrfHeaders() {
  return { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auth ─────────────────────────────────────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('lUsername').value.trim();
  const password = document.getElementById('lPassword').value;
  const msgEl = document.getElementById('loginMsg');
  msgEl.textContent = '';
  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok || !data.ok) { msgEl.textContent = data.error || 'Login failed'; return; }
    sessionStorage.removeItem('admin_logged_out');
    _session = { username: data.username, userid: data.userid };
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = '';
    await loadData();
  } catch (err) {
    msgEl.textContent = 'Network error: ' + err.message;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await fetch(`${API}/logout`, { method: 'POST', headers: csrfHeaders(), credentials: 'same-origin' });
  } catch (_) {}
  sessionStorage.setItem('admin_logged_out', '1');
  _session = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = '';
});

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  const mainEl = document.getElementById('mainContent');
  mainEl.innerHTML = '<div class="page-msg">Loading…</div>';
  try {
    const [rlRes, appRes, evRes, spRes, llmRes] = await Promise.all([
      fetch(`${API}/admin/rate-limits`, { credentials: 'same-origin' }),
      fetch(`${API}/admin/appeals`,     { credentials: 'same-origin' }),
      fetch(`${API}/admin/email-verif-config`, { credentials: 'same-origin' }),
      fetch(`${API}/admin/search-provider-config`, { credentials: 'same-origin' }),
      fetch(`${API}/admin/llm-provider-config`, { credentials: 'same-origin' }),
    ]);
    if (rlRes.status === 401) { location.reload(); return; }
    if (rlRes.status === 403) {
      mainEl.innerHTML = '<div class="page-msg" style="color:var(--danger)">Access denied — admin role required.</div>';
      return;
    }
    const rlData = await rlRes.json();
    _config = rlData.config || { defaults: {}, users: {}, system: {}, tokens: {}, access_levels: {}, ml: {} };
    if (!_config.system) _config.system = {};
    if (!_config.tokens) _config.tokens = {};
    if (!_config.access_levels) _config.access_levels = {};
    if (!_config.ml) _config.ml = {};
    // "admin" access level must always be present and is protected from deletion
    if (!_config.access_levels['admin']) _config.access_levels['admin'] = {};
    _users  = rlData.users  || [];
    if (rlData.db_error) {
      toast('Users could not be loaded from DB — check server logs', 'error');
    }

    if (appRes.ok) {
      const appData = await appRes.json();
      _appeals = appData.appeals || [];
    }

    if (evRes.ok) {
      const evData = await evRes.json();
      _emailVerifConfig = evData.config || _emailVerifConfig;
    }

    if (spRes.ok) {
      const spData = await spRes.json();
      _serperConfig = spData.config || _serperConfig;
    }

    if (llmRes.ok) {
      const llmData = await llmRes.json();
      _llmConfig = llmData || _llmConfig;
    }

    renderPage(mainEl);
  } catch (err) {
    mainEl.innerHTML = `<div class="page-msg" style="color:var(--danger)">Error: ${err.message}</div>`;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderPage(container) {
  container.innerHTML = '';

  // Tab bar
  const tabBar = document.createElement('div');
  tabBar.className = 'tabs';
  // Determine retention warning level for the System Logs tab badge

function renderDefaultsCardForTab(tabKey, tabTitle) {
  const card = document.createElement('div');
  card.innerHTML = `<h2>${escHtml(tabTitle)} — Default Rate Limits (all users)</h2>`;

  const features = FEATURES.filter(f => f.tab === tabKey);
  if (!features.length) {
    card.innerHTML += '<p style="color:var(--muted);font-size:13px;">No rate-limit features assigned to this tab.</p>';
    return card;
  }

  const hasPriorities = features.some(f => f.priority);

  function makeFeatureTableRows(featureList) {
    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>Feature</th>
          <th>Requests per window</th>
          <th>Window (seconds)</th>
        </tr>
      </thead>`;
    const tbody = document.createElement('tbody');
    featureList.forEach(({ key, label }) => {
      const cfg = _config.defaults[key] || { requests: 10, window_seconds: 60 };
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${escHtml(label)}</strong><br><small style="color:var(--muted)">${escHtml(key)}</small></td>
        <td><input type="number" min="1" data-scope="defaults" data-key="${escHtml(key)}" data-field="requests"
              value="${cfg.requests}"></td>
        <td><input type="number" min="1" data-scope="defaults" data-key="${escHtml(key)}" data-field="window_seconds"
              value="${cfg.window_seconds}"></td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  if (!hasPriorities) {
    card.appendChild(makeFeatureTableRows(features));
    return card;
  }

  // Group by priority
  const PRIORITY_GROUPS = [
    { key: 'high', label: 'High Priority',  color: 'var(--danger, #d9534f)',  icon: '🔴' },
    { key: 'mid',  label: 'Mid Priority',   color: 'var(--warn, #f0ad4e)',    icon: '🟡' },
    { key: 'low',  label: 'Low Priority',   color: 'var(--muted, #6c757d)',   icon: '⚪' },
  ];
  const unprioritized = features.filter(f => !f.priority);
  if (unprioritized.length) {
    card.appendChild(makeFeatureTableRows(unprioritized));
  }
  PRIORITY_GROUPS.forEach(({ key: pKey, label: pLabel, color, icon }) => {
    const group = features.filter(f => f.priority === pKey);
    if (!group.length) return;

    const header = document.createElement('div');
    header.style.cssText = `margin:14px 0 6px;padding:4px 8px;border-left:3px solid ${color};background:rgba(0,0,0,0.03);border-radius:0 4px 4px 0;`;
    header.innerHTML = `<span style="font-size:12px;font-weight:600;color:${color};">${icon} ${escHtml(pLabel)}</span>`;
    card.appendChild(header);
    card.appendChild(makeFeatureTableRows(group));
  });

  return card;
}

function renderSystemConfigCard(params, tabTitle) {
  const card = document.createElement('div');
  card.style.marginTop = '20px';
  card.innerHTML = `<h2>${escHtml(tabTitle)} — System Configuration</h2>
    <p style="color:var(--muted);font-size:12px;margin:0 0 10px;">
      These parameters tune server behaviour. Changes are saved to <code>rate_limits.json</code>.
      Values marked <em>requires server restart</em> are read once at startup.
    </p>`;

  // Priority group metadata
  const PRIORITY_GROUPS = [
    { key: 'high', label: 'High Priority',  color: 'var(--danger, #d9534f)',  icon: '🔴' },
    { key: 'mid',  label: 'Mid Priority',   color: 'var(--warn, #f0ad4e)',    icon: '🟡' },
    { key: 'low',  label: 'Low Priority',   color: 'var(--muted, #6c757d)',   icon: '⚪' },
  ];

  PRIORITY_GROUPS.forEach(({ key: pKey, label: pLabel, color, icon }) => {
    const groupParams = params.filter(p => p.priority === pKey);
    if (!groupParams.length) return;

    // Priority section header
    const header = document.createElement('div');
    header.style.cssText = `margin:14px 0 6px;padding:4px 8px;border-left:3px solid ${color};background:rgba(0,0,0,0.03);border-radius:0 4px 4px 0;`;
    header.innerHTML = `<span style="font-size:12px;font-weight:600;color:${color};">${icon} ${escHtml(pLabel)}</span>`;
    card.appendChild(header);

    const table = document.createElement('table');
    table.style.marginBottom = '4px';
    table.innerHTML = `
      <thead>
        <tr>
          <th>Parameter</th>
          <th>Value</th>
          <th>Unit</th>
        </tr>
      </thead>`;
    const tbody = document.createElement('tbody');
    groupParams.forEach(({ key, label, unit, hint, min }) => {
      const val = (_config.system && _config.system[key] !== undefined) ? _config.system[key] : '';
      const minAttr = (min !== undefined) ? String(min) : '0';
      const tr = document.createElement('tr');
      tr.title = hint || '';
      tr.innerHTML = `
        <td><strong>${escHtml(label)}</strong><br><small style="color:var(--muted)">${escHtml(key)}</small></td>
        <td><input type="number" min="${escHtml(minAttr)}" data-scope="system" data-key="${escHtml(key)}" value="${escHtml(String(val))}" title="${escHtml(hint || '')}"></td>
        <td><small style="color:var(--muted)">${escHtml(unit)}</small></td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    card.appendChild(table);
  });

  return card;
}
