  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.textContent = '+ Add Override';
  addBtn.addEventListener('click', () => {
    const username = sel.value;
    const feature  = featureSel.value;
    if (!username) { toast('Select a user first', 'error'); return; }
    if (!_config.users[username]) _config.users[username] = {};
    if (_config.users[username][feature]) {
      toast('Override for this feature already exists — edit it in the table below', 'error');
      return;
    }
    const def = _config.defaults[feature] || { requests: 10, window_seconds: 60 };
    _config.users[username][feature] = { requests: def.requests, window_seconds: def.window_seconds };
    refreshOverrideContainer(overrideContainer, tabKey);
  });
  headerRow.appendChild(addBtn);
  wrap.appendChild(headerRow);

  // System config overrides row (only for tab-scoped cards)
  if (tabKey) {
    const sysParams = SYSTEM_PARAMS.filter(p => p.tab === tabKey);
    if (sysParams.length) {
      const sysHeaderRow = document.createElement('div');
      sysHeaderRow.className = 'user-row-header';
      sysHeaderRow.style.marginTop = '8px';

      const sysUserSel = document.createElement('select');
      sysUserSel.innerHTML = '<option value="">— select user —</option>';
      _users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.username;
        opt.textContent = `${u.username}${u.fullname ? ' (' + u.fullname + ')' : ''}`;
        sysUserSel.appendChild(opt);
      });
      sysHeaderRow.appendChild(sysUserSel);

      const sysParamSel = document.createElement('select');
      sysParams.forEach(({ key, label }) => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = label;
        sysParamSel.appendChild(opt);
      });
      sysHeaderRow.appendChild(sysParamSel);

      const sysValueInp = document.createElement('input');
      sysValueInp.type = 'number';
      sysValueInp.placeholder = 'Value';
      sysValueInp.style.cssText = 'width:90px;';
      sysHeaderRow.appendChild(sysValueInp);

      const addSysBtn = document.createElement('button');
      addSysBtn.className = 'btn btn-primary btn-sm';
      addSysBtn.textContent = '+ Add System Config Override';
      addSysBtn.addEventListener('click', () => {
        const username = sysUserSel.value;
        const paramKey = sysParamSel.value;
        const value    = sysValueInp.value.trim();
        if (!username) { toast('Select a user first', 'error'); return; }
        if (!value)    { toast('Enter a value', 'error'); return; }
        const numVal = parseFloat(value);
        if (isNaN(numVal)) { toast('Value must be a number', 'error'); return; }
        if (!_config.users[username]) _config.users[username] = {};
        if (!_config.users[username]._sysconfig) _config.users[username]._sysconfig = {};
        _config.users[username]._sysconfig[paramKey] = numVal;
        sysValueInp.value = '';
        refreshOverrideContainer(overrideContainer, tabKey);
      });
      sysHeaderRow.appendChild(addSysBtn);
      wrap.appendChild(sysHeaderRow);
    }
  }

  const overrideContainer = document.createElement('div');
  overrideContainer.id = containerId;
  overrideContainer.dataset.tabkey = tabKey || '';
  refreshOverrideContainer(overrideContainer, tabKey);
  wrap.appendChild(overrideContainer);

  return wrap;
}

function renderAccessLevelsCard() {
  const TAB_KEYS = ['autosourcing', 'talent_evaluation', 'cms', 'consulting'];

  const card = document.createElement('div');
  card.innerHTML = '<h2>🔐 Access Levels</h2><p style="color:var(--muted);font-size:13px;margin:0 0 16px">Create named access levels (e.g. <em>SuperUser</em>), configure rate limit overrides per section, then assign them to users. Assigned users inherit the level\'s overrides and their <code>useraccess</code> is updated in the database.</p>';

  // ── Create new level ────────────────────────────────────────────────────────
  const createRow = document.createElement('div');
  createRow.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;';
  const nameInp = document.createElement('input');
  nameInp.type = 'text';
  nameInp.placeholder = 'Access level name (e.g. SuperUser)';
  nameInp.style.cssText = 'flex:1 1 200px;max-width:280px;';
  const createBtn = document.createElement('button');
  createBtn.className = 'btn btn-primary btn-sm';
  createBtn.textContent = '+ Create Access Level';
  createBtn.addEventListener('click', () => {
    const name = nameInp.value.trim();
    if (!name) { toast('Enter an access level name', 'error'); return; }
    if (name.toLowerCase() === 'admin') { toast('"admin" is reserved', 'error'); return; }
    if (_config.access_levels[name]) { toast('Access level already exists', 'error'); return; }
    _config.access_levels[name] = {};
    TAB_KEYS.forEach(t => { _config.access_levels[name][t] = {}; });
    nameInp.value = '';
    rebuildLevelsList();
    rebuildAssignTable();
  });
  createRow.appendChild(nameInp);
  createRow.appendChild(createBtn);
  card.appendChild(createRow);

  // ── Levels list ─────────────────────────────────────────────────────────────
  const levelsWrap = document.createElement('div');
  levelsWrap.id = 'accessLevelsList';
  card.appendChild(levelsWrap);

  function rebuildLevelsList() {
    levelsWrap.innerHTML = '';
    // Ensure "admin" is always present as a protected entry
    if (!_config.access_levels['admin']) _config.access_levels['admin'] = {};
    const levels = Object.keys(_config.access_levels || {});
    const sortedLevels = ['admin', ...levels.filter(l => l !== 'admin')];
    sortedLevels.forEach(levelName => {
      const isAdmin = levelName === 'admin';
      const levelData = _config.access_levels[levelName];
      const box = document.createElement('div');
      box.style.cssText = `border:1px solid ${isAdmin ? '#4c82b8' : '#d8d8d8'};border-radius:6px;margin-bottom:12px;overflow:hidden;`;

      // Header
      const hdr = document.createElement('div');
      hdr.style.cssText = `display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:${isAdmin ? '#e8f0fb' : '#f4f7fc'};cursor:pointer;`;
      const hdrTitle = document.createElement('strong');
      hdrTitle.textContent = (isAdmin ? '🏷 admin' : '🏷 ' + levelName);
      hdrTitle.style.color = '#073679';
      const hdrBtns = document.createElement('div');
      hdrBtns.style.cssText = 'display:flex;gap:6px;align-items:center;';
      const collapseToggle = document.createElement('span');
      collapseToggle.textContent = '▾';
      collapseToggle.style.cssText = 'cursor:pointer;color:#4c82b8;font-size:14px;';

      if (isAdmin) {
        // Protected — show lock badge instead of delete button
        const lockBadge = document.createElement('span');
        lockBadge.textContent = '🔒 Fixed';
        lockBadge.style.cssText = 'font-size:11px;color:#4c82b8;font-weight:600;padding:2px 7px;border:1px solid #4c82b8;border-radius:4px;';
        hdrBtns.appendChild(collapseToggle);
        hdrBtns.appendChild(lockBadge);
      } else {
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-sm';
        delBtn.style.cssText = 'background:#d9534f;color:#fff;border:none;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;';
        delBtn.textContent = '🗑 Delete';
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm(`Delete access level "${levelName}"? Users assigned this level will have their access cleared.`)) return;
          delBtn.disabled = true;
          delBtn.textContent = '⏳';
          try {
            const r = await fetch(`${API}/admin/access-levels/${encodeURIComponent(levelName)}`, {
              method: 'DELETE',
              headers: csrfHeaders(),
              credentials: 'same-origin',
            });
            const data = await r.json().catch(() => ({}));
            if (!r.ok) { toast(data.error || 'Delete failed', 'error'); delBtn.disabled = false; delBtn.textContent = '🗑 Delete'; return; }
            // Update in-memory config to match persisted state
            delete _config.access_levels[levelName];
            if (data.cleared_users && data.cleared_users.length) {
              toast(`Access level "${levelName}" deleted. ${data.cleared_users.length} user(s) cleared.`, 'success');
            } else {
              toast(`Access level "${levelName}" deleted.`, 'success');
            }
            rebuildLevelsList();
            rebuildAssignTable();
          } catch (err) {
            toast('Network error: ' + err.message, 'error');
            delBtn.disabled = false;
            delBtn.textContent = '🗑 Delete';
          }
        });
        hdrBtns.appendChild(collapseToggle);
        hdrBtns.appendChild(delBtn);
      }
      hdr.appendChild(hdrTitle);
      hdr.appendChild(hdrBtns);
      box.appendChild(hdr);

      // Body — per-section rate limit overrides (inline configuration)
      const body = document.createElement('div');
      body.style.cssText = 'padding:10px 14px;display:none;';
      hdr.addEventListener('click', () => {
        const collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        collapseToggle.textContent = collapsed ? '▾' : '▸';
      });

      // Per-section override configuration
      const SECTIONS_FOR_AL = [
        { tabKey: 'autosourcing', alTabKey: 'autosourcing', title: 'Autosourcing' },
        { tabKey: 'talent',       alTabKey: 'talent_evaluation', title: 'Talent Evaluation' },
        { tabKey: 'cms',          alTabKey: 'cms', title: 'CMS' },
        { tabKey: 'dashboard',    alTabKey: 'consulting', title: 'Consulting Dashboard' },
      ];

      SECTIONS_FOR_AL.forEach(sect => {
        const sectionFeatures = FEATURES.filter(f => f.tab === sect.tabKey);
        const sectionSysParams = SYSTEM_PARAMS.filter(p => p.tab === sect.tabKey);

        if (!_config.access_levels[levelName][sect.alTabKey]) _config.access_levels[levelName][sect.alTabKey] = {};
        const alTabData = _config.access_levels[levelName][sect.alTabKey];

        const alSysCfgKey = '_syscfg_' + sect.alTabKey;
        if (!_config.access_levels[levelName][alSysCfgKey]) _config.access_levels[levelName][alSysCfgKey] = {};
        const alSysCfgData = _config.access_levels[levelName][alSysCfgKey];

        // Section container
        const secBox = document.createElement('div');
        secBox.style.cssText = 'border:1px solid #d8d8d8;border-radius:5px;margin-bottom:10px;overflow:hidden;';

        const secHdr = document.createElement('div');
        secHdr.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:#f4f7fc;cursor:pointer;';
        const secTitle = document.createElement('span');
        secTitle.style.cssText = 'font-size:12px;font-weight:600;color:#073679;';
        secTitle.textContent = sect.title;
        const secToggle = document.createElement('span');
        secToggle.textContent = '▸';
        secToggle.style.cssText = 'color:#4c82b8;font-size:12px;';
        secHdr.appendChild(secTitle);
        secHdr.appendChild(secToggle);
        secBox.appendChild(secHdr);

        const secBody = document.createElement('div');
        secBody.style.cssText = 'padding:10px 12px;display:none;';
        secHdr.addEventListener('click', () => {
          const col = secBody.style.display === 'none';
          secBody.style.display = col ? '' : 'none';
          secToggle.textContent = col ? '▾' : '▸';
        });

        // Rate limit overrides for this section
        const rlTitle = document.createElement('p');
        rlTitle.style.cssText = 'font-size:11px;font-weight:600;color:#4c82b8;margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px;';
        rlTitle.textContent = 'Rate Limit Overrides';
        secBody.appendChild(rlTitle);

        const rlWrap = document.createElement('div');
        secBody.appendChild(rlWrap);

        function rebuildRLTable() {
          rlWrap.innerHTML = '';
          const featKeys = Object.keys(alTabData);
          if (featKeys.length) {
            const tbl = document.createElement('table');
            tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px;';
            tbl.innerHTML = '<thead><tr><th style="text-align:left;padding:3px 5px;color:var(--muted);">Feature</th><th style="padding:3px 5px;color:var(--muted);">Requests</th><th style="padding:3px 5px;color:var(--muted);">Window (s)</th><th></th></tr></thead>';
            const tbody = document.createElement('tbody');
            featKeys.forEach(fk => {
              const ov = alTabData[fk];
              const featLabel = (FEATURES.find(f => f.key === fk) || {}).label || fk;
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td style="padding:2px 5px;">${escHtml(featLabel)}</td>
                <td style="padding:2px 5px;"><input type="number" min="1" style="width:64px;" value="${ov.requests || 10}" data-field="requests"></td>
                <td style="padding:2px 5px;"><input type="number" min="1" style="width:64px;" value="${ov.window_seconds || 60}" data-field="window_seconds"></td>
                <td style="padding:2px 5px;"><button style="background:#d9534f;color:#fff;border:none;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;">✕</button></td>`;
              tr.querySelectorAll('input').forEach(inp => {
                inp.addEventListener('change', () => { alTabData[fk][inp.dataset.field] = parseInt(inp.value, 10) || 1; });
              });
              tr.querySelector('button').addEventListener('click', () => { delete alTabData[fk]; rebuildRLTable(); });
              tbody.appendChild(tr);
            });
            tbl.appendChild(tbody);
            rlWrap.appendChild(tbl);
          } else {
            const empty = document.createElement('p');
            empty.style.cssText = 'color:var(--muted);font-size:11px;margin:0 0 6px;';
            empty.textContent = 'No rate limit overrides for ' + sect.title + '.';
            rlWrap.appendChild(empty);
          }
          const addRow = document.createElement('div');
          addRow.style.cssText = 'display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:10px;';
          const featSel = document.createElement('select');
          featSel.style.cssText = 'flex:1 1 140px;max-width:220px;font-size:11px;';
          featSel.innerHTML = '<option value="">— add feature override —</option>';
          sectionFeatures.forEach(({ key, label }) => {
            if (!alTabData[key]) {
              const o = document.createElement('option'); o.value = key; o.textContent = label;
              featSel.appendChild(o);
            }
          });
          const addBtn = document.createElement('button');
          addBtn.className = 'btn btn-sm btn-primary';
          addBtn.style.fontSize = '10px';
          addBtn.textContent = '+ Add';
          addBtn.addEventListener('click', () => {
            const fk = featSel.value;
            if (!fk) { toast('Select a feature', 'error'); return; }
            const def = _config.defaults[fk] || { requests: 10, window_seconds: 60 };
            alTabData[fk] = { requests: def.requests, window_seconds: def.window_seconds };
            rebuildRLTable();
          });
          addRow.appendChild(featSel);
          addRow.appendChild(addBtn);
          rlWrap.appendChild(addRow);
        }
        rebuildRLTable();

        // System config overrides for this section (if any params exist)
        if (sectionSysParams.length) {
          const scTitle = document.createElement('p');
          scTitle.style.cssText = 'font-size:11px;font-weight:600;color:#4c82b8;margin:6px 0 6px;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid #e8e8e8;padding-top:8px;';
          scTitle.textContent = 'System Config Overrides';
          secBody.appendChild(scTitle);

          const scWrap = document.createElement('div');
          secBody.appendChild(scWrap);

          function rebuildSCTable() {
            scWrap.innerHTML = '';
            const paramKeys = Object.keys(alSysCfgData);
            if (paramKeys.length) {
              const tbl = document.createElement('table');
              tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px;';
              tbl.innerHTML = '<thead><tr><th style="text-align:left;padding:3px 5px;color:var(--muted);">Parameter</th><th style="padding:3px 5px;color:var(--muted);">Value</th><th></th></tr></thead>';
              const tbody = document.createElement('tbody');
              paramKeys.forEach(pk => {
                const paramLabel = (SYSTEM_PARAMS.find(p => p.key === pk) || {}).label || pk;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                  <td style="padding:2px 5px;">${escHtml(paramLabel)}</td>
                  <td style="padding:2px 5px;"><input type="number" style="width:100px;" value="${alSysCfgData[pk]}"></td>
                  <td style="padding:2px 5px;"><button style="background:#d9534f;color:#fff;border:none;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;">✕</button></td>`;
                tr.querySelector('input').addEventListener('change', e => { alSysCfgData[pk] = parseFloat(e.target.value) || 0; });
                tr.querySelector('button').addEventListener('click', () => { delete alSysCfgData[pk]; rebuildSCTable(); });
                tbody.appendChild(tr);
              });
              tbl.appendChild(tbody);
              scWrap.appendChild(tbl);
            } else {
              const empty = document.createElement('p');
              empty.style.cssText = 'color:var(--muted);font-size:11px;margin:0 0 6px;';
              empty.textContent = 'No system config overrides for ' + sect.title + '.';
              scWrap.appendChild(empty);
            }
            const addRow = document.createElement('div');
            addRow.style.cssText = 'display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:6px;';
            const paramSel = document.createElement('select');
            paramSel.style.cssText = 'flex:1 1 160px;max-width:240px;font-size:11px;';
            paramSel.innerHTML = '<option value="">— add param override —</option>';
            sectionSysParams.forEach(({ key, label }) => {
              if (!alSysCfgData.hasOwnProperty(key)) {
                const o = document.createElement('option'); o.value = key; o.textContent = label;
                paramSel.appendChild(o);
              }
            });
            const valInp = document.createElement('input');
            valInp.type = 'number'; valInp.placeholder = 'Value'; valInp.style.cssText = 'width:80px;font-size:11px;';
            const addBtn = document.createElement('button');
            addBtn.className = 'btn btn-sm btn-primary';
            addBtn.style.fontSize = '10px';
            addBtn.textContent = '+ Add';
            addBtn.addEventListener('click', () => {
              const pk = paramSel.value;
              if (!pk) { toast('Select a parameter', 'error'); return; }
              if (!valInp.value) { toast('Enter a value', 'error'); return; }
              alSysCfgData[pk] = parseFloat(valInp.value) || 0;
              valInp.value = '';
              rebuildSCTable();
            });
            addRow.appendChild(paramSel);
            addRow.appendChild(valInp);
            addRow.appendChild(addBtn);
            scWrap.appendChild(addRow);
          }
          rebuildSCTable();
        }

        secBox.appendChild(secBody);
        body.appendChild(secBox);
      });

      // Save button within the level card
      const lvlSaveRow = document.createElement('div');
      lvlSaveRow.style.cssText = 'text-align:right;margin-top:8px;';
      const lvlSaveBtn = document.createElement('button');
      lvlSaveBtn.className = 'btn btn-primary btn-sm';
      lvlSaveBtn.textContent = '💾 Save Access Level';
      lvlSaveBtn.addEventListener('click', saveAll);
      lvlSaveRow.appendChild(lvlSaveBtn);
      body.appendChild(lvlSaveRow);

      box.appendChild(body);
      levelsWrap.appendChild(box);
    });
  }
  rebuildLevelsList();

  // ── Divider ──────────────────────────────────────────────────────────────────
  const divider = document.createElement('hr');
  divider.style.cssText = 'margin:20px 0;border:none;border-top:1px solid #d8d8d8;';
  card.appendChild(divider);

  // ── Assign access level to user ──────────────────────────────────────────────
  const assignTitle = document.createElement('h3');
  assignTitle.textContent = 'Assign Access Level to User';
  assignTitle.style.cssText = 'font-size:15px;color:#073679;margin:0 0 10px;';
  card.appendChild(assignTitle);

  const assignRow = document.createElement('div');
  assignRow.style.cssText = 'display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;';

  const userSel = document.createElement('select');
  userSel.style.cssText = 'flex:1 1 180px;max-width:250px;';
  userSel.innerHTML = '<option value="">— select user —</option>';
  _users.forEach(u => {
    const o = document.createElement('option');
    o.value = u.username;
    o.textContent = `${u.username}${u.fullname ? ' (' + u.fullname + ')' : ''}`;
    userSel.appendChild(o);
  });

  const levelSel = document.createElement('select');
  levelSel.id = 'alAssignLevelSel';
  levelSel.style.cssText = 'flex:1 1 150px;max-width:220px;';

  function rebuildLevelSelOptions() {
    levelSel.innerHTML = '<option value="">— select level —</option>';
    Object.keys(_config.access_levels || {}).forEach(ln => {
      const o = document.createElement('option');
      o.value = ln; o.textContent = ln;
      levelSel.appendChild(o);
    });
    const adminOpt = document.createElement('option');
    adminOpt.value = 'admin'; adminOpt.textContent = 'admin';
    levelSel.appendChild(adminOpt);
    const clearOpt = document.createElement('option');
    clearOpt.value = ''; clearOpt.textContent = '— clear (remove access level) —';
    levelSel.appendChild(clearOpt);
  }
  rebuildLevelSelOptions();

  const assignBtn = document.createElement('button');
  assignBtn.className = 'btn btn-primary btn-sm';
  assignBtn.textContent = 'Assign';
  assignBtn.addEventListener('click', async () => {
    const username = userSel.value;
    const levelVal = levelSel.value;
    if (!username) { toast('Select a user', 'error'); return; }
    const isClear = levelVal === '';
    const payload = { username, access_level: levelVal };
    try {
      const r = await fetch(`${API}/admin/update-useraccess`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...csrfHeaders() },
        credentials: 'same-origin',
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok) { toast(data.error || 'Failed to assign access level', 'error'); return; }
      toast(`Access level "${isClear ? '(cleared)' : levelVal}" assigned to ${username} ✓`, 'success');
      // Update local _users cache
      const u = _users.find(u => u.username === username);
      if (u) u.useraccess = isClear ? null : levelVal;
      rebuildAssignTable();
    } catch (err) {
      toast('Network error: ' + err.message, 'error');
    }
  });

  assignRow.appendChild(userSel);
  assignRow.appendChild(levelSel);
  assignRow.appendChild(assignBtn);
  card.appendChild(assignRow);

  // ── Current assignments table ────────────────────────────────────────────────
  const assignTableWrap = document.createElement('div');
  assignTableWrap.id = 'alAssignTable';
  card.appendChild(assignTableWrap);

  function rebuildAssignTable() {
    rebuildLevelSelOptions();
    assignTableWrap.innerHTML = '';
    const usersWithAccess = _users.filter(u => u.useraccess);
    if (!usersWithAccess.length) {
      assignTableWrap.innerHTML = '<p style="color:var(--muted);font-size:13px;">No users have been assigned a named access level yet.</p>';
      return;
    }
    const tbl = document.createElement('table');
    tbl.style.cssText = 'width:100%;border-collapse:collapse;font-size:13px;';
    tbl.innerHTML = `<thead><tr>
      <th style="text-align:left;padding:6px 8px;border-bottom:2px solid #073679;color:#073679;">Username</th>
      <th style="text-align:left;padding:6px 8px;border-bottom:2px solid #073679;color:#073679;">Full Name</th>
      <th style="text-align:left;padding:6px 8px;border-bottom:2px solid #073679;color:#073679;">Access Level</th>
      <th style="padding:6px 8px;border-bottom:2px solid #073679;"></th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');
    usersWithAccess.forEach(u => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="padding:5px 8px;border-bottom:1px solid #e0e0e0;">${escHtml(u.username)}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #e0e0e0;">${escHtml(u.fullname || '—')}</td>
        <td style="padding:5px 8px;border-bottom:1px solid #e0e0e0;"><span style="background:#4c82b8;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">${escHtml(u.useraccess)}</span></td>
        <td style="padding:5px 8px;border-bottom:1px solid #e0e0e0;">
          <button class="btn btn-sm" style="background:#d9534f;color:#fff;border:none;border-radius:3px;padding:1px 6px;font-size:11px;cursor:pointer;" data-clearuser="${escHtml(u.username)}">Clear</button>
        </td>`;
      tr.querySelector('[data-clearuser]').addEventListener('click', async () => {
        const uname = u.username;
        try {
          const r = await fetch(`${API}/admin/update-useraccess`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...csrfHeaders() },
            credentials: 'same-origin',
            body: JSON.stringify({ username: uname, access_level: '' }),
          });
          const data = await r.json();
          if (!r.ok) { toast(data.error || 'Failed', 'error'); return; }
          u.useraccess = null;
          toast(`Access level cleared for ${uname}`, 'success');
          rebuildAssignTable();
        } catch (err) {
          toast('Network error: ' + err.message, 'error');
        }
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    assignTableWrap.appendChild(tbl);
  }
  rebuildAssignTable();

  return card;
}

function _userEntryIsEmpty(userCfg) {
  const featureKeys = Object.keys(userCfg).filter(k => k !== '_sysconfig');
  const syscfgKeys  = Object.keys(userCfg._sysconfig && typeof userCfg._sysconfig === 'object' ? userCfg._sysconfig : {});
  return !featureKeys.length && !syscfgKeys.length;
}

function refreshOverrideContainer(container, tabKey) {
  if (!container) return;
  tabKey = tabKey !== undefined ? tabKey : (container.dataset.tabkey || '');
  container.innerHTML = '';

  const relevantFeatureKeys = tabKey
    ? new Set(FEATURES.filter(f => f.tab === tabKey).map(f => f.key))
    : null;
  const relevantSysKeys = tabKey
    ? new Set(SYSTEM_PARAMS.filter(p => p.tab === tabKey).map(p => p.key))
    : null;

  const userKeys = Object.keys(_config.users || {}).sort();
  let anyRendered = false;

  userKeys.forEach(username => {
    const userOverrides = _config.users[username];
    // Feature keys (exclude _sysconfig meta-key)
    const featureKeys = Object.keys(userOverrides).filter(k => {
      if (k === '_sysconfig') return false;
      return relevantFeatureKeys ? relevantFeatureKeys.has(k) : true;
    });
    const sysconfigEntries = userOverrides._sysconfig
      ? Object.entries(userOverrides._sysconfig).filter(([k]) => relevantSysKeys ? relevantSysKeys.has(k) : true)
      : [];

    if (!featureKeys.length && !sysconfigEntries.length) return;
    anyRendered = true;

    const section = document.createElement('div');
    section.style.marginBottom = '18px';

    const titleRow = document.createElement('div');
    titleRow.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:6px;';
    titleRow.innerHTML = `<strong style="font-size:14px">👤 ${escHtml(username)}</strong>`;
    const removeUserBtn = document.createElement('button');
    removeUserBtn.className = 'btn btn-danger btn-sm';
    removeUserBtn.textContent = '✕ Remove All';
    removeUserBtn.addEventListener('click', () => {
      delete _config.users[username];
      refreshOverrideContainer(container, tabKey);
    });
    titleRow.appendChild(removeUserBtn);
    section.appendChild(titleRow);

    if (featureKeys.length) {
      const table = document.createElement('table');
      table.className = 'user-override-table';
      table.innerHTML = `
        <thead>
          <tr><th>Feature</th><th>Requests</th><th>Window (s)</th><th></th></tr>
        </thead>`;
      const tbody = document.createElement('tbody');
      featureKeys.forEach(key => {
        const cfg = userOverrides[key];
        const featureLabel = (FEATURES.find(f => f.key === key) || { label: key }).label;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escHtml(featureLabel)}<br><small style="color:var(--muted)">${escHtml(key)}</small></td>
          <td><input type="number" min="1"
                data-scope="users" data-username="${escHtml(username)}" data-key="${escHtml(key)}" data-field="requests"
                value="${cfg.requests}"></td>
          <td><input type="number" min="1"
                data-scope="users" data-username="${escHtml(username)}" data-key="${escHtml(key)}" data-field="window_seconds"
                value="${cfg.window_seconds}"></td>
          <td>
            <button class="btn btn-danger btn-sm" data-rm-user="${escHtml(username)}" data-rm-key="${escHtml(key)}">✕</button>
          </td>`;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      section.appendChild(table);
    }

    if (sysconfigEntries.length) {
      const sysTitle = document.createElement('div');
      sysTitle.style.cssText = 'font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:10px 0 4px;';
      sysTitle.textContent = 'System Configuration Overrides';
      section.appendChild(sysTitle);

      const sysTable = document.createElement('table');
      sysTable.className = 'user-override-table';
      sysTable.innerHTML = `
        <thead>
          <tr><th>Parameter</th><th>Value</th><th></th></tr>
        </thead>`;
      const sysTbody = document.createElement('tbody');
      sysconfigEntries.forEach(([key, value]) => {
        const paramLabel = (SYSTEM_PARAMS.find(p => p.key === key) || { label: key }).label;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escHtml(paramLabel)}<br><small style="color:var(--muted)">${escHtml(key)}</small></td>
          <td><input type="number" min="0"
                data-scope="user-sysconfig" data-username="${escHtml(username)}" data-key="${escHtml(key)}"
                value="${escHtml(String(value))}"></td>
          <td>
            <button class="btn btn-danger btn-sm" data-rm-syscfg-user="${escHtml(username)}" data-rm-syscfg-key="${escHtml(key)}">✕</button>
          </td>`;
        sysTbody.appendChild(tr);
      });
      sysTable.appendChild(sysTbody);
      section.appendChild(sysTable);
    }

    container.appendChild(section);
  });

  if (!anyRendered) {
    container.innerHTML = '<p class="no-override">No per-user overrides configured.</p>';
    return;
  }

  container.querySelectorAll('[data-rm-user]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.dataset.rmUser;
      const k = btn.dataset.rmKey;
      delete _config.users[u][k];
      if (_userEntryIsEmpty(_config.users[u])) delete _config.users[u];
      refreshOverrideContainer(container, tabKey);
    });
  });

  container.querySelectorAll('[data-rm-syscfg-user]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = btn.dataset.rmSyscfgUser;
      const k = btn.dataset.rmSyscfgKey;
      if (_config.users[u] && _config.users[u]._sysconfig) {
        delete _config.users[u]._sysconfig[k];
        if (!Object.keys(_config.users[u]._sysconfig).length) delete _config.users[u]._sysconfig;
        if (_userEntryIsEmpty(_config.users[u])) delete _config.users[u];
      }
      refreshOverrideContainer(container, tabKey);
    });
  });
}

function addOverride() {
  const username = document.getElementById('userSelect').value;
  const feature  = document.getElementById('featureSelect').value;
  if (!username) { toast('Select a user first', 'error'); return; }
  if (!_config.users[username]) _config.users[username] = {};
  if (_config.users[username][feature]) {
    toast('Override for this feature already exists — edit it in the table below', 'error');
    return;
  }
  const def = _config.defaults[feature] || { requests: 10, window_seconds: 60 };
  _config.users[username][feature] = { requests: def.requests, window_seconds: def.window_seconds };
  refreshOverrideContainer();
}

function collectConfig() {
  document.querySelectorAll('[data-scope="defaults"]').forEach(inp => {
    const key   = inp.dataset.key;
    const field = inp.dataset.field;
    if (!_config.defaults[key]) _config.defaults[key] = {};
    _config.defaults[key][field] = parseInt(inp.value, 10) || 1;
  });
  document.querySelectorAll('[data-scope="users"]').forEach(inp => {
    const username = inp.dataset.username;
    const key      = inp.dataset.key;
    const field    = inp.dataset.field;
    if (!_config.users[username]) _config.users[username] = {};
    if (!_config.users[username][key]) _config.users[username][key] = {};
    _config.users[username][key][field] = parseInt(inp.value, 10) || 1;
  });
  document.querySelectorAll('[data-scope="user-sysconfig"]').forEach(inp => {
    const username = inp.dataset.username;
    const key      = inp.dataset.key;
    if (!_config.users[username]) _config.users[username] = {};
    if (!_config.users[username]._sysconfig) _config.users[username]._sysconfig = {};
    const parsed = parseFloat(inp.value);
    if (!isNaN(parsed)) _config.users[username]._sysconfig[key] = parsed;
    else if (inp.value.trim()) _config.users[username]._sysconfig[key] = inp.value.trim();
  });
  document.querySelectorAll('[data-scope="system"]').forEach(inp => {
    const key = inp.dataset.key;
    if (!_config.system) _config.system = {};
    if (inp.type === 'text') {
      // Text fields (e.g. Looker Studio URLs) — save raw string value
      _config.system[key] = inp.value.trim();
    } else {
      const parsed = parseInt(inp.value, 10);
      if (!isNaN(parsed)) _config.system[key] = parsed;
    }
  });
  document.querySelectorAll('[data-scope="tokens"]').forEach(inp => {
    const key = inp.dataset.key;
    const parsed = parseFloat(inp.value);
    if (!isNaN(parsed)) {
      if (!_config.tokens) _config.tokens = {};
      _config.tokens[key] = parsed;
    }
  });
  // ML threshold inputs (confidence_level and user_consenses per access level)
  document.querySelectorAll('[data-scope="ml"]').forEach(inp => {
    const mlkey   = inp.dataset.mlkey;
    const mllevel = inp.dataset.mllevel;
    const parsed  = parseFloat(inp.value);
    if (mlkey && mllevel && !isNaN(parsed)) {
      if (!_config.ml) _config.ml = {};
      if (!_config.ml[mlkey]) _config.ml[mlkey] = {};
      _config.ml[mlkey][mllevel] = parsed;
    }
  });
  return _config;
}

async function saveAll() {
  const payload = collectConfig();
  try {
    const r = await fetch(`${API}/admin/rate-limits`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Save failed', 'error'); return; }
    toast('Rate limits saved successfully ✓', 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

  localStorage.setItem(_HIDDEN_COLS_KEY, JSON.stringify([..._usersHiddenCols]));
}
let _usersDateMode   = 'all';       // 'all' | 'today' | 'custom'
let _usersDateValue  = '';          // YYYY-MM-DD for custom date

function renderUsersCard() {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'usersCard';
  card.innerHTML = '<h2>User Management</h2>';

  if (!_users.length) {
    card.innerHTML += '<p class="empty-msg">No users found.</p>';

  }

  // ── Filter bar ──────────────────────────────────────────────────────────────

  dateLbl.textContent = '📅 Date:';
  filterBar.appendChild(dateLbl);

  // Quick range buttons
  const quickWrap = document.createElement('div');
  quickWrap.className = 'uf-quick';

  const btnAll = document.createElement('button');
  btnAll.textContent = 'All Time';
  btnAll.className = _usersDateMode === 'all' ? 'active' : '';

  const btnToday = document.createElement('button');
  btnToday.textContent = 'Today';
  btnToday.className = _usersDateMode === 'today' ? 'active' : '';

  dateInput.value = _usersDateValue;
  dateInput.title = 'Custom date';

  quickWrap.appendChild(btnAll);
  quickWrap.appendChild(btnToday);
  quickWrap.appendChild(dateInput);
  filterBar.appendChild(quickWrap);

  // Status badge (shows which date is active)
  const activeBadge = document.createElement('span');

  activeBadge.textContent = _usersDateMode === 'today' ? 'TODAY' : _usersDateValue;
  filterBar.appendChild(activeBadge);

  // Divider
  const div1 = document.createElement('span');
  div1.className = 'uf-divider';
  filterBar.appendChild(div1);

  // Column visibility toggle
  const colvisWrap = document.createElement('div');
  colvisWrap.className = 'uf-colvis-wrap';
  const colvisBtn = document.createElement('button');
  colvisBtn.className = 'uf-colvis-btn';
  colvisBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Columns`;
  const colvisPanel = document.createElement('div');
  colvisPanel.className = 'uf-colvis-panel';
  USER_COLS.forEach(c => {
    const lbl = document.createElement('label');
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.checked = !_usersHiddenCols.has(c.key);
    chk.dataset.colKey = c.key;
    lbl.appendChild(chk);
    lbl.appendChild(document.createTextNode(' ' + c.label));
    colvisPanel.appendChild(lbl);
    chk.addEventListener('change', () => {
      if (chk.checked) { _usersHiddenCols.delete(c.key); }
      else             { _usersHiddenCols.add(c.key);    }
      _saveHiddenCols();
      _applyUsersColVisibility(card);
    });
  });
  colvisBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = colvisPanel.classList.contains('open');
    colvisPanel.classList.toggle('open');
    if (!wasOpen) {
      // Single-use handler: close when user clicks outside the widget
      const closeOnOutside = (ev) => {
        if (!colvisWrap.contains(ev.target)) {
          colvisPanel.classList.remove('open');
          document.removeEventListener('click', closeOnOutside);
        }
      };
      // Defer so this click doesn't immediately close the panel
      setTimeout(() => document.addEventListener('click', closeOnOutside), 0);
    }
  });
  colvisWrap.appendChild(colvisBtn);
  colvisWrap.appendChild(colvisPanel);
  filterBar.appendChild(colvisWrap);

  card.appendChild(filterBar);

  // ── Table ───────────────────────────────────────────────────────────────────
  const wrap = document.createElement('div');
  wrap.className = 'users-tbl-wrap';

  const table = document.createElement('table');
  table.id = 'usersTable';
  const thead = document.createElement('thead');
  const htr = document.createElement('tr');
  USER_COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.dataset.colKey = c.key;
    if (c.key === 'username') th.classList.add('col-frozen');
    if (_usersHiddenCols.has(c.key)) th.classList.add('col-hidden');
    htr.appendChild(th);
  });
  const thAct = document.createElement('th');
  thAct.textContent = 'Actions';
  htr.appendChild(thAct);
  thead.appendChild(htr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  tbody.id = 'usersTableBody';
  _buildUsersTableRows(tbody, _users);
  table.appendChild(tbody);
  wrap.appendChild(table);
  card.appendChild(wrap);

  // ── Date filter event handlers ──────────────────────────────────────────────
  const todayStr = new Date().toISOString().slice(0, 10);

  async function _applyDateFilter(mode, dateVal) {
    _usersDateMode  = mode;
    _usersDateValue = dateVal || '';
    btnAll.className   = mode === 'all'    ? 'active' : '';
    btnToday.className = mode === 'today'  ? 'active' : '';
    if (mode === 'all') {
      activeBadge.style.display = 'none';
      _buildUsersTableRows(tbody, _users);
    } else {
      const d = mode === 'today' ? todayStr : dateVal;
      activeBadge.textContent = mode === 'today' ? 'TODAY' : d;
      activeBadge.style.display = '';
      try {
        const r = await fetch(`${API}/admin/users-daily-stats?date=${encodeURIComponent(d)}`, {
          headers: csrfHeaders(), credentials: 'same-origin'
        });
        const data = await r.json();
        if (data.ok) {
          _buildUsersTableRows(tbody, _users, data.stats);
        } else {
          toast('Daily stats error: ' + (data.error || 'unknown'), 'error');
        }
      } catch (err) {
        toast('Network error fetching daily stats', 'error');
      }
    }
  }

  btnAll.addEventListener('click', () => _applyDateFilter('all', ''));
  btnToday.addEventListener('click', () => _applyDateFilter('today', todayStr));
  dateInput.addEventListener('change', () => {
    if (dateInput.value) _applyDateFilter('custom', dateInput.value);
  });

  return card;
}

function _buildUsersTableRows(tbody, users, dailyStats) {
  tbody.innerHTML = '';
  users.forEach(u => {
    const stats = dailyStats ? (dailyStats[u.username] || { cse_count: 0, gemini_count: 0 }) : null;
    const cseCount    = stats ? stats.cse_count    : (u.cse_query_count    ?? 0);
    const geminiCount = stats ? stats.gemini_count : (u.gemini_query_count ?? 0);

    const tr = document.createElement('tr');
    USER_COLS.forEach(c => {
      const td = document.createElement('td');
      td.dataset.colKey = c.key;
      if (c.key === 'username') td.classList.add('col-frozen');
      if (_usersHiddenCols.has(c.key)) td.classList.add('col-hidden');

      if (c.key === 'token') {
        td.innerHTML = `<input class="inline-num" type="number" min="0" data-user="${escHtml(u.username)}" data-field="token" value="${u.token ?? 0}">`;
      } else if (c.key === 'target_limit') {
        td.innerHTML = `<input class="inline-num" type="number" min="1" data-user="${escHtml(u.username)}" data-field="target_limit" value="${u.target_limit ?? 10}">`;
      } else if (c.key === 'cse_query_count') {
        td.textContent = String(cseCount);
        td.style.textAlign = 'right';
      } else if (c.key === 'price_per_query') {
        const priceInput = document.createElement('input');
        priceInput.className = 'inline-num';
        priceInput.type = 'number';
        priceInput.min = '0';
        priceInput.step = '0.0001';
        priceInput.dataset.user = u.username;
        priceInput.dataset.field = 'price_per_query';
        priceInput.value = parseFloat(u.price_per_query ?? 0).toFixed(4);
        priceInput.addEventListener('input', () => {
          const costTd = tr.querySelector('[data-cost-cell]');
          const totalCostTd = tr.querySelector('[data-total-ai-cost-cell]');
          const newCseCost = calcTotalQueryCost(cseCount, priceInput.value);
          if (costTd) costTd.textContent = newCseCost;
          if (totalCostTd) {
            const geminiCost = calcTotalGeminiCost(geminiCount, tr.querySelector('[data-field="price_per_gemini_query"]')?.value ?? u.price_per_gemini_query);
            totalCostTd.textContent = calcTotalAiApiCost(newCseCost, geminiCost);
          }
        });
        td.appendChild(priceInput);
      } else if (c.key === 'total_query_cost') {
        td.textContent = calcTotalQueryCost(cseCount, u.price_per_query);
        td.dataset.costCell = u.username;
        td.style.textAlign = 'right';
      } else if (c.key === 'gemini_query_count') {
        td.textContent = String(geminiCount);
        td.style.textAlign = 'right';
      } else if (c.key === 'price_per_gemini_query') {
        const geminiPriceInput = document.createElement('input');
        geminiPriceInput.className = 'inline-num';
        geminiPriceInput.type = 'number';
        geminiPriceInput.min = '0';
        geminiPriceInput.step = '0.0001';
        geminiPriceInput.dataset.user = u.username;
        geminiPriceInput.dataset.field = 'price_per_gemini_query';
        geminiPriceInput.value = parseFloat(u.price_per_gemini_query ?? 0).toFixed(4);
        geminiPriceInput.addEventListener('input', () => {
          const geminiCostTd = tr.querySelector('[data-gemini-cost-cell]');
          const totalCostTd  = tr.querySelector('[data-total-ai-cost-cell]');
          const newGeminiCost = calcTotalGeminiCost(geminiCount, geminiPriceInput.value);
          if (geminiCostTd) geminiCostTd.textContent = newGeminiCost;
          if (totalCostTd) {
            const cseCost = calcTotalQueryCost(cseCount, tr.querySelector('[data-field="price_per_query"]')?.value ?? u.price_per_query);
            totalCostTd.textContent = calcTotalAiApiCost(cseCost, newGeminiCost);
          }
        });
        td.appendChild(geminiPriceInput);
      } else if (c.key === 'total_gemini_cost') {
        td.textContent = calcTotalGeminiCost(geminiCount, u.price_per_gemini_query);
        td.dataset.geminiCostCell = u.username;
        td.style.textAlign = 'right';
      } else if (c.key === 'total_ai_api_cost') {
        const cseCost    = calcTotalQueryCost(cseCount, u.price_per_query);
        const geminiCost = calcTotalGeminiCost(geminiCount, u.price_per_gemini_query);
        td.textContent = calcTotalAiApiCost(cseCost, geminiCost);
        td.dataset.totalAiCostCell = u.username;
        td.style.textAlign = 'right';
        td.style.fontWeight = 'bold';
      } else {
        td.title = String(u[c.key] ?? '');
        td.textContent = String(u[c.key] ?? '');
      }
      tr.appendChild(td);
    });
    // Actions: Save + Reset Password
    const tdAct = document.createElement('td');
    tdAct.style.whiteSpace = 'nowrap';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'save-inline';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', () => saveUserRow(u.username, tr));
    tdAct.appendChild(saveBtn);

    const resetPwBtn = document.createElement('button');
    resetPwBtn.className = 'save-inline';
    resetPwBtn.style.cssText = 'background:#8b4513;margin-left:6px;';
    resetPwBtn.textContent = 'Reset Password';
    resetPwBtn.title = 'Set a new password for this user';
    resetPwBtn.addEventListener('click', () => resetUserPassword(u.username, tdAct));
    tdAct.appendChild(resetPwBtn);

    tr.appendChild(tdAct);
    tbody.appendChild(tr);
  });
}

function _applyUsersColVisibility(card) {
  const tbl = card.querySelector('#usersTable');
  if (!tbl) return;
  tbl.querySelectorAll('[data-col-key]').forEach(el => {
    if (_usersHiddenCols.has(el.dataset.colKey)) {
      el.classList.add('col-hidden');
    } else {
      el.classList.remove('col-hidden');
    }
  });
}

async function saveUserRow(username, tr) {
  const tokenInput       = tr.querySelector('[data-field="token"]');
  const limitInput       = tr.querySelector('[data-field="target_limit"]');
  const priceInput       = tr.querySelector('[data-field="price_per_query"]');
  const geminiPriceInput = tr.querySelector('[data-field="price_per_gemini_query"]');
  const tokenVal       = parseInt(tokenInput?.value, 10);
  const limitVal       = parseInt(limitInput?.value, 10);
  const priceVal       = parseFloat(priceInput?.value) || 0;
  const geminiPriceVal = parseFloat(geminiPriceInput?.value) || 0;
  const errs = [];
  if (isNaN(tokenVal) || tokenVal < 0) errs.push('Token must be ≥ 0');
  if (isNaN(limitVal) || limitVal < 1) errs.push('Target limit must be ≥ 1');
  if (isNaN(priceVal) || priceVal < 0) errs.push('Price per CSE query must be ≥ 0');
  if (isNaN(geminiPriceVal) || geminiPriceVal < 0) errs.push('Price per Gemini query must be ≥ 0');
  if (errs.length) { toast(errs.join('; '), 'error'); return; }
  try {
    const [r1, r2, r3, r4] = await Promise.all([
      fetch(`${API}/admin/update-token`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, token: tokenVal }),
      }),
      fetch(`${API}/admin/update-target-limit`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, target_limit: limitVal }),
      }),
      fetch(`${API}/admin/update-price-per-query`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, price_per_query: priceVal }),
      }),
      fetch(`${API}/admin/update-price-per-gemini-query`, {
        method: 'POST', headers: csrfHeaders(), credentials: 'same-origin',
        body: JSON.stringify({ username, price_per_gemini_query: geminiPriceVal }),
      }),
    ]);
    const d1 = await r1.json();
    const d2 = await r2.json();
    const d3 = await r3.json();
    const d4 = await r4.json();
    if (!r1.ok) { toast(d1.error || 'Token update failed', 'error'); return; }
    if (!r2.ok) { toast(d2.error || 'Target limit update failed', 'error'); return; }
    if (!r3.ok) { toast(d3.error || 'Price per CSE query update failed', 'error'); return; }
    if (!r4.ok) { toast(d4.error || 'Price per Gemini query update failed', 'error'); return; }
    toast(`Saved for ${username} ✓`, 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

async function resetUserPassword(username, tdAct) {
  const newPwd = window.prompt(`Set new password for "${username}" (min 8 chars):`);
  if (!newPwd) return;
  if (newPwd.length < 8) { toast('Password must be at least 8 characters.', 'error'); return; }
  try {
    const r = await fetch(`${API}/admin/users/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...csrfHeaders() },
      credentials: 'same-origin',
      body: JSON.stringify({ username, new_password: newPwd }),
    });
    const data = await r.json();
    if (!r.ok) { toast('Reset failed: ' + (data.error || r.status), 'error'); return; }
    toast(`Password reset for ${username}.`, 'success');
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

function renderAppealsTable(card) {

        <th>Username</th>
        <th>Name</th>
        <th>Job Title</th>
        <th>Company</th>
        <th>LinkedIn URL</th>
        <th>Appeal Text</th>
        <th>Actions</th>

  const tbody = document.createElement('tbody');

      <td>${escHtml(ap.jobtitle)}</td>
      <td>${escHtml(ap.company)}</td>

             class="appeal-url">${escHtml(ap.linkedinurl)}</a></td>
      <td class="appeal-text">${escHtml(ap.appeal)}</td>
      <td></td>`;
    const tdAct = tr.querySelector('td:last-child');

    const approveBtn = document.createElement('button');
    approveBtn.className = 'btn btn-success btn-sm';
    approveBtn.style.marginRight = '6px';
    approveBtn.textContent = '✓ Approve (+1 token)';
    approveBtn.addEventListener('click', () => handleAppeal(ap, 'approve', tr));

    const rejectBtn = document.createElement('button');
    rejectBtn.className = 'btn btn-danger btn-sm';
    rejectBtn.textContent = '✕ Reject';
    rejectBtn.addEventListener('click', () => handleAppeal(ap, 'reject', tr));

    tdAct.appendChild(approveBtn);
    tdAct.appendChild(rejectBtn);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  card.appendChild(wrap);
}

async function handleAppeal(ap, action, tr) {
  const label = action === 'approve' ? 'Approve (+1 token)' : 'Reject';
  if (!confirm(`${label} appeal for ${ap.username || ap.linkedinurl}?`)) return;
  try {
    const r = await fetch(`${API}/admin/appeal-action`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ linkedinurl: ap.linkedinurl, username: ap.username, action }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Action failed', 'error'); return; }
    const msg = action === 'approve'
      ? `Appeal approved — 1 token added to ${ap.username} ✓`
      : `Appeal rejected and record removed ✓`;
    toast(msg, 'success');
    // Remove from local state and refresh table
    _appeals = _appeals.filter(a => a.linkedinurl !== ap.linkedinurl);
    const card = document.getElementById('appealsCard');
    if (card) {
      // Update tab label with new count
      document.querySelectorAll('.tab').forEach(b => {
        if (b.dataset.tab === 'tab-appeals') {
          b.textContent = `📋 Appeals${_appeals.length ? ' (' + _appeals.length + ')' : ''}`;
        }
      });
      renderAppealsTable(card);
    }
    // Also refresh token in users table if approved
    if (action === 'approve' && data.new_token !== null && ap.username) {
      const tokenInput = document.querySelector(
        `[data-user="${CSS.escape(ap.username)}"][data-field="token"]`
      );
      if (tokenInput) tokenInput.value = data.new_token;
    }
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  }
}

async function loadExistingMapping() {
  try {
    const r = await fetch(`${API}/api/porting/mapping`, { credentials: 'same-origin' });
    if (!r.ok) return;
    const data = await r.json();
    if (data.mapping && Object.keys(data.mapping).length) {
      _portingMapping = data.mapping;
      populateMappingTable(_portingMapping);
      document.getElementById('portingVerifySection').style.display = '';
      document.getElementById('portingLinkSection').style.display = '';
    }
  } catch (_) {}
}

async function runGeminiMapping() {
  const textarea = document.getElementById('portingNamesInput');
  const statusEl = document.getElementById('portingMapStatus');
  const mapBtn   = document.getElementById('portingMapBtn');

  const raw = textarea.value.trim();
  if (!raw) { toast('Enter at least one field name', 'error'); return; }

  const names = raw.split('\n').map(s => s.trim()).filter(Boolean);
  if (!names.length) { toast('No valid names found', 'error'); return; }

  mapBtn.disabled = true;
  mapBtn.textContent = '⏳ Mapping…';
  statusEl.textContent = 'Calling Gemini…';

  try {
    const r = await fetch(`${API}/api/porting/map`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ names }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Mapping failed', 'error'); statusEl.textContent = ''; return; }

    _portingMapping = data.mapping;
    populateMappingTable(_portingMapping);
    document.getElementById('portingVerifySection').style.display = '';
    document.getElementById('portingLinkSection').style.display = 'none';
    statusEl.textContent = `Mapped ${Object.keys(_portingMapping).length} field(s).`;
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
    statusEl.textContent = '';
  } finally {
    mapBtn.disabled = false;
    mapBtn.textContent = '✨ Map with Gemini';
  }
}

function populateMappingTable(mapping) {
  const tbody = document.getElementById('portingMappingBody');
  tbody.innerHTML = '';
  Object.entries(mapping).forEach(([ext, proc]) => {
    const tr = document.createElement('tr');

    const tdExt = document.createElement('td');
    tdExt.textContent = ext;
    tr.appendChild(tdExt);

    const tdProc = document.createElement('td');
    const sel = document.createElement('select');
    sel.dataset.ext = ext;

    const nullOpt = document.createElement('option');
    nullOpt.value = '';
    nullOpt.textContent = '— skip —';
    sel.appendChild(nullOpt);

    PROCESS_TABLE_FIELDS.forEach(field => {
      const opt = document.createElement('option');
      opt.value = field;
      opt.textContent = field;
      if (field === proc) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!proc) sel.value = '';

    sel.addEventListener('change', () => {
      _portingMapping[ext] = sel.value || null;
    });

    tdProc.appendChild(sel);
    tr.appendChild(tdProc);
    tbody.appendChild(tr);
  });
}

async function confirmMapping() {
  const confirmBtn  = document.getElementById('portingConfirmBtn');
  const confirmStat = document.getElementById('portingConfirmStatus');

  // Read current dropdown values
  document.querySelectorAll('#portingMappingBody select').forEach(sel => {
    _portingMapping[sel.dataset.ext] = sel.value || null;
  });

  confirmBtn.disabled = true;
  confirmBtn.textContent = '⏳ Saving…';
  confirmStat.textContent = '';

  try {
    const r = await fetch(`${API}/api/porting/confirm`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ mapping: _portingMapping }),
    });
    const data = await r.json();
    if (!r.ok) { toast(data.error || 'Confirm failed', 'error'); return; }

    toast('Mapping confirmed ✓', 'success');
    confirmStat.textContent = 'Saved!';
    document.getElementById('portingLinkSection').style.display = '';
  } catch (err) {
    toast('Network error: ' + err.message, 'error');
  } finally {
    confirmBtn.disabled = false;
    confirmBtn.textContent = '✅ Confirm Mapping';
  }
}

function resetPortingUI() {
  _portingMapping = {};
  document.getElementById('portingNamesInput').value = '';
  document.getElementById('portingMappingBody').innerHTML = '';
  document.getElementById('portingVerifySection').style.display = 'none';
  document.getElementById('portingLinkSection').style.display = 'none';
  document.getElementById('portingMapStatus').textContent = '';
  document.getElementById('portingConfirmStatus').textContent = '';
}
