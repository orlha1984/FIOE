async function fetchLogs() {
  const refreshBtn = document.getElementById('logRefreshBtn');
  if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.textContent = '⏳'; }

  // Build query string from filter
  const params = new URLSearchParams();
  if (_logsFilter.startDate) params.set('from', _logsFilter.startDate);
  if (_logsFilter.endDate)   params.set('to',   _logsFilter.endDate);

  try {
    const r = await fetch(`${API}/admin/logs?${params}`, { credentials: 'same-origin' });
    if (r.ok) {
      const data = await r.json();
      _logs.identity       = data.identity        || [];
      _logs.infrastructure = data.infrastructure  || [];
      _logs.agentic        = data.agentic          || [];
      _logs.financial      = data.financial        || [];
      _logs.security       = data.security         || [];
      _logs.approval       = data.approval         || [];
      _logs.errors         = data.errors           || [];
    } else if (r.status === 404) {
      // Endpoint not yet implemented — keep empty arrays
    } else if (r.status === 401) {
      location.reload(); return;
    }
  } catch (_) {
    // Network error — keep current data
  }

  // Fetch ledger entries (running balance ledger)
  try {
    const lr = await fetch(`${API}/admin/ledger`, { credentials: 'same-origin' });
    if (lr.ok) {
      _ledgerEntries = await lr.json();
    } else if (lr.status === 404) {
      _ledgerEntries = [];
    }
  } catch (_) {
    // Keep current ledger data on network error
  }

  applyLogsFilter();

  const lastEl = document.getElementById('logLastRefreshed');
  if (lastEl) lastEl.textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
  if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.textContent = '↺ Refresh'; }
}

function applyLogsFilter() {
  const search = _logsFilter.search || '';
  const from   = _logsFilter.startDate ? new Date(_logsFilter.startDate + 'T00:00:00') : null;
  const to     = _logsFilter.endDate   ? new Date(_logsFilter.endDate   + 'T23:59:59') : null;

  function passesDate(entry) {
    const tsField = entry.timestamp || entry.login_timestamp || entry.ts || '';
    if (!tsField) return true;
    const d = new Date(tsField);
    if (isNaN(d)) return true;
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  }

  function passesSearch(entry, catId) {
    if (!search) return true;
    const fields = LOG_SEARCH_FIELDS[catId] || Object.keys(entry);
    return fields.some(k => String(entry[k] || '').toLowerCase().includes(search));
  }

  function filterArr(arr, catId) {
    return arr.filter(e => passesDate(e) && passesSearch(e, catId));
  }

  // Reset pagination to page 1 when filter changes
  _identityPage = 1; _infraPage = 1; _agenticPage = 1; _financialPage = 1;
  _securityPage = 1; _approvalPage = 1; _errorsPage = 1;

  renderIdentitySection(filterArr(_logs.identity, 'identity'));
  renderInfraSection(filterArr(_logs.infrastructure, 'infrastructure'));
  renderAgenticSection(filterArr(_logs.agentic, 'agentic'));
  renderFinancialSection(filterArr(_logs.financial, 'financial'));
  renderSecuritySection(filterArr(_logs.security, 'security'));
  renderApprovalSection(filterArr(_logs.approval, 'approval'));
  renderErrorsSection(filterArr(_logs.errors, 'errors'));
}

// ── Shared log helpers ────────────────────────────────────────────────────────
// Sort rows newest-first using the first available timestamp field.
function _sortDesc(rows) {
  return rows.slice().sort((a, b) => {
    const ta = a.timestamp || a.login_timestamp || a.ts || '';
    const tb = b.timestamp || b.login_timestamp || b.ts || '';
    // ISO strings sort correctly lexicographically; descending = b before a
    return tb < ta ? -1 : tb > ta ? 1 : 0;
  });
}

/** Sort ledger entries by date ascending (for running balance computation). */
function _ledgerSortByDate(entries) {
  return entries.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
}

/**
 * Convert financial-credit log entries into Running Balance Ledger rows.
 * Only entries with a meaningful revenue_sgd or token amount are included.
 * These rows are marked with _auto=true so they cannot be deleted manually.
 */
function _financialToLedger(financialRows) {
  return (financialRows || [])
    .filter(r => r.transaction_type === 'spend' || r.transaction_type === 'credit')
    .map(r => {
      const ts   = r.timestamp || '';
      const date = ts.slice(0, 10);
      const amt  = parseFloat(r.transaction_amount) || 0;
      const rev  = parseFloat(r.revenue_sgd) || 0;
      // For legacy log entries that lack token_cost_sgd, fall back to the current
      // configured rate (_config.tokens.token_cost_sgd) so historical rows are still
      // displayed at the correct per-token price instead of treating 1 token as $1.
      const globalRate = parseFloat((_config.tokens || {}).token_cost_sgd) || 0.10;
      const costPerToken = parseFloat(r.token_cost_sgd) || globalRate;
      const isSpend = r.transaction_type === 'spend';
      const user  = r.username || r.user || '';
      // Prefer revenue_sgd (SGD monetary value) from the log entry for accuracy.
      // For legacy entries where revenue_sgd is 0 or absent, compute from
      // costPerToken (which already falls back to the global configured rate).
      // Math.abs() is required because transaction_amount is negative for spend
      // (e.g. -5 tokens) — value must be a positive amount for the debit/credit column.
      const value = rev > 0 ? rev : Math.round(Math.abs(amt) * costPerToken * 10000) / 10000;
      return {
        id:          'auto_' + ts.replace(/[^0-9]/g, '') + '_' + (r.feature || 'txn') + '_' + (user || 'u').slice(0, 8),
        date:        date,
        category:    isSpend ? 'Revenue' : 'Refund',
        reference:   'TXN-' + ts.replace(/[^0-9]/g, '').slice(0, 14),
        description: '[Auto] ' + (r.feature || 'transaction') + ': ' + amt + ' tkn' + (user ? ' by ' + user : ''),
        debit:       isSpend ? value : 0,
        credit:      isSpend ? 0 : value,
        created_by:  user,
        created_at:  ts,
        _auto:       true,
        _source:     'transaction',
      };
    });
}

// ── Shared visualization helpers ──────────────────────────────────────────────

/** Collect sorted unique usernames from an array of log rows. */
function _uniqueUsers(rows) {
  const s = new Set();
  rows.forEach(r => { if (r.username) s.add(r.username); });
  return Array.from(s).sort();
}

/** Render a collapsible visualization panel (charts + username filter + Gemini analysis) for a log section.
 *  `rows`        — filtered log rows for the section
 *  `panelTitle`  — display title
 *  `buildCharts` — function(filteredRows, container) that appends SVG charts to container
 *  `sectionKey`  — string key sent to /admin/logs/analyse-chart ("financial", "approval", "errors")
 */
function _buildVizPanel(rows, panelTitle, buildCharts, sectionKey) {
  const panel = document.createElement('div');
  panel.style.cssText = 'margin:0 0 18px;border:1px solid #4c82b8;border-radius:8px;overflow:hidden;background:#f4f7fc;box-shadow:0 2px 8px rgba(7,54,121,0.07);';

  // ── Header row ──
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:9px 14px;background:#073679;border-bottom:2px solid #4c82b8;';

  const title = document.createElement('span');
  title.style.cssText = 'font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em;';
  title.textContent = '📊 ' + panelTitle;

  // Username filter
  const filterWrap = document.createElement('div');
  filterWrap.style.cssText = 'display:flex;align-items:center;gap:6px;';
  const fLbl = document.createElement('label');
  fLbl.style.cssText = 'font-size:11px;color:#d8d8d8;font-weight:500;';
  fLbl.textContent = 'User:';
  const fSel = document.createElement('select');
  fSel.style.cssText = 'font-size:11px;padding:3px 8px;border:1px solid #4c82b8;border-radius:4px;background:#fff;color:#073679;cursor:pointer;font-weight:500;';
  const allOpt = document.createElement('option');
  allOpt.value = ''; allOpt.textContent = 'All users';
  fSel.appendChild(allOpt);
  _uniqueUsers(rows).forEach(u => {
    const opt = document.createElement('option');
    opt.value = u; opt.textContent = u;
    fSel.appendChild(opt);
  });

  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'btn btn-sm';
  collapseBtn.style.cssText = 'font-size:11px;padding:3px 10px;background:#4c82b8;border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:500;';
  collapseBtn.textContent = '▲ Collapse';

  filterWrap.appendChild(fLbl);
  filterWrap.appendChild(fSel);
  filterWrap.appendChild(collapseBtn);
  hdr.appendChild(title);
  hdr.appendChild(filterWrap);
  panel.appendChild(hdr);

  // ── Content wrapper (charts grid + Gemini row stacked) ──
  const contentWrap = document.createElement('div');

  // ── Charts container ──
  const chartArea = document.createElement('div');
  chartArea.className = 'viz-charts-grid';

  // ── Gemini analysis panel (full row below charts) ──
  const aiPanel = document.createElement('div');
  aiPanel.className = 'viz-gemini-row';

  const aiHdr = document.createElement('div');
  aiHdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';

  const aiTitle = document.createElement('span');
  aiTitle.style.cssText = 'font-size:11px;font-weight:700;color:#073679;text-transform:uppercase;letter-spacing:.05em;';
  aiTitle.textContent = '✨ Gemini Trend Analysis';

  const aiAnalyseBtn = document.createElement('button');
  aiAnalyseBtn.className = 'btn btn-sm';
  aiAnalyseBtn.style.cssText = 'font-size:11px;padding:3px 12px;background:linear-gradient(135deg,#073679,#4c82b8);border:none;border-radius:4px;color:#fff;cursor:pointer;font-weight:600;';
  aiAnalyseBtn.innerHTML = '✨ Analyse';

  aiHdr.appendChild(aiTitle);
  aiHdr.appendChild(aiAnalyseBtn);
  aiPanel.appendChild(aiHdr);

  const aiOutput = document.createElement('div');
  aiOutput.style.cssText = 'font-size:12px;color:#222529;line-height:1.6;background:#fff;border:1px solid #d8d8d8;border-radius:6px;padding:10px 12px;min-height:36px;display:none;';
  aiOutput.textContent = 'Click "✨ Analyse" to run Gemini trend analysis on the current data.';
  aiPanel.appendChild(aiOutput);

  // ── _buildSummary helper: extract summary stats from filtered rows ──
  function _buildChartSummary(filtered) {
    const summary = {};
    summary['Total records'] = filtered.length;
    summary['Unique users'] = new Set(filtered.map(r => r.username).filter(Boolean)).size;
    const dates = filtered.map(r => (r.timestamp || '').slice(0, 10)).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d));
    if (dates.length) {
      summary['Date range'] = dates[0] + ' to ' + dates[dates.length - 1];
    }
    // Section-specific aggregates
    if (sectionKey === 'financial') {
      const spends = filtered.filter(r => (r.transaction_type || '').toLowerCase() === 'spend');
      const credits = filtered.filter(r => (r.transaction_type || '').toLowerCase() === 'credit');
      const totalTokens = spends.reduce((s, r) => s + (parseInt(r.transaction_amount, 10) || 0), 0);
      const totalRevenue = spends.reduce((s, r) => s + (parseFloat(r.revenue_sgd) || 0), 0);
      summary['Spend transactions'] = spends.length;
      summary['Credit transactions'] = credits.length;
      summary['Total tokens deducted'] = totalTokens;
      summary['Total revenue (SGD)'] = totalRevenue.toFixed(2);
      const fmap = {};
      spends.forEach(r => { const f = _featureLabel(r.feature); fmap[f] = (fmap[f] || 0) + (parseInt(r.transaction_amount, 10) || 0); });
      const topFeat = Object.entries(fmap).sort((a,b) => b[1]-a[1])[0];
      if (topFeat) summary['Top feature by tokens'] = topFeat[0] + ' (' + topFeat[1] + ' tokens)';
    } else if (sectionKey === 'approval') {
      const actionMap = {};
      filtered.forEach(r => { const a = _approvalActionLabel(r.action || r.event_type); actionMap[a] = (actionMap[a] || 0) + 1; });
      Object.entries(actionMap).forEach(([k,v]) => { summary['Action: ' + k] = v; });
    } else if (sectionKey === 'errors') {
      const sevMap = {};
      filtered.forEach(r => { const s = r.severity || r.level || 'info'; sevMap[s] = (sevMap[s] || 0) + 1; });
      Object.entries(sevMap).forEach(([k,v]) => { summary['Severity: ' + k] = v; });
      const typeMap = {};
      filtered.forEach(r => { const t = _errorSeverityLabel(r.severity || r.level || r.error_type || r.event_type); typeMap[t] = (typeMap[t] || 0) + 1; });
      const topType = Object.entries(typeMap).sort((a,b) => b[1]-a[1])[0];
      if (topType) summary['Most common error type'] = topType[0] + ' (' + topType[1] + ' occurrences)';
    }
    return summary;
  }

  aiAnalyseBtn.addEventListener('click', async () => {
    const user = fSel.value;
    const filtered = user ? rows.filter(r => r.username === user) : rows;
    const summary = _buildChartSummary(filtered);

    aiAnalyseBtn.disabled = true;
    aiAnalyseBtn.textContent = '⏳ Analysing…';
    aiOutput.style.display = '';
    aiOutput.style.color = '#87888a';
    aiOutput.textContent = 'Calling Gemini…';

    try {
      const r = await fetch(`${API}/admin/logs/analyse-chart`, {
        method: 'POST',
        headers: csrfHeaders(),
        credentials: 'same-origin',
        body: JSON.stringify({ section: sectionKey || panelTitle, summary }),
      });
      const data = await r.json().catch(() => ({}));
      aiOutput.style.color = '#222529';
      if (r.ok && data.analysis) {
        aiOutput.textContent = data.analysis;
      } else if (r.status === 503) {
        aiOutput.style.color = '#87888a';
        aiOutput.textContent = 'Gemini not configured on the server (GEMINI_API_KEY not set).';
      } else {
        aiOutput.style.color = '#d9534f';
        aiOutput.textContent = data.error || 'Analysis failed.';
      }
    } catch (err) {
      aiOutput.style.color = '#d9534f';
      aiOutput.textContent = 'Network error: ' + err.message;
    }
    aiAnalyseBtn.disabled = false;
    aiAnalyseBtn.innerHTML = '✨ Re-analyse';
  });

  function refresh() {
    chartArea.innerHTML = '';  // clears charts only; aiPanel lives in contentWrap as a sibling
    const user = fSel.value;
    const filtered = user ? rows.filter(r => r.username === user) : rows;
    buildCharts(filtered, chartArea);
  }

  fSel.addEventListener('change', refresh);
  collapseBtn.addEventListener('click', () => {
    const collapsed = contentWrap.style.display === 'none';
    contentWrap.style.display = collapsed ? '' : 'none';
    collapseBtn.textContent = collapsed ? '▲ Collapse' : '▼ Expand';
  });

  refresh();
  contentWrap.appendChild(chartArea);
  contentWrap.appendChild(aiPanel);
  panel.appendChild(contentWrap);
  return panel;
}

// FIOE theme palette for charts
const _FIOE_CHART_COLORS = ['#073679','#4c82b8','#6deaf9','#87888a','#27ae60','#e67e22','#9b59b6','#e74c3c'];

/** Draw a bar chart SVG into `container`.
 *  `data` = [{label, value, color?}]  `title` = chart title string
 */
function _svgBarChart(data, title, container) {
  if (!data.length) return;
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const BAR_W = 44, GAP = 16, CHART_H = 120;
  // PAD_L: left margin large enough so the first bar's rotated label (-40°) stays inside SVG
  const maxLabelLen = Math.max(...data.map(d => String(d.label).length));
  const PAD_L = Math.max(24, Math.round(maxLabelLen * 6.2 * Math.cos(Math.PI * 40 / 180)) - Math.floor(BAR_W / 2) + 12);
  // LABEL_H: enough vertical room for labels rotated -40° (each char ≈ 6px wide)
  const LABEL_H = Math.max(70, Math.round(maxLabelLen * 6.2 * Math.sin(Math.PI * 40 / 180)) + 22);
  const svgW = Math.max(220, data.length * (BAR_W + GAP) + PAD_L + 16);
  const svgH = CHART_H + LABEL_H;

  const wrap = document.createElement('div');
  wrap.className = 'viz-chart-card';
  const ttl = document.createElement('div');
  ttl.className = 'viz-chart-card-title';
  ttl.textContent = title;
  wrap.appendChild(ttl);

  const svgWrap = document.createElement('div');
  svgWrap.style.cssText = 'overflow-x:auto;';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.style.cssText = 'display:block;max-width:100%;';

  // Baseline
  const baseline = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  baseline.setAttribute('x1', PAD_L); baseline.setAttribute('y1', CHART_H);
  baseline.setAttribute('x2', svgW - PAD_L); baseline.setAttribute('y2', CHART_H);
  baseline.setAttribute('stroke', '#d8d8d8'); baseline.setAttribute('stroke-width', '1');
  svg.appendChild(baseline);

  data.forEach((d, i) => {
    const x = PAD_L + i * (BAR_W + GAP);
    const barH = Math.max(4, Math.round((d.value / maxVal) * (CHART_H - 24)));
    const barY = CHART_H - barH;
    const color = d.color || _FIOE_CHART_COLORS[i % _FIOE_CHART_COLORS.length];

    // Bar gradient effect via two rects
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', barY);
    rect.setAttribute('width', BAR_W); rect.setAttribute('height', barH);
    rect.setAttribute('rx', '4'); rect.setAttribute('fill', color);
    svg.appendChild(rect);

    // Top highlight
    const hi = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hi.setAttribute('x', x + 2); hi.setAttribute('y', barY);
    hi.setAttribute('width', BAR_W - 4); hi.setAttribute('height', Math.min(6, barH));
    hi.setAttribute('rx', '3'); hi.setAttribute('fill', '#fff'); hi.setAttribute('opacity', '0.18');
    svg.appendChild(hi);

    // Value label above bar
    const vlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    vlbl.setAttribute('x', x + BAR_W / 2); vlbl.setAttribute('y', barY - 5);
    vlbl.setAttribute('text-anchor', 'middle');
    vlbl.setAttribute('font-size', '11'); vlbl.setAttribute('fill', color); vlbl.setAttribute('font-weight', '700');
    vlbl.textContent = d.value;
    svg.appendChild(vlbl);

    // X-axis label — rotated -40°, full label
    const xlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const lx = x + BAR_W / 2, ly = CHART_H + 12;
    xlbl.setAttribute('x', lx); xlbl.setAttribute('y', ly);
    xlbl.setAttribute('text-anchor', 'end');
    xlbl.setAttribute('font-size', '10'); xlbl.setAttribute('fill', '#87888a');
    xlbl.setAttribute('transform', `rotate(-40 ${lx} ${ly})`);
    xlbl.textContent = d.label;
    svg.appendChild(xlbl);
  });

  svgWrap.appendChild(svg);
  wrap.appendChild(svgWrap);
  container.appendChild(wrap);
}

/** Draw a line/area trend SVG into `container`.
 *  `data` = [{label, value}] ordered by label  `title` = chart title string
 */
function _svgLineChart(data, title, container, color) {
  if (!data.length) return;
  color = color || '#4c82b8';
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const PT_W = Math.max(40, Math.min(72, Math.floor(300 / Math.max(data.length, 1))));
  const CHART_H = 110, PAD = 12;
  // LABEL_H: enough vertical room for labels rotated -35° (each char ≈ 6px wide)
  const maxLabelLen = Math.max(...data.map(d => String(d.lbl || d.label || '').length));
  const LABEL_H = Math.max(48, Math.round(maxLabelLen * 6.2 * Math.sin(Math.PI * 35 / 180)) + 16);
  const svgW = Math.max(240, data.length * PT_W + PAD * 2);
  const svgH = CHART_H + LABEL_H;

  const wrap = document.createElement('div');
  wrap.className = 'viz-chart-card';
  const ttl = document.createElement('div');
  ttl.className = 'viz-chart-card-title';
  ttl.textContent = title;
  wrap.appendChild(ttl);

  const svgWrap = document.createElement('div');
  svgWrap.style.cssText = 'overflow-x:auto;';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.style.cssText = 'display:block;max-width:100%;';

  // Horizontal grid lines
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    const gy = CHART_H - Math.round(frac * (CHART_H - 20));
    const gl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    gl.setAttribute('x1', PAD); gl.setAttribute('y1', gy);
    gl.setAttribute('x2', svgW - PAD); gl.setAttribute('y2', gy);
    gl.setAttribute('stroke', '#d8d8d8'); gl.setAttribute('stroke-width', '1'); gl.setAttribute('stroke-dasharray', '3,3');
    svg.appendChild(gl);
  });

  const pts = data.map((d, i) => {
    const bH = Math.max(4, Math.round((d.value / maxVal) * (CHART_H - 20)));
    return { x: PAD + i * PT_W + PT_W / 2, y: CHART_H - bH, v: d.value, lbl: d.label };
  });

  if (pts.length > 1) {
    // Area fill
    const areaPath = `M${pts[0].x},${CHART_H} ` + pts.map(p => `L${p.x},${p.y}`).join(' ') + ` L${pts[pts.length - 1].x},${CHART_H} Z`;
    const areaEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    areaEl.setAttribute('d', areaPath); areaEl.setAttribute('fill', color); areaEl.setAttribute('opacity', '0.10');
    svg.appendChild(areaEl);

    // Line
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    poly.setAttribute('points', pts.map(p => `${p.x},${p.y}`).join(' '));
    poly.setAttribute('fill', 'none'); poly.setAttribute('stroke', color);
    poly.setAttribute('stroke-width', '2.2'); poly.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(poly);
  } else {
    // Single point — draw a horizontal reference line
    const refLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    refLine.setAttribute('x1', PAD); refLine.setAttribute('y1', pts[0].y);
    refLine.setAttribute('x2', svgW - PAD); refLine.setAttribute('y2', pts[0].y);
    refLine.setAttribute('stroke', color); refLine.setAttribute('stroke-width', '2'); refLine.setAttribute('stroke-dasharray', '6,4');
    svg.appendChild(refLine);
  }

  pts.forEach(p => {
    // Outer ring
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('cx', p.x); ring.setAttribute('cy', p.y);
    ring.setAttribute('r', '5'); ring.setAttribute('fill', '#fff'); ring.setAttribute('stroke', color); ring.setAttribute('stroke-width', '2');
    svg.appendChild(ring);
    // Inner dot
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
    dot.setAttribute('r', '2.5'); dot.setAttribute('fill', color);
    svg.appendChild(dot);

    // Value above dot
    const vlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    vlbl.setAttribute('x', p.x); vlbl.setAttribute('y', p.y - 9);
    vlbl.setAttribute('text-anchor', 'middle');
    vlbl.setAttribute('font-size', '10'); vlbl.setAttribute('fill', color); vlbl.setAttribute('font-weight', '600');
    vlbl.textContent = p.v;
    svg.appendChild(vlbl);

    // X label
    const xlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const ly = CHART_H + 12;
    xlbl.setAttribute('x', p.x); xlbl.setAttribute('y', ly);
    xlbl.setAttribute('text-anchor', 'end');
    xlbl.setAttribute('font-size', '10'); xlbl.setAttribute('fill', '#87888a');
    xlbl.setAttribute('transform', `rotate(-35 ${p.x} ${ly})`);
    xlbl.textContent = p.lbl;
    svg.appendChild(xlbl);
  });

  svgWrap.appendChild(svg);
  wrap.appendChild(svgWrap);
  container.appendChild(wrap);
}

/** Draw a pie chart SVG into `container`.
 *  `data` = [{label, value}]  `title` = chart title string
 */
function _svgPieChart(data, title, container) {
  if (!data.length) return;
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return;
  const COLORS = _FIOE_CHART_COLORS;
  const R = 56, CX = 70, CY = 70;
  const LEG_X = CX * 2 + 10;
  const LEG_ROW_H = 20, LEG_TOP = 18;
  // SVG dimensions: height fits all legend rows; width fits pie + legend text (truncated to 24 chars)
  const SVG_H = Math.max(CY * 2, LEG_TOP + data.length * LEG_ROW_H + 12);
  const SVG_W = 340;

  const wrap = document.createElement('div');
  wrap.className = 'viz-chart-card';
  const ttl = document.createElement('div');
  ttl.className = 'viz-chart-card-title';
  ttl.textContent = title;
  wrap.appendChild(ttl);

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', SVG_W); svg.setAttribute('height', SVG_H);
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.style.cssText = 'display:block;max-width:100%;';

  if (data.length === 1) {
    // Single slice = full circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', CX); circle.setAttribute('cy', CY);
    circle.setAttribute('r', R); circle.setAttribute('fill', COLORS[0]);
    svg.appendChild(circle);
    const plbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    plbl.setAttribute('x', CX); plbl.setAttribute('y', CY);
    plbl.setAttribute('text-anchor', 'middle'); plbl.setAttribute('dominant-baseline', 'middle');
    plbl.setAttribute('font-size', '13'); plbl.setAttribute('fill', '#fff'); plbl.setAttribute('font-weight', '700');
    plbl.textContent = '100%';
    svg.appendChild(plbl);
  } else {
    let startAngle = -Math.PI / 2;
    data.forEach((d, i) => {
      const sliceAngle = (d.value / total) * 2 * Math.PI;
      const endAngle = startAngle + sliceAngle;
      const x1 = CX + R * Math.cos(startAngle);
      const y1 = CY + R * Math.sin(startAngle);
      const x2 = CX + R * Math.cos(endAngle);
      const y2 = CY + R * Math.sin(endAngle);
      const largeArc = sliceAngle > Math.PI ? 1 : 0;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${CX},${CY} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${largeArc},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z`);
      path.setAttribute('fill', COLORS[i % COLORS.length]);
      svg.appendChild(path);

      const midAngle = startAngle + sliceAngle / 2;
      const pct = Math.round((d.value / total) * 100);
      if (pct >= 7) {
        const lx = CX + (R * 0.63) * Math.cos(midAngle);
        const ly = CY + (R * 0.63) * Math.sin(midAngle);
        const plbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        plbl.setAttribute('x', lx.toFixed(2)); plbl.setAttribute('y', ly.toFixed(2));
        plbl.setAttribute('text-anchor', 'middle'); plbl.setAttribute('dominant-baseline', 'middle');
        plbl.setAttribute('font-size', '10'); plbl.setAttribute('fill', '#fff'); plbl.setAttribute('font-weight', '700');
        plbl.textContent = pct + '%';
        svg.appendChild(plbl);
      }
      startAngle = endAngle;
    });
  }

  // Legend (right side)
  data.forEach((d, i) => {
    const ly = LEG_TOP + i * LEG_ROW_H;
    const box = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    box.setAttribute('x', LEG_X); box.setAttribute('y', ly - 8);
    box.setAttribute('width', 11); box.setAttribute('height', 11);
    box.setAttribute('rx', '2'); box.setAttribute('fill', COLORS[i % COLORS.length]);
    svg.appendChild(box);
    const ltxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    ltxt.setAttribute('x', LEG_X + 15); ltxt.setAttribute('y', ly);
    ltxt.setAttribute('font-size', '10'); ltxt.setAttribute('fill', '#222529');
    ltxt.setAttribute('dominant-baseline', 'middle');
    const labelStr = d.label.length > 22 ? d.label.slice(0, 21) + '…' : d.label;
    ltxt.textContent = `${labelStr} (${d.value})`;
    svg.appendChild(ltxt);
  });

  wrap.appendChild(svg);
  container.appendChild(wrap);
}

// ── Shared log pagination helper (30 rows per page) ──────────────────────────
const LOG_PAGE_SIZE = 30;

function renderLogPagination(container, totalRows, currentPage, onPageChange) {
  const totalPages = Math.max(1, Math.ceil(totalRows / LOG_PAGE_SIZE));
  if (totalPages <= 1) return;

  const nav = document.createElement('div');
  nav.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;';

  const prev = document.createElement('button');
  prev.className = 'btn btn-sm';
  prev.style.cssText = 'background:#f5f7fa;border:1px solid var(--border);color:var(--muted);';
  prev.textContent = '← Prev';
  prev.disabled = currentPage <= 1;
  prev.addEventListener('click', () => { if (currentPage > 1) onPageChange(currentPage - 1); });

  const info = document.createElement('span');
  info.style.cssText = 'font-size:12px;color:var(--muted);';
  const startRow = (currentPage - 1) * LOG_PAGE_SIZE + 1;
  const endRow   = Math.min(currentPage * LOG_PAGE_SIZE, totalRows);
  info.textContent = `${startRow}–${endRow} of ${totalRows}`;

  const next = document.createElement('button');
  next.className = 'btn btn-sm';
  next.style.cssText = 'background:#f5f7fa;border:1px solid var(--border);color:var(--muted);';
  next.textContent = 'Next →';
  next.disabled = currentPage >= totalPages;
  next.addEventListener('click', () => { if (currentPage < totalPages) onPageChange(currentPage + 1); });

  nav.appendChild(prev);
  nav.appendChild(info);
  nav.appendChild(next);
  container.appendChild(nav);
}

function renderFinancialSection(rows) {

  subTabBar.style.cssText = 'display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #4c82b8;';
  ['transactions','ledger'].forEach(tid => {
    const btn = document.createElement('button');
    btn.dataset.stab = tid;
    btn.textContent = tid === 'transactions' ? '📋 Transactions' : '📒 Running Balance';
    const isActive = _financialSubTab === tid;
    btn.style.cssText = `padding:8px 18px;font-size:12px;font-weight:${isActive?'700':'500'};border:none;border-bottom:3px solid ${isActive?'#073679':'transparent'};background:${isActive?'#e8eef7':'transparent'};color:${isActive?'#073679':'var(--muted)'};cursor:pointer;border-radius:4px 4px 0 0;transition:all .15s;`;
    btn.addEventListener('click', () => {
      _financialSubTab = tid;
      renderFinancialSection(rows);
    });
    subTabBar.appendChild(btn);
  });
  sec.appendChild(subTabBar);

  if (_financialSubTab === 'ledger') {
    renderLedgerSubSection(sec);
    return;
  }

  // ── Transactions sub-tab (existing content) ─────────────────────────────

  // Looker Studio embed panel (shown when URL is configured)
  // (visualization charts rendered below)

  // Helper: best token value for a row — prefer transaction_amount, fall back to token_usage
  function rowTokenAmt(r) {
    if (r.transaction_amount !== undefined && r.transaction_amount !== null)
      return parseInt(r.transaction_amount, 10) || 0;
    return parseInt(r.token_usage, 10) || 0;
  }
  function rowTxnType(r) { return (r.transaction_type || '').toLowerCase(); }

  // Totals
  const tokenCostSGD = parseFloat((_config.tokens || {}).token_cost_sgd) || 0.10;
  function rowRevenue(r) {
    if (r.revenue_sgd !== undefined && r.revenue_sgd !== null) return parseFloat(r.revenue_sgd) || 0;
    if (rowTxnType(r) === 'spend') return Math.round(rowTokenAmt(r) * (parseFloat(r.token_cost_sgd) || tokenCostSGD) * 10000) / 10000;
    return 0;
  }
  const totalDeducted = rows
    .filter(r => rowTxnType(r) === 'spend')
    .reduce((s, r) => s + rowTokenAmt(r), 0);
  const totalCredited = rows
    .filter(r => rowTxnType(r) === 'credit')
    .reduce((s, r) => s + rowTokenAmt(r), 0);
  const totalRevenue = rows
    .filter(r => rowTxnType(r) === 'spend')
    .reduce((s, r) => s + rowRevenue(r), 0);

  const counters = document.createElement('div');

    <div class="log-counter">
      <div class="cval" style="color:#27ae60">${totalCredited.toLocaleString()}</div>
      <div class="clbl">Tokens Credited</div>
    </div>
    <div class="log-counter">
      <div class="cval" style="color:#073679">SGD ${totalRevenue.toFixed(2)}</div>
      <div class="clbl">Credits Spent (Revenue)</div>

    featureMap[feat].count++;
    const amt = rowTokenAmt(r);
    const type = rowTxnType(r);
    if (type === 'spend')  featureMap[feat].deducted += amt;
    if (type === 'credit') featureMap[feat].credited += amt;
  });

  if (featureKeys.length) {
    const breakdown = document.createElement('div');

        + (fm.deducted ? `<span style="color:var(--danger,#d9534f)">−${fm.deducted.toLocaleString()} tkn</span> ` : '')
        + (fm.credited ? `<span style="color:#27ae60">+${fm.credited.toLocaleString()} tkn</span> ` : '')
        + `<span style="color:var(--muted)">(${fm.count})</span>`;
      bdWrap.appendChild(chip);
    });
    breakdown.appendChild(bdWrap);
    sec.appendChild(breakdown);
  }

  // ── Data Visualization panel (bar + line + pie with username filter) ──────
  if (rows.length) {
    const vizPanel = _buildVizPanel(rows, 'Financial / Credits — Charts', function(filtered, chartArea) {
      

      // 1) Bar: tokens by feature
      const fmap = {};
      filtered.forEach(r => {
        const feat = _featureLabel(r.feature);
        if (!fmap[feat]) fmap[feat] = { deducted: 0, count: 0 };
        if ((r.transaction_type || '').toLowerCase() === 'spend') {
          const amt = r.transaction_amount !== undefined && r.transaction_amount !== null
            ? parseInt(r.transaction_amount, 10) : parseInt(r.token_usage, 10);

        fmap[feat].count++;

    sec.appendChild(vizPanel);

        <th style="text-align:right">Token Cost</th>

}

// ── 4b. Ledger (Running Balance) sub-section ─────────────────────────────────
function renderLedgerSubSection(container) {
  // Merge manual ledger entries with auto-generated entries from financial logs
  const autoEntries = _financialToLedger(_logs.financial || []);
  const entries = [...(_ledgerEntries || []), ...autoEntries];

  // ── Header row with +New Entry and Export ────────────────────────────────
  const ledgerHdr = document.createElement('div');
  ledgerHdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;';

  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;font-weight:700;color:#073679;text-transform:uppercase;letter-spacing:.05em;';
  title.textContent = '📒 Running Balance Ledger';
  ledgerHdr.appendChild(title);

  const btnGroup = document.createElement('div');
  btnGroup.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.style.cssText = 'font-size:12px;padding:6px 14px;background:#073679;color:#fff;border:none;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:4px;';
  addBtn.innerHTML = '＋ New Entry';
  addBtn.addEventListener('click', openLedgerModal);
  btnGroup.appendChild(addBtn);

  const csvBtn = document.createElement('button');
  csvBtn.style.cssText = 'font-size:12px;padding:6px 14px;background:#4c82b8;color:#fff;border:none;border-radius:5px;cursor:pointer;';
  csvBtn.textContent = '↓ CSV';
  csvBtn.addEventListener('click', () => exportLedgerCSV(entries));
  btnGroup.appendChild(csvBtn);

  ledgerHdr.appendChild(btnGroup);
  container.appendChild(ledgerHdr);

  // ── Summary counters ─────────────────────────────────────────────────────
  const totalDebit  = entries.reduce((s, e) => s + (parseFloat(e.debit)  || 0), 0);
  const totalCredit = entries.reduce((s, e) => s + (parseFloat(e.credit) || 0), 0);
  const closingBal  = totalDebit - totalCredit;

  const summaryRow = document.createElement('div');
  summaryRow.className = 'log-counter-row';
  summaryRow.style.cssText = 'margin-bottom:16px;';
  summaryRow.innerHTML = `
    <div class="log-counter">
      <div class="cval">${entries.length}</div>
      <div class="clbl">Entries (${(_ledgerEntries || []).length} manual + ${autoEntries.length} auto)</div>
    </div>
    <div class="log-counter">
      <div class="cval" style="color:#073679">SGD ${totalDebit.toFixed(2)}</div>
      <div class="clbl">Total Debit (+)</div>
    </div>
    <div class="log-counter">
      <div class="cval" style="color:var(--danger,#d9534f)">SGD ${totalCredit.toFixed(2)}</div>
      <div class="clbl">Total Credit (−)</div>
    </div>
    <div class="log-counter">
      <div class="cval" style="color:${closingBal >= 0 ? '#27ae60' : '#d9534f'}">SGD ${closingBal.toFixed(2)}</div>
      <div class="clbl">Closing Balance</div>
    </div>`;
  container.appendChild(summaryRow);

  if (!entries.length) {
    const empty = document.createElement('div');
    empty.className = 'log-empty';
    empty.textContent = 'No ledger entries yet. Click "+ New Entry" to add the first record.';
    container.appendChild(empty);
    return;
  }

  // ── Date filter bar ───────────────────────────────────────────────────────
  const dateBar = document.createElement('div');
  dateBar.style.cssText = 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:#e8eef7;border:1px solid #4c82b8;border-radius:6px;';
  dateBar.innerHTML = `
    <span style="font-size:12px;font-weight:600;color:#073679;">Filter by Date:</span>
    <label style="font-size:12px;color:#073679;">From <input type="date" class="ldFrom" value="${escHtml(_ledgerDateFrom)}" style="font-size:12px;padding:3px 7px;border:1px solid #4c82b8;border-radius:4px;color:#073679;margin-left:4px;"></label>
    <label style="font-size:12px;color:#073679;">To <input type="date" class="ldTo" value="${escHtml(_ledgerDateTo)}" style="font-size:12px;padding:3px 7px;border:1px solid #4c82b8;border-radius:4px;color:#073679;margin-left:4px;"></label>
    <button class="ldClear" style="font-size:11px;padding:3px 10px;background:#fff;border:1px solid #4c82b8;border-radius:4px;color:#073679;cursor:pointer;">Clear</button>
    <span class="ldCount" style="font-size:11px;color:var(--muted);"></span>`;

  const fromInput = dateBar.querySelector('.ldFrom');
  const toInput   = dateBar.querySelector('.ldTo');
  const clearBtn  = dateBar.querySelector('.ldClear');
  const countEl   = dateBar.querySelector('.ldCount');

  // ── Table ────────────────────────────────────────────────────────────────
  // Sort all entries by date ascending (for correct running balance)
  const sorted = _ledgerSortByDate(entries);
  // Compute running balance for ALL entries ascending
  let running = 0;
  const withBalance = sorted.map(e => {
    running += (parseFloat(e.debit) || 0) - (parseFloat(e.credit) || 0);
    return { ...e, _balance: running };
  });

  function getFilteredRows() {
    const from = _ledgerDateFrom;
    const to   = _ledgerDateTo;
    if (!from && !to) return withBalance.slice().reverse();
    return withBalance.filter(e => {
      const d = (e.date || '').slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    }).reverse();
  }

  let displayRows = getFilteredRows();

  const wrap = document.createElement('div');
  wrap.className = 'log-tbl-wrap';
  wrap.style.cssText = 'overflow-x:auto;';

  const tbl = document.createElement('table');
  tbl.style.cssText = 'min-width:800px;';
  tbl.innerHTML = `
    <thead>
      <tr style="position:sticky;top:0;background:#073679;color:#fff;z-index:2;">
        <th style="white-space:nowrap">Date</th>
        <th>Category</th>
        <th>Reference / Voucher #</th>
        <th>Description</th>
        <th style="text-align:right">Debit (+)</th>
        <th style="text-align:right">Credit (−)</th>
        <th style="text-align:right">Balance</th>
        <th style="white-space:nowrap">Created By</th>
        <th></th>
      </tr>
    </thead>`;
  const tbody = document.createElement('tbody');

  function updateCountLabel() {
    countEl.textContent = (_ledgerDateFrom || _ledgerDateTo)
      ? `(${displayRows.length} of ${entries.length} shown)`
      : `(${entries.length} total)`;
  }

  function renderLedgerRows() {
    tbody.innerHTML = '';
    updateCountLabel();
    const page = displayRows.slice((_ledgerPage - 1) * LOG_PAGE_SIZE, _ledgerPage * LOG_PAGE_SIZE);
    page.forEach(e => {
      const tr = document.createElement('tr');
      const debit  = parseFloat(e.debit)  || 0;
      const credit = parseFloat(e.credit) || 0;
      const bal    = e._balance;
      const balColor = bal >= 0 ? '#27ae60' : '#d9534f';
      tr.innerHTML = `
        <td style="white-space:nowrap;font-size:12px">${escHtml(e.date || '—')}</td>
        <td><span style="background:#e8eef7;border:1px solid #4c82b8;border-radius:4px;padding:2px 7px;font-size:11px;color:#073679">${escHtml(e.category || '—')}</span></td>
        <td style="font-family:monospace;font-size:11px;color:#073679">${escHtml(e.reference || '—')}</td>
        <td style="font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(e.description || '')}">${escHtml(e.description || '—')}</td>
        <td style="text-align:right;font-weight:600;color:#073679">${debit > 0 ? 'SGD ' + debit.toFixed(2) : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:right;font-weight:600;color:var(--danger,#d9534f)">${credit > 0 ? 'SGD ' + credit.toFixed(2) : '<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:right;font-weight:700;color:${balColor}">SGD ${bal.toFixed(2)}</td>
        <td style="font-size:11px;color:var(--muted);white-space:nowrap">${escHtml(e.created_by || '—')}<br><span style="font-size:10px">${escHtml((e.created_at || '').slice(0, 19).replace('T', ' '))}</span></td>`;
      const actionTd = document.createElement('td');
      actionTd.style.cssText = 'text-align:center;white-space:nowrap;';
      if (!e._auto) {
        const delBtn = document.createElement('button');
        delBtn.title = 'Delete entry';
        delBtn.style.cssText = 'background:transparent;border:1px solid #d9534f;color:#d9534f;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:11px;';
        delBtn.textContent = '🗑';
        delBtn.addEventListener('click', () => deleteLedgerEntry(e.id, container));
        actionTd.appendChild(delBtn);
      } else {
        const badge = document.createElement('span');
        badge.title = 'Auto-synced from Transactions';
        badge.style.cssText = 'font-size:10px;color:#4c82b8;background:#e8eef7;border:1px solid #4c82b8;border-radius:3px;padding:1px 5px;';
        badge.textContent = '⚡ auto';
        actionTd.appendChild(badge);
      }
      tr.appendChild(actionTd);
      tbody.appendChild(tr);
    });
    const existingNav = wrap.querySelector('.log-page-nav');
    if (existingNav) existingNav.remove();
    const navWrap = document.createElement('div');
    navWrap.className = 'log-page-nav';
    renderLogPagination(navWrap, displayRows.length, _ledgerPage, (p) => { _ledgerPage = p; renderLedgerRows(); });
    wrap.appendChild(navWrap);
  }

  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  container.appendChild(dateBar);
  container.appendChild(wrap);

  // Wire date filter events
  function applyDateFilter() {
    _ledgerDateFrom = fromInput.value;
    _ledgerDateTo   = toInput.value;
    _ledgerPage = 1;
    displayRows = getFilteredRows();
    renderLedgerRows();
  }
  fromInput.addEventListener('change', applyDateFilter);
  toInput.addEventListener('change', applyDateFilter);
  clearBtn.addEventListener('click', () => {
    _ledgerDateFrom = ''; _ledgerDateTo = '';
    fromInput.value = ''; toInput.value = '';
    _ledgerPage = 1;
    displayRows = getFilteredRows();
    renderLedgerRows();
  });

  renderLedgerRows();
}

async function deleteLedgerEntry(id, container) {
  if (!confirm('Delete this ledger entry? This cannot be undone.')) return;
  try {
    const r = await fetch(`${API}/admin/ledger/${encodeURIComponent(id)}`, {
      method: 'DELETE',
      credentials: 'same-origin',
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      alert('Failed to delete: ' + (d.error || r.status));
      return;
    }
    // Remove from local cache and re-render
    _ledgerEntries = _ledgerEntries.filter(e => e.id !== id);
    renderFinancialSection(_logs.financial || []);
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

// ── Ledger: +New Entry modal ──────────────────────────────────────────────────
function openLedgerModal() {
  // Remove any existing modal
  const old = document.getElementById('ledgerModal');

  const overlay = document.createElement('div');
  overlay.id = 'ledgerModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';

  const today = new Date().toISOString().slice(0, 10);
  modal.innerHTML = `
    <div style="background:#073679;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-weight:700;font-size:14px;">📒 New Ledger Entry</span>

    </div>

        </label>
        <label style="display:flex;flex-direction:column;gap:4px;font-weight:600;font-size:12px;">Category *
          <select name="category" required style="padding:6px 8px;border:1px solid #cdd;border-radius:5px;font-size:13px;">

            <option value="Payment">Payment</option>
            <option value="Refund">Refund</option>

            <option value="Revenue">Revenue</option>
            <option value="Expense">Expense</option>

      <label style="display:flex;flex-direction:column;gap:4px;font-weight:600;font-size:12px;">Reference / Voucher # *

          <input type="number" name="debit" min="0" step="0.01" placeholder="0.00" style="padding:6px 8px;border:1px solid #cdd;border-radius:5px;font-size:13px;" />

          <input type="number" name="credit" min="0" step="0.01" placeholder="0.00" style="padding:6px 8px;border:1px solid #cdd;border-radius:5px;font-size:13px;" />
        </label>
      </div>
      <div id="ledgerFormError" style="display:none;padding:8px 12px;background:#fde;border:1px solid #f99;border-radius:5px;color:#c00;font-size:12px;"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
        <button type="button" id="ledgerModalCancelBtn" style="padding:8px 18px;background:#e8eef7;border:1px solid #4c82b8;border-radius:5px;cursor:pointer;font-size:12px;color:#073679;">Cancel</button>
        <button type="submit" style="padding:8px 18px;background:#073679;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;">Save Entry</button>
      </div>
    </form>`;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  document.getElementById('ledgerModalClose').addEventListener('click', () => overlay.remove());
  document.getElementById('ledgerModalCancelBtn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  // Mutual exclusion: debit and credit cannot both be filled
  const debitInput  = modal.querySelector('input[name="debit"]');
  const creditInput = modal.querySelector('input[name="credit"]');
  debitInput.addEventListener('input',  () => { if (parseFloat(debitInput.value) > 0)  creditInput.value = ''; });

  document.getElementById('ledgerForm').addEventListener('submit', async (e) => {

      category:    fd.get('category'),
      reference:   fd.get('reference'),
      description: fd.get('description') || '',
      debit:       parseFloat(fd.get('debit'))  || 0,
      credit:      parseFloat(fd.get('credit')) || 0,
    };

    if (!body.date || !body.category || !body.reference) {
      errEl.textContent = 'Date, Category, and Reference are required.';
      errEl.style.display = 'block'; return;
    }
    if (body.debit === 0 && body.credit === 0) {
      errEl.textContent = 'Either Debit or Credit must be filled with a value > 0.';
      errEl.style.display = 'block'; return;
    }

    const saveBtn = e.target.querySelector('button[type="submit"]');
    saveBtn.disabled = true; saveBtn.textContent = '⏳ Saving…';

    try {
      const r = await fetch(`${API}/admin/ledger`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) {
        errEl.textContent = data.error || 'Failed to save entry.';
        errEl.style.display = 'block';
        saveBtn.disabled = false; saveBtn.textContent = 'Save Entry';
        return;
      }
      // Success — update local cache and re-render
      _ledgerEntries.push(data);
      overlay.remove();
      // Re-render the financial section in ledger mode
      renderFinancialSection(_logs.financial || []);
    } catch (err) {
      errEl.textContent = 'Network error: ' + err.message;
      errEl.style.display = 'block';
      saveBtn.disabled = false; saveBtn.textContent = 'Save Entry';
    }
  });
}

// ── Ledger CSV export ─────────────────────────────────────────────────────────
function exportLedgerCSV(entries) {
  const sorted = _ledgerSortByDate(entries);
  let running = 0;
  const cols = ['date', 'category', 'reference', 'description', 'debit', 'credit', 'balance', 'created_by', 'created_at'];
  const lines = [cols.join(',')];
  sorted.forEach(e => {
    running += (parseFloat(e.debit) || 0) - (parseFloat(e.credit) || 0);
    const row = [
      e.date || '', e.category || '', e.reference || '', (e.description || '').replace(/"/g, '""'),
      e.debit || 0, e.credit || 0, running.toFixed(2),
      e.created_by || '', (e.created_at || '').slice(0, 19).replace('T', ' '),
    ].map(v => `"${v}"`);
    lines.push(row.join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ledger_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Label helpers ─────────────────────────────────────────────────────────────
// Maps raw action keys logged by app_logger.py / webbridge files to readable labels.
const _APPROVAL_ACTION_LABELS = {
  'export_pdf_triggered':          'Export PDF',
  'export_excel_triggered':        'Export Excel',
  'bulk_assessment_triggered':     'Bulk Assessment (Started)',
  'bulk_assessment_completed':     'Bulk Assessment (Completed)',
  'appeal_approve':                'Appeal Approved',
  'appeal_reject':                 'Appeal Rejected',
};
function _approvalActionLabel(raw) {
  if (!raw) return 'Other Action';
  return _APPROVAL_ACTION_LABELS[raw] || raw.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Maps severity / level values to readable labels for the Error Capture charts.
const _ERROR_SEVERITY_LABELS = {
  'critical': 'Critical',
  'error':    'Error',
  'warning':  'Warning',
  'warn':     'Warning',
  'info':     'Info',
};
function _errorSeverityLabel(raw) {
  if (!raw) return 'Unclassified';
  const lc = raw.toLowerCase();
  return _ERROR_SEVERITY_LABELS[lc] || raw.charAt(0).toUpperCase() + raw.slice(1);
}

// Maps raw feature keys to readable display names for Financial charts.
const _FEATURE_LABELS = {
  'jd_upload':                 'JD Upload',
  'candidate_search':          'Candidate Search',
  'token_update':              'Token Update',
  'appeal_approval':           'Appeal Approval (Credit)',
  'verified_selection_deduct': 'Verified Selection',
  'bulk_assessment':           'Bulk Assessment',
};
function _featureLabel(raw) {
  if (!raw) return 'Unspecified';
  return _FEATURE_LABELS[raw] || raw.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

async function runGeminiErrorAnalysis(errorMessage, source) {
  const btn   = document.getElementById('geminiAnalyseBtn');
  const wrap  = document.getElementById('geminiExplanationWrap');
  const expBox = document.getElementById('geminiExplanationBox');
  const fixBox = document.getElementById('geminiFixBox');
  const tcBox  = document.getElementById('geminiTestCaseBox');
  const cpBox  = document.getElementById('copilotPromptBox');
  if (!btn || !wrap || !expBox || !fixBox || !tcBox || !cpBox) return;

  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> Analysing…';
  wrap.style.display = '';
  expBox.className = 'gemini-output-box loading';
  expBox.textContent = 'Calling Gemini…';
  fixBox.textContent = '';
  if (tcBox) tcBox.textContent = '';
  cpBox.value = '';

  try {
    const r = await fetch(`${API}/admin/logs/analyse-error`, {
      method: 'POST',
      headers: csrfHeaders(),
      credentials: 'same-origin',
      body: JSON.stringify({ error_message: errorMessage, source }),
    });
    if (r.ok) {
      const data = await r.json();
      expBox.className = 'gemini-output-box';
      expBox.textContent = data.explanation || '—';
      fixBox.textContent = data.suggested_fix || '—';
      if (tcBox) tcBox.textContent = data.test_case || '—';
      cpBox.value = data.copilot_prompt || '';
      btn.disabled = false;
      btn.innerHTML = '<span>✨</span> Re-analyse';

      // ── AI Fix button (Vertex AI) ─────────────────────────────────────────
      const existingAiBtn = document.getElementById('aiFixTriggerBtn');
      if (!existingAiBtn && typeof AdminAiFix !== 'undefined') {
        const aiBtn = document.createElement('button');
        aiBtn.id = 'aiFixTriggerBtn';
        aiBtn.className = 'gemini-analyze-btn';
        aiBtn.style.cssText = 'margin-top:14px;background:linear-gradient(135deg,#073679,#4c82b8);';
        aiBtn.innerHTML = '<span>🤖</span> Generate AI Fix (Vertex AI)';
        aiBtn.addEventListener('click', () => {
          AdminAiFix.show({
            error_message:  errorMessage,
            source,
            explanation:    data.explanation    || '',
            suggested_fix:  data.suggested_fix  || '',
            copilot_prompt: data.copilot_prompt || '',
          });
        });
        wrap.appendChild(aiBtn);
      }
    } else if (r.status === 403) {
      expBox.className = 'gemini-output-box error-state';
      expBox.textContent = '⛔ Access denied (HTTP 403). Ensure you are logged in as an admin (useraccess=admin in the database).';
      btn.disabled = false;
      btn.innerHTML = '<span>✨</span> Re-analyse';
    } else if (r.status === 401) {
      expBox.className = 'gemini-output-box error-state';
      expBox.textContent = '🔐 Not authenticated (HTTP 401). Please log in as an admin and try again.';
      btn.disabled = false;
      btn.innerHTML = '<span>✨</span> Re-analyse';
    } else if (r.status === 404) {
      // Gemini not configured on the server (GEMINI_API_KEY not set) — fall back to client-side prompt
      expBox.className = 'gemini-output-box error-state';
      expBox.textContent = 'Gemini not available on this server (API key not configured). Copilot prompt generated locally.';
      fixBox.textContent = '';
      if (tcBox) tcBox.textContent = '';
      cpBox.value = _buildCopilotPrompt(errorMessage, source, '', '', '');
    } else {
      const data = await r.json().catch(() => ({}));
      expBox.className = 'gemini-output-box error-state';
      expBox.textContent = data.error || 'Analysis failed.';
    }
  } catch (err) {
    expBox.className = 'gemini-output-box error-state';
    expBox.textContent = 'Network error: ' + err.message + '\nCopilot prompt generated locally.';
    cpBox.value = _buildCopilotPrompt(errorMessage, source, '', '', '');
    btn.disabled = false;
    btn.innerHTML = '<span>✨</span> Re-analyse';
  }
}

function _buildCopilotPrompt(errorMessage, source, explanation, suggestedFix, testCase) {
  return [
    '// GitHub Copilot — Error Fix Request',
    `// Source: ${source}`,
    '//',
    '// === ERROR ===',
    errorMessage,
    explanation ? '\n// === EXPLANATION ===\n' + explanation : '',
    suggestedFix ? '\n// === SUGGESTED FIX ===\n' + suggestedFix : '',
    testCase ? '\n// === TEST CASE ===\n' + testCase : '',
    '',
    '// Please suggest a corrected implementation for the code above.',
    '// Show the full corrected function / block, not just a diff.',
  ].filter(Boolean).join('\n');
}

// ── Test Monitor ──────────────────────────────────────────────────────────────
// All test suites referenced by the test coverage plan.
// ── Test autoCheck factory helpers ────────────────────────────────────────────
// _tBE  → backend (pytest)  – calls /admin/run-tests; real pass/fail/skip
// _tE2E → end-to-end (Playwright) – calls /admin/run-tests; real pass/fail/skip
// _tK6  → load test (k6) – immediate skip with run command
// _tAPI → live API check from browser (real fetch, pass/fail/skip on timeout)
function _tBE(file, testKey) {
  const cmd = `pytest ${file}${testKey ? ' -k ' + testKey : ''}`;
  return { type: 'run-tests', file, testKey: testKey || null, cmd };
}
function _tE2E(file, grepPat) {
  const cmd = `npx playwright test ${file}${grepPat ? ' --grep "' + grepPat + '"' : ''}`;
  return { type: 'run-e2e', file, grepPat: grepPat || null, cmd };
}
function _tK6(file) {
  return { type: 'loadtest', skipReason: `Requires k6 load-testing tool + running app server.\nMissing condition: k6 installed, app server running.\nRun: k6 run ${file}` };
}
function _tAPI(url, expectedStatus, headerChecks, method, body) {
  return { type: 'api', url, expectedStatus: expectedStatus || 200, headerChecks: headerChecks || [], method: method || 'GET', body: body || null };
}

    <div class="tm-log-header">

      <button class="tm-log-clear-btn" id="tmClearLogBtn">🗑 Clear</button>
    </div>
    <div class="tm-log-body" id="tmLogBody">

    </div>
    <div class="tm-coverage-body">
      <div class="tm-progress-bar-wrap">
        <div class="tm-progress-bar" id="tmCovBar" style="width:0%"></div>
      </div>
      <div class="tm-coverage-meta" id="tmCovMeta">
        <span class="cov-pass"><strong id="tmCovPass">0</strong> pass</span>
        <span class="cov-fail"><strong id="tmCovFail">0</strong> fail</span>
        <span class="cov-skip"><strong id="tmCovSkip">0</strong> skip</span>
        <span class="cov-pend"><strong id="tmCovPend">0</strong> pending</span>
      </div>
      <div class="tm-coverage-tables">
        <div class="tm-cov-section">
          <h4>✅ Fully Addressed Suites</h4>
          <ul class="tm-cov-list" id="tmCovPassed"><li class="tm-cov-empty">No suites fully passed yet.</li></ul>
        </div>
        <div class="tm-cov-section">
          <h4>❌ Needs Attention</h4>
          <ul class="tm-cov-list" id="tmCovFailed"><li class="tm-cov-empty">No failures detected.</li></ul>
